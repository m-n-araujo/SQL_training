<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Querious — Learn SQL</title>
  <style>
    html,body{margin:0;padding:0;background:#060816;}
    #root{min-height:100vh;}
    #ql{position:fixed;inset:0;z-index:9999;background:#060816;display:flex;
        flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity .5s;}
    #ql.done{opacity:0;pointer-events:none;}
    #qb{width:150px;height:3px;background:rgba(36,49,79,.5);border-radius:99px;overflow:hidden;}
    #qf{height:100%;width:40%;background:linear-gradient(90deg,#22D3EE,#6D7CFF,#A78BFA);
        border-radius:99px;animation:qs 1.2s ease infinite;}
    @keyframes qs{0%{transform:translateX(-200%);}100%{transform:translateX(500%);}}
  </style>
</head>
<body>

<div id="ql">
  <svg width="52" height="52" viewBox="0 0 36 36" fill="none">
    <defs>
      <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#22D3EE"/>
        <stop offset="50%" stop-color="#6D7CFF"/>
        <stop offset="100%" stop-color="#A78BFA"/>
      </linearGradient>
    </defs>
    <circle cx="17" cy="17" r="15.5" stroke="url(#lg)" stroke-width="2" fill="none"/>
    <circle cx="17" cy="17" r="13.5" fill="#0B1020"/>
    <text x="15.5" y="24" text-anchor="middle" font-family="Georgia,serif"
          font-weight="800" font-size="21" fill="url(#lg)">Q</text>
  </svg>
  <div style="font-size:15px;font-weight:700;color:#f0f4ff;">Querious</div>
  <div id="qb"><div id="qf"></div></div>
  <div style="font-size:12px;color:#7F90B5;">Loading SQL engine&hellip;</div>
</div>

<div id="root"></div>

n of data stored in tables. A table is like a spreadsheet: rows are records, columns are fields. SQL is the language you use to talk to it.",analogy:"Think of a database as a library. Each table is a bookshelf. SELECT is your request form \u2014 it names which books (columns) you want from which shelf (table).",misconception:null},{icon:"\u{1F4E1}",title:"SELECT \u2014 which columns?",body:"SELECT lists the columns you want in your result. Separate multiple columns with commas. Use * to get every column (useful for exploring, avoid in production).",analogy:null,tip:"SELECT * is great for exploring. In production, always name your columns \u2014 it documents your intent and is faster on wide tables."},{icon:"\u{1F4CB}",title:"FROM \u2014 which table?",body:"FROM tells SQL which table to read. Every query needs both SELECT and FROM. Internally, SQL evaluates FROM first to locate the data, then SELECT determines which columns appear in the output.",analogy:null,tip:null},{icon:"\u{1F3F7}\uFE0F",title:"AS \u2014 rename columns in output",body:"salary AS annual_pay renames the column label in your results only \u2014 the database schema never changes. Useful for making reports readable.",analogy:null,tip:'Aliases with spaces need quotes: salary AS "monthly pay"'},{icon:"\u{1F522}",title:"Computed columns",body:"You can do arithmetic directly inside SELECT: salary / 12 gives monthly pay per row. The computed result doesn't exist in the database \u2014 it's calculated fresh each time.",analogy:null,tip:null}],seeit:[{lbl:"Retrieve all employees",ann:"* means every column \u2014 great for exploration",sql:`SELECT *

re the salary check, write: (dept=1 OR dept=2) AND salary>70k."},{icon:"\u2205",title:"NULL \u2014 the unknown value",body:"NULL means a value is missing or unknown. You cannot test for NULL with = or !=. NULL = NULL is not TRUE \u2014 it's UNKNOWN. The only valid checks are IS NULL and IS NOT NULL.",analogy:"NULL is like an empty envelope. You can't open it to check if its contents match something \u2014 because there are no contents. IS NULL is asking 'is this envelope empty?'",misconception:"WHERE manager_id = NULL always returns 0 rows \u2014 SQL won't warn you. It silently finds nothing. This is one of the most common bugs."}],seeit:[{lbl:"Filter by department",ann:"= tests for an exact match",sql:`SELECT name, salary

       d.budget,

GROUP BY d.id, d.name, d.budget
ORDER BY remaining ASC;`,result:"Engineering is most over-budget (payroll nearly equals budget). An empty department appears with $0 payroll.",transferPoint:"LEFT JOIN + COALESCE is the standard pattern for 'include all X even if no matching Y exists'."}],recall:[{q:"A LEFT JOIN B. Table A has 5 rows, 2 have no match in B. Result rows?",opts:["3 (matched rows only)","5 (all of A, NULLs for unmatched)","7 (all rows from both)","Depends on the ON condition"],ans:1,exp:"LEFT JOIN always returns ALL rows from the left table \u2014 exactly 5. The 2 unmatched rows appear with NULLs in all B columns. INNER JOIN would return only 3."},{q:"You want ALL departments, even those with zero employees. departments is on the left. Which JOIN?",opts:["INNER JOIN employees to departments","LEFT JOIN employees to departments","LEFT JOIN departments to employees","CROSS JOIN"],ans:2,exp:"departments on the left with LEFT JOIN means: keep all departments. Each department is matched to its employees. Departments with no employees appear with NULL employee columns and COUNT(e.id) = 0."},{q:"SELECT name FROM employees e JOIN departments d is ambiguous. Why?",opts:["You can't use aliases in a JOIN","'name' exists in both employees and departments \u2014 SQL can't decide which","JOIN requires you to SELECT *","The alias 'e' conflicts with 'employees'"],ans:1,exp:"Both tables have a 'name' column. Without a prefix (e.name or d.name), SQL doesn't know which one you mean and throws an error. Always prefix column names in JOIN queries."}],challenge:[{id:"c1",diff:"Hard",title:"Full Org Chart with Budget Utilisation",context:"Meridian's CHRO needs a complete org chart: each employee's name, their manager's name (or 'No Manager'), their department name, and what percentage of their department's total payroll their salary represents (1 decimal place, labelled pct_of_dept). Sort by department, then percentage descending.",tables:["employees","departments"],starter:`-- Use: employees e, employees m (manager self-join), departments d
-- Window function: SUM(salary) OVER (PARTITION BY dept_id)
SELECT e.name AS employee,

       d.name AS department,
       `,checks:[{t:"rows",n:12},{t:"col",c:"pct_of_dept"}],hints:["ROUND(e.salary * 100.0 / SUM(e.salary) OVER (PARTITION BY e.dept_id), 1) AS pct_of_dept","FROM employees e LEFT JOIN employees m ON e.manager_id = m.id JOIN departments d ON e.dept_id = d.id","ORDER BY department, pct_of_dept DESC"],solution:`SELECT e.name AS employee,

FROM employees e

JOIN departments d ON e.dept_id = d.id
ORDER BY department, pct_of_dept DESC;`,celebration:"Self-join + regular join + window function in one query \u2014 this is genuinely advanced SQL that impresses in any interview or code review."}]},{id:"i2",title:"CASE WHEN & COALESCE",tagline:"Write conditional logic and handle NULLs gracefully.",hook:{co:"atlas",day:"Tuesday, 4:05 pm",msg:"Quick request: can you add a 'seniority' label (Junior / Mid / Senior) next to each employee's salary in the report? And replace any NULL manager with the text 'Unassigned' \u2014 the CFO hates seeing blank cells.",from:"Solange Ibarra \xB7 Head of Finance",insight:"Real data is messy. CASE WHEN lets you apply if/else logic inside SQL. COALESCE silences NULLs with a fallback value. Together they make your outputs clean and self-explanatory."},concepts:[{icon:"\u{1F500}",title:"CASE WHEN \u2014 SQL's if/else",body:"CASE WHEN condition THEN value WHEN condition2 THEN value2 ELSE default END. SQL evaluates conditions top-to-bottom and returns the first matching THEN value. ELSE catches everything that didn't match.",analogy:"Think of CASE like a series of toll booths on a highway. Each car (row) passes through in order. The first booth whose condition matches collects the toll (returns its value). If no booth matches, the ELSE booth handles it.",misconception:"SQL stops at the first TRUE condition. If salary >= 70000 appears before salary >= 90000, a $95k employee gets labelled 'Mid', not 'Senior'. Put the most restrictive condition first."},{icon:"\u2B1C",title:"COALESCE \u2014 first non-NULL value",body:"COALESCE(a, b, c) returns the first argument that is not NULL. If a is NULL, try b; if b is also NULL, try c. It's the standard way to provide a fallback for missing values.",analogy:null,tip:"COALESCE(manager_id, 0) replaces NULL with 0. COALESCE(notes, description, 'No info') tries three columns in order."},{icon:"\xF7",title:"NULLIF \u2014 make a value NULL on demand",body:"NULLIF(a, b) returns NULL if a equals b; otherwise it returns a. Most useful to prevent division-by-zero: salary / NULLIF(hours, 0) returns NULL instead of crashing when hours is 0.",analogy:null,tip:"NULLIF is the inverse of COALESCE. COALESCE provides a fallback when a value is NULL; NULLIF intentionally produces NULL when two values match."}],seeit:[{lbl:"Salary tier labels",ann:"CASE evaluates top-to-bottom \u2014 most restrictive condition first",sql:`SELECT name, salary,
  CASE
    WHEN salary >= 90000 THEN 'Senior'
    WHEN salary >= 70000 THEN 'Mid'
    ELSE                      'Junior'
  END AS tier
FROM employees
ORDER BY salary DESC;`},{lbl:"COALESCE \u2014 replace NULLs",ann:"COALESCE returns the first non-NULL value in its argument list",sql:`SELECT name,
  COALESCE(CAST(manager_id AS TEXT), 'Unassigned') AS reports_to
FROM employees;`},{lbl:"Conditional aggregation",ann:"SUM(CASE WHEN ...) counts or totals only rows that match a condition",sql:`SELECT
  COUNT(*) AS total,
  SUM(CASE WHEN salary >= 90000 THEN 1 ELSE 0 END) AS senior_count,
  SUM(CASE WHEN salary < 70000  THEN 1 ELSE 0 END) AS junior_count
FROM employees;`},{lbl:"NULLIF \u2014 safe division",ann:"NULLIF prevents division-by-zero; NULL propagates safely",sql:`-- budget_per_head = NULL when headcount is 0 (no crash)
SELECT d.name,
       d.budget / NULLIF(COUNT(e.id), 0) AS budget_per_head
FROM departments d
LEFT JOIN employees e ON e.dept_id = d.id
GROUP BY d.id, d.name, d.budget;`}],guided:[{id:"g1",diff:"Easy",scaffold:.8,title:"Label employees by salary tier",context:"Solange wants a 'tier' column: Senior (\u2265 $90k), Mid (\u2265 $70k), Junior (below $70k). Show name, salary, and tier.",template:`SELECT name, salary,
  CASE
    %%D:WHEN|THEN|ELSE%% salary >= 90000 THEN 'Senior'
    WHEN salary >= 70000 THEN 'Mid'
    ELSE 'Junior'
  END AS tier
FROM employees
ORDER BY salary DESC;`,checks:[{t:"rows",n:12},{t:"col",c:"tier"}],hints:["The first keyword in a CASE branch is: WHEN","CASE evaluates top-to-bottom \u2014 most restrictive (>=90000) must come first"],solution:`SELECT name, salary,
  CASE
    WHEN salary >= 90000 THEN 'Senior'
    WHEN salary >= 70000 THEN 'Mid'
    ELSE 'Junior'
  END AS tier
FROM employees ORDER BY salary DESC;`,whyItWorks:"CASE stops at the first TRUE branch. If >= 90000 came after >= 70000, all Seniors would be labelled Mid. Order matters."},{id:"g2",diff:"Easy",scaffold:.7,title:"Replace NULL manager with 'Unassigned'",context:"The CFO wants no blank cells in the manager column. Replace NULL with the text 'Unassigned'.",template:`SELECT name,

FROM employees;`,checks:[{t:"rows",n:12},{t:"col",c:"reports_to"}],hints:["COALESCE returns the first non-NULL argument","CAST(manager_id AS TEXT) converts the integer to text so COALESCE can compare with 'Unassigned'"],solution:`SELECT name,

FROM employees;`,whyItWorks:"CAST converts the integer manager_id to TEXT. COALESCE then returns 'Unassigned' only when manager_id is NULL \u2014 which CAST(NULL AS TEXT) also is."},{id:"g3",diff:"Medium",scaffold:.5,title:"Count employees per salary tier",context:"Solange wants a summary: how many employees are in each tier? Use conditional aggregation (SUM + CASE).",template:`SELECT

FROM employees;`,checks:[{t:"rows",n:1},{t:"col",c:"senior_count"}],hints:["Senior alias: senior_count","Mid alias: mid_count","Junior alias: junior_count"],solution:`SELECT
  SUM(CASE WHEN salary >= 90000 THEN 1 ELSE 0 END) AS senior_count,
  SUM(CASE WHEN salary >= 70000 AND salary < 90000 THEN 1 ELSE 0 END) AS mid_count,
  SUM(CASE WHEN salary < 70000  THEN 1 ELSE 0 END) AS junior_count
FROM employees;`,whyItWorks:"SUM(CASE WHEN ... THEN 1 ELSE 0 END) counts rows matching a condition. It's a pivot technique \u2014 turning row data into columns."}],usecases:[{co:"atlas",icon:"\u{1F4CA}",title:"Salary Band Dashboard",situation:"The finance team wants every employee's tier label shown alongside their salary in the quarterly compensation report.",sql:`SELECT dept_id,
  COUNT(*) AS total,
  SUM(CASE WHEN salary >= 90000 THEN 1 ELSE 0 END) AS senior,
  SUM(CASE WHEN salary >= 70000 AND salary < 90000 THEN 1 ELSE 0 END) AS mid,
  SUM(CASE WHEN salary < 70000 THEN 1 ELSE 0 END) AS junior
FROM employees
GROUP BY dept_id
ORDER BY dept_id;`,result:"One row per department showing the tier breakdown. Engineering has 4 employees \u2014 3 Senior, 1 Mid.",transferPoint:"Conditional aggregation (SUM + CASE WHEN) is the SQL equivalent of COUNTIF in Excel. It's used in virtually every BI dashboard."},{co:"forge",icon:"\u{1F527}",title:"Safe Budget-per-Head Calculation",situation:"Ops wants budget per head per department, but two departments have zero employees \u2014 a direct division would crash.",sql:`SELECT d.name,
  d.budget,
  COUNT(e.id) AS headcount,
  CASE
    WHEN COUNT(e.id) = 0 THEN 'No staff'
    ELSE CAST(ROUND(d.budget / COUNT(e.id), 0) AS TEXT)
  END AS budget_per_head
FROM departments d
LEFT JOIN employees e ON e.dept_id = d.id
GROUP BY d.id, d.name, d.budget
ORDER BY d.budget DESC;`,result:"Departments with staff show the per-head budget. Those with zero staff show 'No staff' instead of crashing.",transferPoint:"Always guard against division-by-zero in SQL. CASE WHEN ... = 0 THEN fallback is the clearest approach; NULLIF is the compact one."}],recall:[{q:"CASE evaluates conditions top-to-bottom and returns the first match. So if salary >= 70000 appears BEFORE salary >= 90000, an employee earning $95k gets which label?",opts:["'Senior' \u2014 SQL checks >= 90000 first","'Mid' \u2014 >= 70000 matched first and evaluation stopped","An error \u2014 overlapping conditions","Both labels \u2014 SQL returns all matches"],ans:1,exp:"CASE stops at the FIRST true condition. salary >= 70000 is true for $95k, so it returns 'Mid' and never reaches >= 90000. Always put the most restrictive condition first."},{q:"COALESCE(NULL, NULL, 'fallback', 'other') returns?",opts:["NULL","'fallback'","'other'","An error"],ans:1,exp:"COALESCE returns the first non-NULL value. The first two arguments are NULL so they're skipped. 'fallback' is the third argument and is not NULL, so it's returned. 'other' is never evaluated."},{q:"NULLIF(salary, 0) when salary = 50000 returns?",opts:["NULL","0","50000","An error"],ans:2,exp:"NULLIF(a, b) returns NULL only when a equals b. 50000 \u2260 0, so NULLIF returns 50000 unchanged. It only produces NULL when the two arguments are equal."}],challenge:[{id:"c1",diff:"Hard",title:"Full Compensation Report",context:"Solange's quarterly board report: show each department's name, headcount, average salary (0dp), salary tier breakdown (senior/mid/junior counts), and a 'health' label: '\u{1F7E2} Balanced' if no tier exceeds 60% of headcount, '\u{1F7E1} Skewed' otherwise. Sort by avg_salary descending.",tables:["employees","departments"],starter:`-- Hint: join employees to departments, GROUP BY dept, use CASE + SUM
SELECT d.name AS department,
       COUNT(e.id) AS headcount,
       ROUND(AVG(e.salary), 0) AS avg_salary,
       SUM(CASE WHEN e.salary >= 90000 THEN 1 ELSE 0 END) AS senior,
       SUM(CASE WHEN e.salary >= 70000 AND e.salary < 90000 THEN 1 ELSE 0 END) AS mid,
       SUM(CASE WHEN e.salary < 70000 THEN 1 ELSE 0 END) AS junior,
       `,checks:[{t:"rows",n:5},{t:"col",c:"health"}],hints:["CASE WHEN MAX(SUM(senior),SUM(mid),SUM(junior)) > 0.6 * COUNT(e.id) \u2014 but SQLite doesn't have MAX for expressions: use nested CASE","Simpler: CASE WHEN senior > COUNT(e.id)*0.6 OR mid > COUNT(e.id)*0.6 OR junior > COUNT(e.id)*0.6 THEN '\u{1F7E1} Skewed' ELSE '\u{1F7E2} Balanced' END AS health","FROM departments d LEFT JOIN employees e ON e.dept_id = d.id GROUP BY d.id, d.name ORDER BY avg_salary DESC"],solution:`SELECT d.name AS department, COUNT(e.id) AS headcount,
  ROUND(AVG(e.salary), 0) AS avg_salary,
  SUM(CASE WHEN e.salary >= 90000 THEN 1 ELSE 0 END) AS senior,
  SUM(CASE WHEN e.salary >= 70000 AND e.salary < 90000 THEN 1 ELSE 0 END) AS mid,
  SUM(CASE WHEN e.salary < 70000 THEN 1 ELSE 0 END) AS junior,
  CASE
    WHEN SUM(CASE WHEN e.salary >= 90000 THEN 1 ELSE 0 END) > COUNT(e.id)*0.6
      OR SUM(CASE WHEN e.salary >= 70000 AND e.salary < 90000 THEN 1 ELSE 0 END) > COUNT(e.id)*0.6
      OR SUM(CASE WHEN e.salary < 70000 THEN 1 ELSE 0 END) > COUNT(e.id)*0.6
    THEN '\u{1F7E1} Skewed'
    ELSE '\u{1F7E2} Balanced'
  END AS health
FROM departments d
LEFT JOIN employees e ON e.dept_id = d.id
GROUP BY d.id, d.name
ORDER BY avg_salary DESC;`,celebration:"This combines JOIN, GROUP BY, conditional aggregation, and nested CASE \u2014 a production-grade compensation analysis query."}]},{id:"i3",title:"String Functions",tagline:"Clean, reshape, and search text data \u2014 the skill every analyst needs daily.",hook:{co:"nexus",day:"Tuesday, 10:07 am",msg:"Can you pull a clean contact list from customers? Lowercase emails, uppercase company names, and flag any .io domains. Also I need first names only from the employee list for the badge printer.",from:"Zara Oduya \xB7 Head of Growth",insight:"Raw text in databases is messy. String functions let you reshape, search, and standardise it \u2014 without touching the original data."},concepts:[{icon:"\u{1F520}",title:"UPPER(), LOWER(), LENGTH()",body:"UPPER(col) converts every character to uppercase. LOWER(col) converts every character to lowercase. LENGTH(col) returns the character count. All three functions are non-destructive \u2014 the stored data is never modified.",tip:"LOWER(email) is essential for case-insensitive comparisons. Two emails that look different may be the same person.",misconception:"These functions do not change the stored data. They only affect the result set of your query."},{icon:"\u{1F50D}",title:"LIKE \u2014 pattern matching",body:"LIKE matches strings against a pattern. % matches any sequence of characters (zero or more). _ matches exactly one character. LIKE is case-insensitive in SQLite. Use NOT LIKE to exclude patterns.",analogy:"Think of % as a wildcard in a card game \u2014 it stands in for anything. name LIKE 'A%' means: starts with A, followed by anything at all.",tip:"LIKE '%@gmail.com' finds all Gmail addresses. LIKE '2024-%' finds all 2024 dates."},{icon:"\u2702\uFE0F",title:"SUBSTR() and INSTR()",body:"SUBSTR(col, start, length) extracts a substring. Start is 1-based. INSTR(col, substring) returns the position of the first occurrence of a substring, or 0 if not found. Combine them to extract parts of structured strings.",tip:"SUBSTR(hire_date, 1, 4) extracts the year from a date string like '2019-03-15'. INSTR(name, ' ') finds the space between first and last name."},{icon:"\u{1F527}",title:"REPLACE() and TRIM()",body:"REPLACE(col, old, new) substitutes all occurrences of old with new. TRIM(col) removes leading and trailing whitespace. LTRIM and RTRIM target only the left or right side.",tip:"REPLACE(email, '@', ' [at] ') creates display-safe email addresses. TRIM() is essential after importing CSV data.",misconception:"REPLACE() is case-sensitive in SQLite. REPLACE(name, 'osei', 'X') will NOT match 'Osei'."}],seeit:[{lbl:"Normalise names and emails for a contact export",ann:"UPPER and LOWER work on any text column \u2014 they return a new value, never modify the stored data",sql:`SELECT
  UPPER(name) AS display_name,
  LOWER(email) AS clean_email
FROM customers

  SUBSTR(name, 1, INSTR(name, ' ') - 1) AS first_name,
  LENGTH(name) AS full_len
FROM employees
ORDER BY first_name;`},{lbl:"Anonymise emails for a data sample",ann:"REPLACE substitutes every occurrence of the pattern \u2014 useful for masking PII in dev copies",sql:`SELECT

ORDER BY display_name;`,checks:[{t:"rows",n:5},{t:"col",c:"domain_type"}],hints:["LOWER(email) for clean_email","io pattern: '%.io'","CASE WHEN classifies each row"],solution:"SELECT UPPER(name) AS display_name, LOWER(email) AS clean_email, CASE WHEN email LIKE '%.io' THEN 'Tech' ELSE 'Other' END AS domain_type FROM customers ORDER BY display_name;",whyItWorks:"Combining UPPER, LOWER, LIKE, and CASE WHEN in one query is very common in reporting. Each function processes independently \u2014 no performance cost beyond a single table scan."}],usecases:[{co:"nexus",icon:"\u{1F4CB}",title:"Contact List Export",situation:"Marketing needs a clean contact list: uppercase names, lowercase emails, flagged .io tech domains. The raw data has inconsistent casing from different import sources.",sql:`SELECT

ter:`SELECT

  END AS tenure_label
FROM employees
ORDER BY hire_year, first_name;`,celebration:"SUBSTR, INSTR, UPPER, and CASE WHEN combined \u2014 this is a real HR report that would have taken hours in Excel. You built it in one query."}]},{id:"i4",title:"Dates & Time",tagline:"Filter, group, and calculate across time \u2014 the backbone of business analytics.",hook:{co:"forge",day:"Thursday, 8:54 am",msg:"Need a quick one: how many employees did we hire each year? And who joined in the last few years \u2014 I need to plan onboarding cohorts. Also what is our average order volume by month?",from:"Rohan Reinholt \xB7 Operations Director",insight:"Dates look simple but contain hidden structure. Extracting year, month, and day \u2014 and calculating durations \u2014 unlocks time-series analysis in any domain."},concepts:[{icon:"\u{1F4C5}",title:"Date storage and strftime()",body:"SQLite stores dates as text in YYYY-MM-DD format (ISO 8601). The strftime(format, col) function extracts parts: '%Y' for year, '%m' for month, '%d' for day, '%Y-%m' for year-month. It can also format dates for display.",tip:"strftime('%Y', hire_date) is the most common date operation in SQLite. Always use ISO format strings for comparisons \u2014 '2024-01' sorts correctly as text.",misconception:"SQLite has no native DATE type. Dates are stored as text. This means you can use text comparisons like hire_date >= '2020-01-01' \u2014 they work because ISO format sorts lexicographically."},{icon:"\u23F1\uFE0F",title:"Date comparisons and filtering",body:"Because ISO dates sort correctly as text, you can use =, <, >, BETWEEN on date columns directly. hire_date >= '2020-01-01' returns everyone hired from 2020 onwards. BETWEEN '2019-01-01' AND '2021-12-31' is inclusive on both ends.",tip:"For current date comparisons in SQLite, use date('now'). hire_date >= date('now', '-1 year') finds employees hired in the last 12 months."},{icon:"\u{1F522}",title:"julianday() for duration arithmetic",body:"julianday(date) converts a date to a Julian Day Number \u2014 a continuous count of days since noon on 1 January 4713 BC. Subtracting two Julian Day values gives the exact number of days between them. Divide by 365.0 for years.",tip:"ROUND((julianday('2025-01-01') - julianday(hire_date)) / 365.0, 1) gives tenure in years to one decimal place."},{icon:"\u{1F4CA}",title:"Grouping by time period",body:"strftime() inside GROUP BY creates time-period aggregates. GROUP BY strftime('%Y', hire_date) groups by year. GROUP BY strftime('%Y-%m', order_date) groups by month. Combine with COUNT, SUM, AVG for time-series reports.",tip:"Always ORDER BY the time column after grouping by time \u2014 GROUP BY does not guarantee sort order."}],seeit:[{lbl:"Hiring timeline \u2014 hires per year",ann:"strftime extracts the year from each date string; GROUP BY then aggregates by that extracted value",sql:`SELECT
  strftime('%Y', hire_date) AS year,
  COUNT(*) AS hires
FROM employees
GROUP BY year
ORDER BY year;`},{lbl:"Employees hired since 2020",ann:"ISO dates sort as text \u2014 greater-than comparison works correctly on YYYY-MM-DD strings",sql:`SELECT name, hire_date,
  strftime('%Y', hire_date) AS year
FROM employees
WHERE hire_date >= '2020-01-01'
ORDER BY hire_date;`},{lbl:"Employee tenure in years",ann:"julianday subtraction gives days; dividing by 365 converts to years \u2014 ROUND keeps it readable",sql:`SELECT
  name,
  hire_date,
  ROUND((julianday('2025-01-01') - julianday(hire_date)) / 365.0, 1) AS tenure_yrs
FROM employees
ORDER BY tenure_yrs DESC;`},{lbl:"Monthly order volume",ann:"strftime('%Y-%m') groups by year-month, giving a month-by-month revenue time series",sql:`SELECT
  strftime('%Y-%m', order_date) AS month,
  COUNT(*) AS orders,
  SUM(qty) AS units_sold
FROM orders
GROUP BY month
ORDER BY month;`}],guided:[{id:"g1",diff:"Easy",title:"Hires per year summary",context:"Operations wants to know hiring volume by year to plan future capacity. Group employees by their hire year.",template:`SELECT
  %%D:strftime|SUBSTR|LENGTH%%('%Y', hire_date) AS hire_year,
  COUNT(*) AS hires

GROUP BY hire_year
ORDER BY hire_year;`,checks:[{t:"rows",n:7},{t:"col",c:"hire_year"}],hints:["strftime('%Y', hire_date) extracts the 4-digit year","GROUP BY the extracted year, ORDER BY it too"],solution:"SELECT strftime('%Y', hire_date) AS hire_year, COUNT(*) AS hires FROM employees GROUP BY hire_year ORDER BY hire_year;",whyItWorks:"strftime is SQLite's versatile date formatter. '%Y' extracts the 4-digit year from any YYYY-MM-DD string. Grouping by the extracted value creates a yearly histogram."},{id:"g2",diff:"Easy",title:"Recent hires \u2014 employees who joined from 2021 onwards",context:"HR is planning an onboarding cohort review for everyone hired since the start of 2021.",template:`SELECT name, hire_date

ORDER BY hire_date;`,checks:[{t:"rows",n:4}],hints:["Use >= for 'on or after'","Date string in ISO format: '2021-01-01'"],solution:"SELECT name, hire_date FROM employees WHERE hire_date >= '2021-01-01' ORDER BY hire_date;",whyItWorks:"ISO 8601 date strings (YYYY-MM-DD) sort correctly as text. '2021-01-15' > '2020-12-31' evaluates correctly even though these are strings, not native date types."},{id:"g3",diff:"Medium",title:"Calculate employee tenure",context:"Atlas Ventures needs each employee's tenure in years for a compensation benchmarking report. Use 1 January 2025 as the reference date.",template:`SELECT name, hire_date,
  ROUND((%%D:julianday|strftime|LENGTH%%('2025-01-01') - julianday(hire_date)) / %%B:divisor%%, 1) AS tenure_yrs

ORDER BY tenure_yrs DESC;`,checks:[{t:"rows",n:12},{t:"col",c:"tenure_yrs"}],hints:["julianday('2025-01-01') converts the reference date to days","julianday(hire_date) converts the hire date","Divide by 365.0 for years"],solution:"SELECT name, hire_date, ROUND((julianday('2025-01-01') - julianday(hire_date)) / 365.0, 1) AS tenure_yrs FROM employees ORDER BY tenure_yrs DESC;",whyItWorks:"julianday() converts any date to a continuous day count. Subtracting two values gives exact days between them. Dividing by 365.0 (not 365) ensures floating-point division for decimal years."},{id:"g4",diff:"Hard",type:"clauseorder",title:"Order the clauses of a time-series aggregation",context:"A query that extracts month from order_date, counts orders per month, and sorts the output uses a specific clause order.",clauses:["ORDER BY month","SELECT","GROUP BY month","FROM orders","WHERE order_date >= '2024-01-01'"],correctOrder:["SELECT","FROM orders","WHERE order_date >= '2024-01-01'","GROUP BY month","ORDER BY month"],hints:["SELECT defines the month alias using strftime","FROM specifies the orders table","WHERE filters before grouping","GROUP BY aggregates by the extracted month","ORDER BY sorts the final output"],whyItWorks:"WHERE runs before GROUP BY \u2014 it filters raw rows before they are aggregated. You cannot use the alias 'month' in WHERE because aliases are defined in SELECT, which logically runs after WHERE."}],usecases:[{co:"forge",icon:"\u{1F4E6}",title:"Quarterly Hiring Report",situation:"Rohan needs a quarterly hiring breakdown by year and quarter to align staffing with operational load. Each quarter should show headcount and average salary of new hires.",sql:`SELECT
  strftime('%Y', hire_date) AS year,
  CASE
    WHEN strftime('%m', hire_date) <= '03' THEN 'Q1'
    WHEN strftime('%m', hire_date) <= '06' THEN 'Q2'
    WHEN strftime('%m', hire_date) <= '09' THEN 'Q3'
    ELSE 'Q4'
  END AS quarter,
  COUNT(*) AS new_hires,
  ROUND(AVG(salary), 0) AS avg_salary
FROM employees
GROUP BY year, quarter
ORDER BY year, quarter;`,result:"7 rows showing hiring volume per year-quarter with average salary of new hires. Reveals seasonal hiring patterns.",transferPoint:"Combining strftime with CASE WHEN creates flexible time buckets. The same pattern works for fiscal quarters, academic terms, or any custom period."},{co:"nexus",icon:"\u{1F6D2}",title:"Monthly Revenue Trend",situation:"Zara needs a month-by-month order summary to identify peak sales periods and plan inventory.",sql:`SELECT
  strftime('%Y-%m', o.order_date) AS month,
  COUNT(DISTINCT o.id) AS orders,
  SUM(o.qty) AS units,
  ROUND(SUM(o.qty * p.price), 2) AS revenue
FROM orders o
JOIN products p ON p.id = o.product_id
GROUP BY month
ORDER BY month;`,result:"4 monthly rows with order count, units, and calculated revenue. Joins orders to products to compute line-item revenue.",transferPoint:"strftime('%Y-%m') is the standard month-grouping key. Always order by the time column \u2014 GROUP BY does not guarantee sort order."}],recall:[{q:"How does SQLite store dates, and why do text comparisons work on them?",opts:["As Unix timestamps \u2014 text comparison does not work","As YYYY-MM-DD text strings \u2014 ISO format sorts correctly as text","As integers (days since epoch) \u2014 comparison works numerically","As DATETIME objects \u2014 comparison uses special date logic"],ans:1,exp:"SQLite stores dates as YYYY-MM-DD text. Because ISO 8601 format always has year, then month, then day (all zero-padded), lexicographic text comparison gives the correct chronological result. '2021-03-15' < '2022-01-01' is true as text."},{q:"What does strftime('%Y-%m', order_date) return for the date '2024-03-15'?",opts:["'2024'","'03-2024'","'2024-03'","'15-03-2024'"],ans:2,exp:"strftime formats a date string according to the format argument. '%Y' is the 4-digit year, '%m' is the 2-digit month. Combined as '%Y-%m', the result is '2024-03'. This is the standard key for month-level grouping."},{q:"You want employees hired in the last 365 days. Which WHERE clause works correctly in SQLite?",opts:["WHERE hire_date = LAST_YEAR()","WHERE hire_date >= date('now', '-1 year')","WHERE hire_date >= NOW() - 365","WHERE DATEDIFF(NOW(), hire_date) <= 365"],ans:1,exp:"SQLite uses the date() function with modifiers. date('now', '-1 year') returns the date exactly one year ago from today. Comparisons on ISO date strings work correctly. DATEDIFF(), NOW(), and LAST_YEAR() are not SQLite functions."}],challenge:[{id:"c1",diff:"Hard",title:"Tenure and Hiring Cohort Report",context:"Build a complete employee timeline report: name, hire year, tenure in years (as of 2025-01-01, 1dp), a cohort label ('Founder' if hired before 2019, 'Growth' if 2019-2020, 'Scale' if 2021+), and their salary. Sort by tenure descending.",tables:["employees"],starter:`SELECT
  name,
  strftime('%Y', hire_date) AS hire_year,
  ROUND((julianday('2025-01-01') - julianday(hire_date)) / 365.0, 1) AS tenure_yrs,
  `,checks:[{t:"rows",n:12},{t:"col",c:"cohort"},{t:"col",c:"tenure_yrs"}],hints:["CASE WHEN strftime('%Y',hire_date) < '2019' THEN 'Founder'","WHEN strftime('%Y',hire_date) <= '2020' THEN 'Growth'","ELSE 'Scale' END AS cohort","ORDER BY tenure_yrs DESC"],solution:"SELECT name, strftime('%Y', hire_date) AS hire_year, ROUND((julianday('2025-01-01') - julianday(hire_date)) / 365.0, 1) AS tenure_yrs, CASE WHEN strftime('%Y', hire_date) < '2019' THEN 'Founder' WHEN strftime('%Y', hire_date) <= '2020' THEN 'Growth' ELSE 'Scale' END AS cohort, salary FROM employees ORDER BY tenure_yrs DESC;",celebration:"strftime, julianday, ROUND, and CASE WHEN \u2014 you just built a cohort analysis that HR teams pay consultants to produce. Every analyst needs this pattern."}]}]},{level:"Advanced",icon:"\u26A1",color:"#FF6B8A",modules:[{id:"a1",title:"Window Functions",tagline:"Rank, compare, and aggregate across rows \u2014 without losing any of them.",hook:{co:"atlas",from:"Solange Ibarra",day:"Mon 09:14",msg:"Can you add a salary rank column for each employee within their department? And their department average alongside? Without collapsing the rows into groups?",insight:"Window functions compute over a related set of rows while preserving every individual row in the output \u2014 unlike GROUP BY which collapses."},concepts:[{icon:"\u{1FA9F}",title:"OVER() \u2014 the window clause",body:"A window function computes across a set of rows related to the current row \u2014 called the 'window'. OVER() defines that window. With no arguments, the window is the entire result set. PARTITION BY divides rows into independent groups. ORDER BY inside OVER() controls the processing order within each partition.",analogy:"Think of a spreadsheet: =RANK(B2, B$2:B$100) computes per cell but sees the whole column. Window functions do the same \u2014 per row, but window-aware.",tip:"Window functions never reduce row count. That's the critical difference from GROUP BY."},{icon:"\u{1F3C6}",title:"RANK(), ROW_NUMBER(), DENSE_RANK()",body:"ROW_NUMBER() assigns unique sequential integers regardless of ties. RANK() assigns the same rank to ties and skips the next number (1,2,2,4). DENSE_RANK() ties share a rank with no gap (1,2,2,3).",tip:"Use ROW_NUMBER() to pick exactly one row per group. Use RANK() when ties should share a position."},{icon:"\u{1F4CA}",title:"PARTITION BY and ORDER BY inside OVER()",body:"PARTITION BY divides rows into independent groups before the function runs \u2014 like GROUP BY but without collapsing. ORDER BY inside OVER() controls computation order within each partition for ranking and offset functions.",misconception:"ORDER BY inside OVER() is separate from the query's final ORDER BY. One controls computation; the other controls output row order."},{icon:"\u2194\uFE0F",title:"LAG() and LEAD()",body:"LAG(col, n) returns the value n rows before the current row within the partition. LEAD(col, n) returns the value n rows ahead. Both accept an optional default when no prior/next row exists.",tip:"LAG(salary, 1, 0) returns the salary from the previous row in the ordered set, or 0 when no prior row exists \u2014 i.e. the very first row."}],seeit:[{lbl:"Rank employees by salary within department",ann:"RANK() with PARTITION BY resets the counter for each department group",sql:`SELECT name, dept_id, salary,
  RANK() OVER (PARTITION BY dept_id ORDER BY salary DESC) AS dept_rank
FROM employees
ORDER BY dept_id, dept_rank;`},{lbl:"Department average alongside each employee row",ann:"AVG() as a window function keeps all 12 rows \u2014 unlike GROUP BY which collapses to 5",sql:`SELECT name, dept_id, salary,
  ROUND(AVG(salary) OVER (PARTITION BY dept_id), 0) AS dept_avg,
  salary - ROUND(AVG(salary) OVER (PARTITION BY dept_id), 0) AS vs_avg
FROM employees
ORDER BY dept_id, salary DESC;`},{lbl:"ROW_NUMBER \u2014 pick top earner per department",ann:"Subquery assigns rn=1 to the top earner; outer WHERE filters to just those rows",sql:`SELECT * FROM (
  SELECT name, dept_id, salary,
    ROW_NUMBER() OVER (PARTITION BY dept_id ORDER BY salary DESC) AS rn
  FROM employees
) t
WHERE rn = 1;`},{lbl:"LAG \u2014 compare each employee to the previous hire",ann:"LAG() looks back one row in hire_date order; default 0 means the first row shows no prior salary",sql:`SELECT name, hire_date, salary,
  LAG(salary, 1, 0) OVER (ORDER BY hire_date) AS prev_salary,
  salary - LAG(salary, 1, 0) OVER (ORDER BY hire_date) AS diff
FROM employees
ORDER BY hire_date;`}],guided:[{id:"g1",diff:"Easy",title:"Rank all employees by salary company-wide",context:"Show each employee's name, salary, and their global salary rank. Highest earner = rank 1.",template:`SELECT name, salary,
  %%D:RANK|ROW_NUMBER|DENSE_RANK%%()
    OVER (ORDER BY salary %%D:DESC|ASC%%) AS salary_rank
FROM employees
ORDER BY salary_rank;`,checks:[{t:"rows",n:12},{t:"col",c:"salary_rank"}],hints:["RANK() handles ties; ROW_NUMBER() assigns unique numbers","Highest salary \u2192 rank 1 \u2192 ORDER BY salary DESC"],solution:"SELECT name, salary, RANK() OVER (ORDER BY salary DESC) AS salary_rank FROM employees ORDER BY salary_rank;",whyItWorks:"RANK() over the full table (no PARTITION BY) gives a single global ranking. DESC means highest earner = rank 1."},{id:"g2",diff:"Medium",title:"Add department average to each employee row",context:"Each row should show the employee's salary and their department's average salary. No row should be collapsed.",template:`SELECT name, dept_id, salary,
  ROUND(%%D:AVG|SUM|COUNT%%(salary)

FROM employees
ORDER BY dept_id, salary DESC;`,checks:[{t:"rows",n:12},{t:"col",c:"dept_avg"}],hints:["Use AVG to compute the average","PARTITION BY dept_id groups each department independently","group column: dept_id"],solution:"SELECT name, dept_id, salary, ROUND(AVG(salary) OVER (PARTITION BY dept_id), 0) AS dept_avg FROM employees ORDER BY dept_id, salary DESC;",whyItWorks:"AVG(salary) OVER (PARTITION BY dept_id) computes the average independently for each dept and attaches it to every row in that dept."},{id:"g3",diff:"Medium",type:"clauseorder",title:"Order the clauses of a window function query",context:"A query with filtering, window functions, and sorting uses a specific clause order.",clauses:["ORDER BY","SELECT","WHERE","FROM","HAVING"],correctOrder:["SELECT","FROM","WHERE","HAVING","ORDER BY"],hints:["SELECT contains the OVER() expression","FROM defines the source","WHERE filters rows before windowing","HAVING filters groups after aggregation","ORDER BY sorts the final output"],whyItWorks:"Window functions execute after WHERE and GROUP BY/HAVING because they need the filtered, grouped row set to form their windows. ORDER BY always runs last."},{id:"g4",diff:"Hard",title:"Top earner per department (subquery pattern)",context:"Return only the highest-paid employee per department using ROW_NUMBER() in a subquery.",template:`SELECT name, dept_id, salary FROM (
  SELECT name, dept_id, salary,
    ROW_NUMBER() OVER (%%B:partition clause%% ORDER BY salary DESC) AS rn
  FROM employees
) ranked
WHERE %%B:filter condition%%;`,checks:[{t:"rows",n:5},{t:"col",c:"salary"}],hints:["partition clause: PARTITION BY dept_id","filter condition: rn = 1"],solution:"SELECT name, dept_id, salary FROM (SELECT name, dept_id, salary, ROW_NUMBER() OVER (PARTITION BY dept_id ORDER BY salary DESC) AS rn FROM employees) ranked WHERE rn = 1;",whyItWorks:"ROW_NUMBER() always assigns unique numbers, so rn=1 is always exactly one row per partition \u2014 the top earner. The outer WHERE cannot reference window functions directly, hence the subquery."}],usecases:[{co:"atlas",icon:"\u{1F4C8}",title:"Executive Salary Report",situation:"The board wants each employee's salary, their department rank, and how they compare to their department average \u2014 all in one row.",sql:`SELECT e.name, d.name AS dept, e.salary,
  RANK() OVER (PARTITION BY e.dept_id ORDER BY e.salary DESC) AS dept_rank,
  ROUND(AVG(e.salary) OVER (PARTITION BY e.dept_id),0) AS dept_avg,
  e.salary - ROUND(AVG(e.salary) OVER (PARTITION BY e.dept_id),0) AS vs_avg
FROM employees e
JOIN departments d ON e.dept_id = d.id
ORDER BY d.name, dept_rank;`,result:"Every row shows individual salary, department rank, and deviation from the team average \u2014 no separate GROUP BY query needed.",transferPoint:"Window functions eliminate the need for self-joins or correlated subqueries when combining row-level data with group-level aggregates."},{co:"forge",icon:"\u{1F4E6}",title:"Running Order Total",situation:"Logistics wants a running total of order amounts over time to spot revenue acceleration.",sql:`SELECT o.id, c.name AS customer,
  ROUND(o.qty * p.price, 2) AS line_total, o.order_date,
  ROUND(SUM(o.qty * p.price) OVER (ORDER BY o.order_date
    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW), 2) AS running_total
FROM orders o
JOIN customers c ON o.customer_id = c.id
JOIN products p ON o.product_id = p.id
ORDER BY o.order_date;`,result:"Each row shows its own line total (qty \xD7 price) plus the cumulative running total of all orders up to that date.",transferPoint:"ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW is the standard frame for running totals."}],recall:[{q:"You need each employee's salary AND their department's average salary in the same output row. Which feature achieves this without a JOIN or subquery?",opts:["GROUP BY with ROLLUP","A window function with PARTITION BY","A correlated subquery","CASE WHEN with AVG"],ans:1,exp:"Window functions compute aggregates over a partition while preserving every row. GROUP BY collapses rows. A correlated subquery works but is verbose and slow. CASE WHEN cannot aggregate."},{q:"Scores are 100, 90, 90, 80. What does DENSE_RANK() produce?",opts:["1, 2, 3, 4","1, 2, 2, 4","1, 2, 2, 3","1, 1, 2, 3"],ans:2,exp:"DENSE_RANK() assigns the same rank to ties (90 and 90 both get rank 2) but does not skip the next number. So the sequence is 1, 2, 2, 3. RANK() would produce 1, 2, 2, 4 (skips 3)."},{q:"Why must a window function filter (e.g. WHERE rn = 1) go in a subquery or CTE rather than directly in WHERE?",opts:["Window functions can only be used in SELECT","WHERE is evaluated before window functions are computed","Window function results are cached separately","SQLite doesn't support window functions in WHERE"],ans:1,exp:"SQL evaluates clauses in this logical order: FROM \u2192 WHERE \u2192 GROUP BY \u2192 HAVING \u2192 SELECT (including window functions) \u2192 ORDER BY. Because window functions are computed at the SELECT stage, WHERE cannot reference them \u2014 the values don't exist yet. A subquery or CTE runs the window function first, then the outer query can filter on the result."}],challenge:[{id:"c1",diff:"Expert",title:"Full Window Function Analyst Report",context:"Build a complete report: each employee's name, department name, salary, global salary rank, department salary rank, department average salary (0dp), and a label 'Above' / 'Below' / 'At' comparing their salary to the department average. Sort by department name then department rank.",tables:["employees","departments"],starter:`-- Use two RANK() calls, one AVG() window function, a JOIN, and a CASE WHEN
SELECT
  e.name,
  d.name AS dept,
  e.salary,
  `,checks:[{t:"rows",n:12},{t:"col",c:"dept_rank"},{t:"col",c:"dept_avg"},{t:"col",c:"vs_avg"}],hints:["RANK() OVER (ORDER BY salary DESC) \u2014 global rank, no PARTITION","RANK() OVER (PARTITION BY dept_id ORDER BY salary DESC) \u2014 dept rank","ROUND(AVG(salary) OVER (PARTITION BY dept_id),0) \u2014 dept avg","CASE WHEN salary > dept_avg THEN 'Above' \u2014 reference the window expression inline"],solution:`SELECT e.name, d.name AS dept, e.salary,
  RANK() OVER (ORDER BY e.salary DESC) AS global_rank,
  RANK() OVER (PARTITION BY e.dept_id ORDER BY e.salary DESC) AS dept_rank,
  ROUND(AVG(e.salary) OVER (PARTITION BY e.dept_id),0) AS dept_avg,
  CASE
    WHEN e.salary > ROUND(AVG(e.salary) OVER (PARTITION BY e.dept_id),0) THEN 'Above'
    WHEN e.salary < ROUND(AVG(e.salary) OVER (PARTITION BY e.dept_id),0) THEN 'Below'
    ELSE 'At'
  END AS vs_avg
FROM employees e
JOIN departments d ON e.dept_id = d.id
ORDER BY dept, dept_rank;`,celebration:"RANK() twice, AVG() as a window function, ROUND(), JOIN, and CASE WHEN \u2014 all in one query. This is the kind of report that takes a junior analyst 45 minutes and a senior 5."}]},{id:"a2",title:"Subqueries & CTEs",tagline:"Break complex problems into readable, composable query blocks.",hook:{co:"nexus",from:"Zara Oduya",day:"Wed 14:32",msg:"I need customers who placed more than the average number of orders. The average comes from the orders table too. Can SQL compute and filter in the same query?",insight:"Subqueries and CTEs let you compute intermediate results and use them inside the same query \u2014 no temp tables, no separate query."},concepts:[{icon:"\u{1F4E6}",title:"Scalar subquery in WHERE",body:"A subquery in WHERE that returns exactly one value can be used like a literal: WHERE salary > (SELECT AVG(salary) FROM employees). SQL runs the inner query first, substitutes the result, then evaluates the outer condition.",tip:"If the subquery could return multiple rows, use IN or EXISTS instead of >, <, =."},{icon:"\u{1F517}",title:"Correlated subquery",body:"A correlated subquery references a column from the outer query, which means it executes once for every row the outer query processes. Example: WHERE salary > (SELECT AVG(salary) FROM employees e2 WHERE e2.dept_id = e.dept_id) recalculates the average for each employee's department.",misconception:"Correlated subqueries can be slow on large tables \u2014 window functions usually replace them more efficiently."},{icon:"\u{1F3D7}\uFE0F",title:"CTE \u2014 Common Table Expression",body:"WITH name AS (SELECT ...) names a subquery for the duration of the statement. The outer query can join against it or reference it multiple times. Chained CTEs (WITH a AS (...), b AS (...)) let you build up complexity step by step.",tip:"Think of a CTE as a named temporary view \u2014 it exists only for this query."},{icon:"\u{1F50D}",title:"EXISTS and NOT EXISTS",body:"EXISTS(subquery) returns TRUE if the subquery returns any rows. NOT EXISTS returns TRUE when no rows match. Both are typically faster than IN on large sets because they short-circuit at the first match.",tip:"SELECT 1 inside EXISTS is a convention \u2014 EXISTS only cares that rows exist, not what they contain."}],seeit:[{lbl:"Employees earning above company average",ann:"Scalar subquery runs once and substitutes its result into the outer WHERE",sql:`SELECT name, salary
FROM employees
WHERE salary > (SELECT AVG(salary) FROM employees)
ORDER BY salary DESC;`},{lbl:"CTE \u2014 department statistics",ann:"WITH names the intermediate result; the outer query joins against it like a table",sql:`WITH dept_stats AS (

)
SELECT d.name, s.headcount, s.avg_sal

ORDER BY c.name;`},{lbl:"NOT EXISTS \u2014 customers with no orders",ann:"NOT EXISTS finds rows with no match in the related table",sql:`SELECT c.name

SELECT d.name, s.headcount, s.avg_sal

  SELECT o.customer_id,
    ROUND(SUM(o.qty * p.price), 2) AS total_spend
  FROM orders o

CROSS JOIN avg_spend av
WHERE cs.total_spend > av.avg
ORDER BY cs.total_spend DESC;`,result:"Only above-average customers appear. Chained CTEs keep each computation step named and readable.",transferPoint:"Chained CTEs (WITH a AS (...), b AS (...)) build complexity step-by-step. Each CTE can reference previous ones."},{co:"forge",icon:"\u{1F4E6}",title:"Products Never Ordered",situation:"Operations wants products with no order history \u2014 potential dead inventory.",sql:`SELECT p.name, p.category, p.price

. It answers: what is common between these two queries? Like UNION, it removes duplicates from the result.",tip:"INTERSECT is useful for finding shared values: customers who also appear as suppliers, cities that have both offices and customers, products ordered by multiple customers."},{icon:"\u2212",title:"EXCEPT \u2014 rows in first but not second",body:"EXCEPT returns rows from the first query that do not appear in the second query. It is the SQL set difference: A minus B. Use it to find things that exist in one context but not another.",tip:"EXCEPT is ideal for gap analysis: products never ordered, employees with no manager, departments with no staff.",misconception:"EXCEPT is directional \u2014 A EXCEPT B gives different results from B EXCEPT A. The order of the two queries determines which set is subtracted from which."}],seeit:[{lbl:"All unique cities \u2014 departments and customers combined",ann:"UNION merges both lists and removes duplicates \u2014 each city appears once no matter how many times it occurs",sql:`SELECT city FROM departments

ustomers but no offices labelled 'Customer only', and cities with both labelled 'Both'. Connect sections with UNION ALL and sort by category then city.",tables:["departments","customers"],starter:`-- Dept cities not in customers

:"If you omit a column in INSERT, it receives its default value (often NULL). If that column has a NOT NULL constraint, the insert will fail."},{icon:"\u270F\uFE0F",title:"UPDATE \u2014 modify existing rows",body:"UPDATE table SET col = value WHERE condition modifies rows that match the condition. Without a WHERE clause, UPDATE modifies EVERY row in the table. You can update multiple columns in one statement: SET col1 = v1, col2 = v2.",tip:"Always write the WHERE clause first. Run it as a SELECT to verify which rows will change, then convert to UPDATE.",misconception:"An UPDATE without WHERE updates ALL rows silently \u2014 no warning, no confirmation. This is one of the most dangerous SQL mistakes in production."},{icon:"\u{1F5D1}\uFE0F",title:"DELETE FROM \u2014 remove rows",body:"DELETE FROM table WHERE condition removes matching rows permanently. Like UPDATE, a DELETE without WHERE deletes every row. Before running a DELETE, always run SELECT COUNT(*) FROM table WHERE condition to confirm the scope.",tip:"In production, always wrap DELETE and UPDATE in a transaction so you can ROLLBACK if something is wrong.",misconception:"DELETE cannot be undone without a transaction or a backup. There is no recycle bin \u2014 the rows are gone."},{icon:"\u{1F512}",title:"BEGIN, COMMIT and ROLLBACK",body:"A transaction groups multiple statements into one atomic unit. BEGIN starts it. COMMIT saves all changes. ROLLBACK cancels all changes made since BEGIN. If any statement fails inside a transaction, ROLLBACK restores the original state.",tip:"Always use transactions for multi-step updates. Updating a salary AND adding a log entry should either both succeed or both fail \u2014 never one without the other."}],seeit:[{lbl:"INSERT \u2014 add a new department",ann:"Column list is explicit: safer and self-documenting. Values match the column order.",sql:`INSERT INTO departments (id, name, city, budget)

ded to 2dp, (3) INSERT a new product: id=9, name='Desk Lamp', category='Accessories', price=34.99, stock=75. End with COMMIT and SELECT all products ordered by category and name.",tables:["products"],starter:`BEGIN;

  --r-xs:  8px;  --r-sm: 12px;  --r-md: 16px;  --r-lg: 20px;  --r-pill: 99px;

  /* Shadow / glow system \u2014 shadow-first, border-secondary */
  --shadow-card:  0 4px 32px rgba(4,6,18,.55), 0 1px 0 rgba(255,255,255,.04) inset;
  --shadow-hover: 0 8px 48px rgba(4,6,18,.7),  0 0 24px rgba(109,124,255,.08), 0 1px 0 rgba(255,255,255,.05) inset;
  --shadow-glow:  0 4px 24px rgba(109,124,255,.25);
  --shadow-sm:    0 2px 16px rgba(4,6,18,.4);

  --glass:      rgba(11,16,32,.85);
  --glass2:     rgba(17,24,43,.80);
  --glass-brd:  rgba(36,49,79,.55);

  --ease: cubic-bezier(.22,.68,0,1.15);
}

/* \u2500\u2500 Reset \u2500\u2500 */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

/* \u2500\u2500 Base \u2500\u2500 */
body {
  font-family: var(--font-ui);
  background: ${r.bg};
  color: ${r.tx};
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  font-feature-settings: "kern" 1;
  background-image:
    radial-gradient(rgba(109,124,255,.09) 1px, transparent 1px);
  background-size: 28px 28px;
}

/* \u2500\u2500 Glass card system \u2500\u2500 */
.glass-card {
  background: var(--glass);
  border: 1px solid var(--glass-brd);
  border-radius: var(--r-md);
  box-shadow: var(--shadow-card), inset 0 1px 0 rgba(255,255,255,.04);
  transition: transform .2s var(--ease), box-shadow .2s var(--ease), border-color .2s;
}
.glass-card:hover {
  transform: translateY(-1px);
  border-color: rgba(74,95,138,.7);
  box-shadow: var(--shadow-hover);
}
.glass-card-sm {
  background: var(--glass2);
  border: 1px solid var(--glass-brd);
  border-radius: var(--r-sm);
  box-shadow: var(--shadow-sm);
  transition: transform .2s var(--ease), box-shadow .2s, border-color .2s;
}
.glass-card-sm:hover {
  transform: translateY(-1px);
  border-color: rgba(74,95,138,.7);
  box-shadow: var(--shadow-hover);
}
.glass-flat {
  background: var(--glass2);
  border: 1px solid var(--glass-brd);
  border-radius: var(--r-sm);
  box-shadow: var(--shadow-sm);
}

/* \u2500\u2500 Typography \u2500\u2500 */
:where(h1,h2,h3,h4) {
  font-family: var(--font-head);
  text-wrap: balance;
  letter-spacing: -.025em;
}
:where(pre,code,kbd,samp,textarea,input,select) {
  font-family: var(--font-code);
  font-feature-settings: "liga" 0;   /* no ligatures in code */
  font-variant-numeric: tabular-nums;
  letter-spacing: 0;
}

/* \u2500\u2500 Scrollbars \u2500\u2500 */
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: ${r.brd}; border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: ${r.brdBright}; }

/* \u2500\u2500 Forms \u2500\u2500 */
textarea:focus, input:focus, select:focus {
  outline: 2px solid ${r.A};
  outline-offset: 2px;
}
button { cursor: pointer; font-family: var(--font-ui); }
select { font-family: var(--font-code); }

/* \u2500\u2500 Focus management \u2500\u2500 */
/* Mouse users: no visible ring. Keyboard users: high-contrast ring. */
:focus:not(:focus-visible) { outline: none; }
:focus-visible {
  outline: 2px solid ${r.AL};
  outline-offset: 3px;
  border-radius: 3px;
}

/* \u2500\u2500 Syntax highlight tokens \u2500\u2500 */
.hkw { color: #7dd3fc; font-weight: 600; }  /* keywords \u2014 electric cyan  */
.hst { color: #6ee7b7; }                     /* strings  \u2014 mint green     */
.hnu { color: #fda4af; }                     /* numbers  \u2014 soft rose      */
.hcm { color: ${r.t3}; font-style: italic; } /* comments                  */

/* \u2500\u2500 Animations \u2500\u2500 */
@keyframes slideUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0);    }
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-10px); }
  to   { opacity: 1; transform: translateY(0);     }
}
@keyframes glow {
  0%, 100% { box-shadow: 0 0 10px rgba(109,124,255,.3); }
  50%       { box-shadow: 0 0 28px rgba(109,124,255,.65); }
}
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.35;} }
@keyframes toastIn {
  from { opacity: 0; transform: translateY(20px) scale(.95); }
  to   { opacity: 1; transform: translateY(0)    scale(1);   }
}
@keyframes spin { to { transform: rotate(360deg); } }

.aUp    { animation: slideUp .32s var(--ease) both; }
.toastIn{ animation: toastIn .4s var(--ease) both; }
/* \u2500\u2500 Answer card: mint glow pulse on correct, rose shake on wrong \u2500\u2500 */
@keyframes flashGreen {
  0%   { box-shadow: var(--shadow-sm); border-color: rgba(36,49,79,.5); }
  30%  { box-shadow: 0 0 0 5px rgba(41,211,145,.28), 0 0 26px rgba(41,211,145,.22); border-color: #29D391; }
  65%  { box-shadow: 0 0 0 2px rgba(41,211,145,.14), 0 0 14px rgba(41,211,145,.14); border-color: #29D391; }
  100% { box-shadow: 0 0 12px rgba(41,211,145,.1); border-color: #29D391; }
}
@keyframes flashRed {
  0%,100% { transform: translateX(0); border-color: rgba(255,107,138,.45); }
  18%  { transform: translateX(-6px); }
  36%  { transform: translateX( 6px); }
  54%  { transform: translateX(-4px); }
  72%  { transform: translateX( 4px); }
  88%  { transform: translateX(-2px); }
}
.ans-correct { animation: flashGreen .52s cubic-bezier(.22,.68,0,1.2) both; }
.ans-wrong   { animation: flashRed   .40s cubic-bezier(.22,.68,0,1.2) both; }

/* \u2500\u2500 Drag-and-drop \u2500\u2500 */
.drag-chip        { cursor: grab; user-select: none; touch-action: none;
                    transition: transform .12s ease, opacity .12s, box-shadow .12s; }
.drag-chip:hover  { transform: translateY(-2px);
                    box-shadow: 0 6px 18px rgba(4,6,18,.5); }
.drag-chip:active { cursor: grabbing; opacity: .68; transform: scale(1.05) translateY(-3px);
                    box-shadow: 0 8px 24px rgba(4,6,18,.6); }
.drop-slot        { transition: background .15s, border-color .15s, transform .12s; }
.drop-slot.over   { background: rgba(109,124,255,.18) !important;
                    border-color: rgba(109,124,255,.7) !important; }

/* \u2500\u2500 Pill select \u2500\u2500 */
.pill-select { transition: background .15s, border-color .15s, color .15s; }
.pill-select:focus-within { outline: 2px solid rgba(34,211,238,.5); outline-offset: 2px; }

/* \u2500\u2500 Step unlock: brief slide-up \u2500\u2500 */
@keyframes stepUnlock {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.step-unlock { animation: stepUnlock .26s cubic-bezier(.22,.68,0,1.15) both; }

/* \u2500\u2500 Lesson completion badge pop \u2500\u2500 */
@keyframes badgePop {
  0%   { transform: scale(.6) rotate(-6deg); opacity: 0; }
  55%  { transform: scale(1.12) rotate(3deg); opacity: 1; }
  80%  { transform: scale(.96) rotate(-1deg); }
  100% { transform: scale(1) rotate(0deg); }
}
@keyframes completionRise {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* \u2500\u2500 Workspace panel: smooth slide up, not pop \u2500\u2500 */
@keyframes backdropFadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes panelSlideIn {
  from { opacity: 0; transform: translate(-50%, calc(-50% + 24px)) scale(.97); }
  to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}

/* \u2500\u2500 Responsive helpers \u2500\u2500 */
@media (min-width: 1400px) {
  .glass-card    { border-radius: 20px; }
  .glass-card-sm { border-radius: 16px; }
}
/* \u2500\u2500 Concept card label chips \u2500\u2500 */
.concept-label {
  display: inline-block;
  font-size: 10px; font-weight: 700;
  letter-spacing: .6px; text-transform: uppercase;
  padding: 2px 7px; border-radius: 4px;
  margin-bottom: 5px;
}
/* \u2500\u2500 Consistent section dividers inside cards \u2500\u2500 */
.card-section + .card-section {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid rgba(36,49,79,.3);
}
@media (max-width: 640px)  {
  .hide-sm  { display: none !important; }
  .sm-col   { flex-direction: column !important; }
  .sm-full  { width: 100% !important; }
  .sm-grid1 { grid-template-columns: 1fr !important; }
}
@media (max-width: 900px) {
  .hide-md { display: none !important; }
}

/* \u2500\u2500 Accessibility \u2500\u2500 */
.skip-link {
  position: absolute; top: -48px; left: 0;
  background: ${r.A}; color: ${r.bg};
  padding: 10px 18px; font-weight: 700; font-size: 14px;
  z-index: 9999; border-radius: 0 0 8px 0;
  transition: top .2s;
}
.skip-link:focus { top: 0; }

/* \u2500\u2500 Achievement toast dismiss bar \u2500\u2500 */
@keyframes shrinkBar {
  from { width: 100%; }
  to   { width: 0%;   }
}
@keyframes indeterminateBar {
  0%   { transform: translateX(-100%) scaleX(.3); }
  50%  { transform: translateX(30%)   scaleX(.7); }
  100% { transform: translateX(100%)  scaleX(.3); }
}

/* \u2500\u2500 SQL Playground IDE \u2500\u2500 */
textarea.sql-editor::selection { background: rgba(109,124,255,.22); }
@keyframes rowFadeIn { from{opacity:0;transform:translateX(-6px);} to{opacity:1;transform:translateX(0);} }
@keyframes shimmer { from { background-position: -200% 0; } to { background-position: 200% 0; } }

/* \u2500\u2500 Ticket / scenario cards \u2500\u2500 */
.ticket-card { position: relative; overflow: hidden; }
.ticket-card::before {
  content: "";
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--ticket-accent, rgba(109,124,255,.6));
}
@keyframes urgentPulse { 0%,100%{opacity:1;} 50%{opacity:.5;} }
.badge-urgent { animation: urgentPulse 2s ease infinite; }
