                  <span style={{color:T.t3,fontSize:10,fontFamily:"var(--font-code)",
                    minWidth:16,paddingTop:1}}>{i+1}</span>
                  <span style={{color:T.t2,fontSize:12.5,fontFamily:"var(--font-code)",
                    lineHeight:1.6}}>{String(row[row.length-1])}</span>
                </div>
              ))}
              <div style={{marginTop:10,padding:"10px 14px",background:"rgba(36,49,79,.2)",
                borderRadius:"var(--r-xs)",fontSize:12,color:T.t3,lineHeight:1.65}}>
                💡 Each row shows how SQLite will scan/filter your data.
                "SCAN" = full table scan. "SEARCH" = index used (faster).
              </div>
            </div>
          )}

          {/* Diff tab */}
          {activeTab==="diff"&&(
            <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:0}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",flex:1}}>
                <div style={{borderRight:"1px solid rgba(36,49,79,.4)"}}>
                  <div style={{padding:"7px 14px",fontSize:10.5,fontWeight:600,
                    color:err?T.R:T.B,background:"rgba(6,8,22,.5)"}}>
                    Your result {res?`(${res.values?.length||0} rows)`:""}
                  </div>
                  {res?<RT res={res} err={err} ran={true}/>
                    :<div style={{padding:"18px",color:T.t3,fontSize:12}}>Run your query first</div>}
                </div>
                <div>
                  <div style={{padding:"7px 14px",fontSize:10.5,fontWeight:600,
                    color:T.S,background:"rgba(6,8,22,.5)"}}>
                    Ideal result {solRes?`(${solRes.values?.length||0} rows)`:""}
                  </div>
                  {solRes?<RT res={solRes} err={null} ran={true}/>
                    :<div style={{padding:"18px",color:T.t3,fontSize:12}}>Loading…</div>}
                </div>
              </div>
              {res&&solRes&&(
                <div style={{padding:"10px 16px",background:"rgba(4,6,18,.5)",
                  borderTop:"1px solid rgba(36,49,79,.3)",fontSize:12,color:T.t3}}>
                  {res.values?.length===solRes.values?.length&&
                   JSON.stringify(res.columns)===JSON.stringify(solRes.columns)
                    ?<span style={{color:T.S}}>✓ Row count and columns match</span>
                    :<span style={{color:T.warn.tx}}>
                      Row count: {res.values?.length} vs {solRes.values?.length} ·
                      Columns: {res.columns?.join(", ")||"—"} vs {solRes.columns?.join(", ")||"—"}
                    </span>}
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function Console({initSQL="",db,compact,checks,onPass}){
  const[sql,setSql]=useState(initSQL); const[res,setR]=useState(null);
  const[err,setE]=useState(null); const[ran,setRn]=useState(false); const[val,setV]=useState(null);
  const ta=useRef();
  const run=useCallback(()=>{if(!db)return;setE(null);setR(null);setRn(true);setV(null);
    try{const r=runDB(db,sql);setR(r);if(checks?.length){const v=validate(r,checks);setV(v);if(v?.ok&&onPass)onPass();}}
    catch(e){setE(e.message);}},[db,sql,checks,onPass]);
  const onKey=e=>{if((e.ctrlKey||e.metaKey)&&e.key==="Enter"){e.preventDefault();run();}
    if(e.key==="Tab"){e.preventDefault();const el=ta.current,p=el.selectionStart;
      setSql(v=>v.slice(0,p)+"  "+v.slice(el.selectionEnd));
      requestAnimationFrame(()=>{el.selectionStart=el.selectionEnd=p+2;});}};
  return <div className="glass-card-sm" style={{overflow:"hidden"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
      padding:"8px 14px",background:"rgba(4,6,18,.4)"}}>
      <div style={{display:"flex",gap:5}}>
        {["#ff5f57","#febc2e","#28c840"].map(c=><div key={c} style={{width:9,height:9,borderRadius:"50%",background:c,opacity:.6}}/>)}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:10.5,color:T.t3,fontFamily:"var(--font-code)"}}>Ctrl+Enter</span>
        <button onClick={run} disabled={!db}
          style={{background:db?T.A:"rgba(36,49,79,.5)",border:"none",borderRadius:"var(--r-xs)",
            color:db?"#060816":T.t3,padding:"5px 16px",fontSize:12.5,fontWeight:700,
            transition:"all .2s",boxShadow:db?"0 2px 12px rgba(109,124,255,.4)":"none"}}>
          ▶ Run
        </button>
      </div>
    </div>
    <textarea ref={ta} value={sql} onChange={e=>setSql(e.target.value)} onKeyDown={onKey}
      spellCheck={false} style={{width:"100%",height:compact?88:136,padding:"14px 18px",
        background:"rgba(4,6,18,.45)",color:T.tx,border:"none",
        fontFamily:"var(--font-code)",fontSize:13,lineHeight:1.9,resize:"vertical"}}/>
    <RT res={res} err={err} ran={ran}/>
    <ValFB val={val}/>
  </div>;
}

/* ─── PILL DROPDOWN — smart inline menu near each slot ─ */
function PillSelect({options,value,onChange,validated,correct}){
  const[open,setOpen]=useState(false);
  const[dropUp,setDropUp]=useState(false);
  const ref=useRef();

  useEffect(()=>{
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener("mousedown",h);
    return()=>document.removeEventListener("mousedown",h);
  },[]);

  // Decide drop direction when opening
  function handleToggle(){
    if(!open && ref.current){
      const rect=ref.current.getBoundingClientRect();
      const spaceBelow=window.innerHeight - rect.bottom;
      // Each option ~38px; flip up if less than 60px per option below
      setDropUp(spaceBelow < options.length * 38 + 16);
    }
    setOpen(function(o){return !o;});
  }

  let bg,brd,col,icon=null;
  if(!value){bg="rgba(34,211,238,.07)";brd=T.B+"55";col=T.t3;}
  else if(validated==null){bg="rgba(34,211,238,.12)";brd=T.B;col=T.BL;}
  else if(correct){bg=T.ok.bg;brd=T.S;col=T.S;icon="✓";}
  else{bg=T.err.bg;brd=T.R;col=T.R;icon="✗";}

  const menuStyle = {
    position:"absolute",
    left:0,
    zIndex:500,
    minWidth:160,
    background:"rgba(11,16,32,.97)",
    border:"1px solid rgba(34,211,238,.3)",
    borderRadius:"var(--r-sm)",
    boxShadow:"0 8px 32px rgba(4,6,18,.8)",
    overflow:"hidden",
    backdropFilter:"blur(8px)",
    animation:"slideUp .18s ease both",
  };
  if(dropUp){
    menuStyle.bottom="calc(100% + 6px)";
    menuStyle.top="auto";
    menuStyle.animation="slideDown .18s ease both";
  } else {
    menuStyle.top="calc(100% + 6px)";
    menuStyle.bottom="auto";
  }

  return <span ref={ref} className="pill-select"
    style={{position:"relative",display:"inline-flex",alignItems:"center",verticalAlign:"baseline"}}>
    <button onClick={handleToggle}
      style={{display:"inline-flex",alignItems:"center",gap:5,
        padding:"3px 12px 3px 10px",
        borderRadius:"var(--r-pill)",border:"1.5px solid "+brd,
        background:bg,color:col,fontFamily:"var(--font-code)",fontSize:13,
        cursor:"pointer",whiteSpace:"nowrap",transition:"all .15s",lineHeight:"inherit",
        fontStyle:value?"normal":"italic"}}>
      {icon&&<span style={{fontSize:11,fontWeight:700,marginRight:3}}>{icon}</span>}
      {value||"pick one ▾"}
    </button>
    {open&&<div style={menuStyle}>
      {options.map(function(o){
        return <button key={o} onClick={function(){onChange(o);setOpen(false);}}
          style={{width:"100%",display:"block",textAlign:"left",padding:"10px 16px",
            background:o===value?"rgba(34,211,238,.12)":"transparent",
            border:"none",color:o===value?T.B:T.t2,
            fontFamily:"var(--font-code)",fontSize:13,cursor:"pointer",
            transition:"background .1s"}}
          onMouseEnter={function(e){e.currentTarget.style.background="rgba(36,49,79,.5)";}}
          onMouseLeave={function(e){e.currentTarget.style.background=o===value?"rgba(34,211,238,.12)":"transparent";}}>
          {o===value&&<span style={{color:T.B,marginRight:6,fontSize:10}}>●</span>}
          {o}
        </button>;
      })}
    </div>}
  </span>;
}

/* ─── TEMPLATE EDITOR — pill slots, colour-coded feedback ─ */
function TplEd({template,fills,setFills,db,checks,onPass}){
  const parts=useMemo(()=>parseTpl(template),[template]);
  const[res,setR]=useState(null); const[err,setE]=useState(null);
  const[ran,setRn]=useState(false); const[val,setV]=useState(null);

  // Build render elements
  const el=[]; let bi=0;
  for(let i=0;i<parts.length;i++){
    const p=parts[i];
    if(p.k==="text"){
      p.v.split("\n").forEach((l,li,arr)=>{
        el.push(<span key={`t${i}l${li}`} dangerouslySetInnerHTML={{__html:hlSQL(l)}}/>);
        if(li<arr.length-1)el.push(<br key={`br${i}${li}`}/>);
      });
    } else if(p.k==="blank"){
      const idx=bi++;
      const w=Math.max(p.hint.length*8.5,80);
      let brd=`${T.A}55`, bg="rgba(14,21,48,.9)", col=T.AL;
      if(val){if(val.ok){brd=T.S;bg=T.ok.bg;col=T.S;}else{brd=T.R;bg=T.err.bg;col=T.R;}}
      el.push(<input key={`b${i}`} value={fills[idx]||""} placeholder={p.hint} spellCheck={false}
        onChange={e=>setFills(f=>({...f,[idx]:e.target.value}))}
        style={{display:"inline-block",width:w,verticalAlign:"baseline",
          background:bg,border:`1.5px dashed ${brd}`,borderRadius:"var(--r-pill)",
          color:col,fontFamily:"var(--font-code)",fontSize:13,
          padding:"2px 10px",lineHeight:"inherit",outline:"none",
          transition:"all .2s"}}
        onFocus={e=>{e.target.style.borderStyle="solid";e.target.style.background="rgba(20,32,69,.95)";}}
        onBlur={e=>{e.target.style.borderStyle="dashed";}}/>);
    } else {
      const idx=bi++;
      el.push(<PillSelect key={`d${i}`}
        options={p.opts}
        value={fills[idx]||""}
        onChange={v=>setFills(f=>({...f,[idx]:v}))}
        validated={val?val.ok:null}
        correct={val?.ok??null}/>);
    }
  }

  const run=()=>{if(!db)return;setE(null);setR(null);setRn(true);setV(null);
    const sql=asmSql(template,Object.values(fills));
    try{const r=runDB(db,sql);setR(r);const v=validate(r,checks||[]);setV(v);if(v?.ok&&onPass)onPass();}
    catch(e){setE(e.message);}};

  const tot=(template.match(/%%[BD]:/g)||[]).length;
  const fil=Object.values(fills).filter(v=>v?.trim()).length;

  return <div className="glass-card-sm" style={{overflow:"visible"}}>
    {/* Toolbar */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
      padding:"8px 16px",background:"rgba(4,6,18,.4)",borderRadius:"var(--r-sm) var(--r-sm) 0 0"}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        {/* Progress dots */}
        <div style={{display:"flex",gap:5}}>
          {Array.from({length:tot}).map((_,i)=>{
            const filled=fills[i]?.trim();
            const color=filled?(val!=null?(val.ok?T.S:T.R):T.A):T.brd;
            return <div key={i} style={{width:7,height:7,borderRadius:"50%",
              background:color,transition:"background .25s",
              boxShadow:filled?`0 0 6px ${color}88`:undefined}}/>;
          })}
        </div>
        <span style={{fontSize:11.5,color:T.t3,fontFamily:"var(--font-code)"}}>
          {fil}/{tot}
        </span>
      </div>
      <button onClick={run} disabled={!db||fil<tot}
        style={{background:(db&&fil>=tot)?T.A:"rgba(36,49,79,.4)",
          border:"none",borderRadius:"var(--r-xs)",
          color:(db&&fil>=tot)?"#060816":T.t4,
          padding:"5px 18px",fontSize:13,fontWeight:700,
          transition:"all .2s",cursor:(db&&fil>=tot)?"pointer":"not-allowed",
          boxShadow:(db&&fil>=tot)?"0 2px 12px rgba(109,124,255,.4)":"none"}}>
        ▶ Check
      </button>
    </div>
    {/* Code body with pill slots */}
    <div style={{fontFamily:"var(--font-code)",fontSize:13,lineHeight:2.4,
      background:"rgba(4,6,18,.45)",padding:"16px 22px",
      overflowX:"auto",whiteSpace:"pre-wrap",position:"relative"}}>
      {el}
    </div>
    <RT res={res} err={err} ran={ran}/>
    <ValFB val={val}/>
  </div>;
}

/* ─── CONTEXT PANEL ──────────────────────────────────── */
function CtxPanel({db,tables}){
  const[prev,setP]=useState({}); const[open,setO]=useState(false);
  useEffect(()=>{if(!db||!tables?.length)return;const o={};
    for(const t of tables){try{const r=db.exec(`SELECT * FROM ${t} LIMIT 3`);if(r.length)o[t]=r[0];}catch(e){}}
    setP(o);},[db,tables?.join(",")]);
  if(!tables?.length)return null;
  return <div style={{marginBottom:16}}>
    <button onClick={()=>setO(o=>!o)} style={{display:"flex",alignItems:"center",gap:6,
      background:"none",border:"none",cursor:"pointer",padding:"0 0 8px",color:T.t3}}>
      <span style={{fontSize:12,color:open?T.B:T.t3,fontWeight:500}}>
        {open?"▾":"▸"} Table reference — {tables.join(", ")}

    {open&&<div className="glass-flat" style={{padding:"14px 16px",display:"flex",flexDirection:"column",gap:14}}>
      {tables.map(t=>(
        <div key={t}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,flexWrap:"wrap"}}>

            <span style={{fontFamily:"var(--font-code)",fontSize:12.5,fontWeight:600,color:TC[t]||T.B}}>
              {t}
            </span>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              {SCHEMA_MAP[t]?.map(c=>(
                <span key={c} style={{fontSize:10,color:T.t3,background:"rgba(36,49,79,.4)",
                  padding:"1px 7px",borderRadius:"var(--r-xs)",
                  fontFamily:"var(--font-code)"}}>{c}</span>
              ))}
            </div>
          </div>
          {prev[t]&&<div style={{overflowX:"auto",borderRadius:"var(--r-xs)"}}>
            <table style={{borderCollapse:"collapse",fontSize:11,fontFamily:"var(--font-code)",width:"100%"}}>

                  fontWeight:500,fontSize:10}}>{c}</th>
              ))}</tr></thead>

                    <td key={j} style={{padding:"4px 12px",color:cell===null?T.t3:T.t2,whiteSpace:"nowrap"}}>
                      {cell===null?<em style={{color:T.t3}}>NULL</em>:String(cell)}
                    </td>
                  ))}
                </tr>
              ))}</tbody>
            </table>
            <div style={{padding:"2px 12px",color:T.t3,fontSize:10,fontFamily:"var(--font-code)",
              background:"rgba(4,6,18,.4)"}}>first 3 rows</div>
          </div>}
        </div>
      ))}
    </div>}
  </div>;
}

/* ─── STEP WRAPPER — glass card, 16px radius ─────────── */
function Step({num,icon,label,color,children,locked,complete,stepRef}){
  const[open,setOpen]=useState(!locked);
  const domRef=useRef();
  // Expose open() to parent via stepRef for auto-expand on unlock
  useEffect(()=>{
    if(stepRef) stepRef.current={
      open:()=>{
        setOpen(true);
        // Small delay so the state update renders first, then scroll
        setTimeout(()=>{
          domRef.current?.scrollIntoView({behavior:'smooth',block:'nearest'});
        },60);
      },
    };
  },[stepRef]);
  // When locked changes false→true (step just unlocked), auto-open
  const prevLocked=useRef(locked);
  useEffect(()=>{
    if(prevLocked.current&&!locked){
      setOpen(true);
      setTimeout(()=>{
        domRef.current?.scrollIntoView({behavior:'smooth',block:'nearest'});
      },80);
    }
    prevLocked.current=locked;
  },[locked]);
  const toggle=()=>!locked&&setOpen(o=>!o);
  return <div ref={domRef} style={{marginBottom:10}}>
    <div role="button" tabIndex={locked?-1:0}
      aria-expanded={!locked&&open}
      aria-label={`Step ${num}: ${label}${locked?" (locked)":complete?" (complete)":""}`}
      onClick={toggle}
      onKeyDown={e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();toggle();}}}
      style={{display:"flex",alignItems:"center",gap:16,padding:"18px 24px",cursor:locked?"not-allowed":"pointer",
        background:complete?`linear-gradient(135deg,${color}1a,${color}0a)`
          :locked?"rgba(11,16,32,.55)":"rgba(17,24,43,.72)",
        border:`1px solid ${complete?color+"4a":locked?"rgba(36,49,79,.28)":"rgba(36,49,79,.5)"}`,
        borderRadius:open&&!locked?"var(--r-md) var(--r-md) 0 0":"var(--r-md)",
        boxShadow:complete?`0 0 32px ${color}22,var(--shadow-sm)`:locked?"none":"var(--shadow-sm)",
        transition:"all .22s var(--ease)"}}
      onMouseEnter={e=>{if(!locked&&!complete){
        e.currentTarget.style.borderColor=`${color}60`;
        e.currentTarget.style.transform="translateY(-2px)";
        e.currentTarget.style.boxShadow=`0 10px 40px rgba(4,6,18,.65), 0 0 22px ${color}18`;
      }}}
      onMouseLeave={e=>{if(!locked&&!complete){
        e.currentTarget.style.borderColor="rgba(36,49,79,.5)";
        e.currentTarget.style.transform="translateY(0)";
        e.currentTarget.style.boxShadow="var(--shadow-sm)";
      }}}>
      {/* Step badge */}
      <div style={{width:40,height:40,borderRadius:"50%",flexShrink:0,
        border:`2px solid ${locked?"rgba(36,49,79,.3)":complete?color:`${color}55`}`,
        background:complete?`${color}22`:locked?"rgba(11,16,32,.4)":"rgba(17,24,43,.6)",
        display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,
        boxShadow:complete?`0 0 16px ${color}44`:undefined,
        transition:"all .3s"}} aria-hidden="true">
        {complete?"✓":locked?"🔒":icon}
      </div>
      <div style={{flex:1}}>
        <div style={{fontFamily:"var(--font-head)",fontWeight:700,fontSize:17,
          color:locked?T.t4:complete?color:T.tx,letterSpacing:"-.02em",lineHeight:1.2}}>
          {label}
        </div>
        {locked&&<div style={{fontSize:12.5,color:T.t4,marginTop:4}}>
          Complete the previous step to unlock
        </div>}
      </div>
      {!locked&&<span style={{color:T.t3,fontSize:18,transition:"transform .22s",
        transform:open?"rotate(180deg)":"none",flexShrink:0}} aria-hidden="true">▾</span>}
    </div>
    {open&&!locked&&<div className="step-unlock" style={{
      background:"rgba(6,8,22,.6)",
      border:"1px solid rgba(36,49,79,.42)",
      borderTop:"none",
      borderRadius:"0 0 var(--r-md) var(--r-md)",
      padding:"clamp(24px, 3vw, 44px) clamp(24px, 3.5vw, 52px)",
    }}>{children}</div>}

/* ─── MCQ RECALL BLOCK — premium answer cards ───────── */
function Recall({questions,onAllDone}){
  // answers[qi] = index chosen. eliminated[qi] = set of elim indices.
  const[answers,setAnswers]=useState({});
  const[eliminated,setElim]=useState({});
  const[whyOpen,setWhy]=useState({});

  const allDone=questions.every((_,i)=>answers[i]!==undefined);
  useEffect(()=>{if(allDone&&onAllDone)onAllDone();},[allDone]);

  return <div style={{display:"flex",flexDirection:"column",gap:20}}>
    {questions.map((q,qi)=>{
      const sel=answers[qi];
      const done=sel!==undefined;
      const isRight=sel===q.ans;
      const elim=eliminated[qi]||new Set();
      // After first wrong attempt expose lifeline
      const canElim=done&&!isRight&&elim.size===0;

      const pick=(i)=>{
        if(done||elim.has(i))return;
        setAnswers(a=>({...a,[qi]:i}));
      };
      const eliminate=()=>{
        // pick a random wrong answer (not the correct, not already eliminated)
        const wrongs=q.opts.map((_,i)=>i).filter(i=>i!==q.ans&&!elim.has(i)&&i!==sel);
        if(!wrongs.length)return;
        const victim=wrongs[Math.floor(Math.random()*wrongs.length)];
        setElim(e=>({...e,[qi]:new Set([...elim,victim])}));
      };

      return <div key={qi} className="glass-card-sm" style={{padding:"22px 24px"}}>
        {/* Question */}
        <div style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:20}}>
          <span style={{flexShrink:0,width:28,height:28,borderRadius:"50%",
            background:done?(isRight?T.ok.bg:T.err.bg):"rgba(36,49,79,.55)",
            border:`1.5px solid ${done?(isRight?T.S:T.R):"rgba(36,49,79,.6)"}`,
            display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:11,fontWeight:700,color:done?(isRight?T.S:T.R):T.t3,
            transition:"all .3s",boxShadow:done&&isRight?`0 0 12px ${T.S}44`:undefined}}>
            {done?(isRight?"✓":"✗"):qi+1}
          </span>
          <div style={{fontSize:15.5,fontWeight:600,color:T.tx,lineHeight:1.6}}>{q.q}</div>
        </div>

        {/* Answer cards — full-width stacked */}
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {q.opts.map((opt,i)=>{
            const isC=i===q.ans, isS=i===sel, isElim=elim.has(i);
            let bg="rgba(17,24,43,.55)";
            let brd="rgba(36,49,79,.5)";
            let col=T.t2;
            let cls="";
            let icon=String.fromCharCode(65+i);

            if(isElim){bg="rgba(11,16,32,.3)";brd="rgba(36,49,79,.2)";col=T.t4;icon="—";}
            else if(done){
              if(isC){bg=T.ok.bg;brd=T.S;col=T.tx;cls="ans-correct";icon="✓";}
              else if(isS){bg=T.err.bg;brd=T.R;col=T.err.tx;cls="ans-wrong";icon="✗";}
              else{col=T.t3;brd="rgba(36,49,79,.28)";}
            }

            return <button key={i} className={cls}
              onClick={()=>pick(i)}
              disabled={isElim||done}
              style={{background:bg,border:`1.5px solid ${brd}`,
                borderRadius:"var(--r-sm)",padding:"13px 18px",
                textAlign:"left",color:col,width:"100%",
                cursor:(isElim||done)?"default":"pointer",
                fontSize:14,lineHeight:1.55,
                display:"flex",gap:12,alignItems:"flex-start",
                opacity:isElim?.35:1,
                transition:"background .18s, border-color .18s, opacity .2s"}}
              onMouseEnter={e=>{if(!done&&!isElim){
                e.currentTarget.style.background="rgba(36,49,79,.48)";
                e.currentTarget.style.transform="translateY(-1px)";
                e.currentTarget.style.boxShadow="0 4px 20px rgba(4,6,18,.45)";
              }}}
              onMouseLeave={e=>{if(!done&&!isElim){
                e.currentTarget.style.background=bg;
                e.currentTarget.style.transform="translateY(0)";
                e.currentTarget.style.boxShadow="none";
              }}}>
              <span style={{width:26,height:26,borderRadius:"50%",
                border:`1.5px solid ${brd}`,flexShrink:0,
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:10.5,fontWeight:700,color:col,marginTop:1,
                background:isC&&done?`${T.S}22`:isS&&done?`${T.R}22`:isElim?"transparent":"rgba(255,255,255,.03)",
                boxShadow:`inset 0 1px 0 rgba(255,255,255,.05)`}}>
                {icon}
              </span>
              <span style={{flex:1,textDecoration:isElim?"line-through":"none"}}>{opt}</span>
            </button>;
          })}
        </div>

        {/* Post-answer row: lifeline + why */}
        {done&&<div style={{marginTop:14,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          {canElim&&<button onClick={eliminate}
            style={{background:"rgba(167,139,250,.12)",border:"1px solid rgba(167,139,250,.3)",
              borderRadius:"var(--r-pill)",color:T.M,padding:"5px 14px",
              fontSize:12,fontWeight:600,cursor:"pointer"}}>
            ⚡ Eliminate a wrong answer
          </button>}
          {q.exp&&<button onClick={()=>setWhy(w=>({...w,[qi]:!w[qi]}))}
            style={{marginLeft:"auto",background:"none",border:"1px solid rgba(36,49,79,.5)",
              borderRadius:"var(--r-pill)",color:T.t3,padding:"5px 14px",
              fontSize:12,cursor:"pointer"}}>
            {whyOpen[qi]?"Hide":"Why?"} 
          </button>}
        </div>}

        {/* Expandable explanation */}
        {whyOpen[qi]&&q.exp&&<div className="aUp" style={{marginTop:14,padding:"15px 18px",
          background:"rgba(20,13,42,.8)",borderRadius:"var(--r-sm)",
          borderLeft:`3px solid ${T.M}`,
          color:"#c4b5fd",fontSize:13.5,lineHeight:1.75,display:"flex",gap:10}}>
          <span style={{flexShrink:0,fontSize:16,marginTop:1}}>💡</span>
          <span>{q.exp}</span>
        </div>}
      </div>;
    })}
  </div>;
}

/* ─── CLAUSE ORDERING — drag SQL clauses into correct sequence ── */
function ClauseOrder({clauses,correctOrder,context,onPass}){
  // clauses: ["SELECT","FROM","WHERE",...] (shuffled display order)
  // correctOrder: ["SELECT","FROM","WHERE","GROUP BY","HAVING","ORDER BY"]
  const initShuffled=useMemo(()=>[...clauses].sort(()=>Math.random()-.5),[]);
  const[order,setOrder]=useState(initShuffled);
  const[dragging,setDragging]=useState(null); // index being dragged
  const[over,setOver]=useState(null);
  const[checked,setChecked]=useState(false);
  const[correct,setCorrect]=useState(null); // null | true | false

  const check=()=>{
    const isCorrect=order.every((c,i)=>c===correctOrder[i]);
    setChecked(true);
    setCorrect(isCorrect);
    if(isCorrect&&onPass)onPass();
  };
  const reset=()=>{setOrder([...clauses].sort(()=>Math.random()-.5));setChecked(false);setCorrect(null);setDragging(null);setOver(null);};

  const onDragStart=(e,i)=>{setDragging(i);e.dataTransfer.effectAllowed="move";};
  const onDragOver=(e,i)=>{e.preventDefault();setOver(i);};
  const onDrop=(e,i)=>{
    e.preventDefault();
    if(dragging===null||dragging===i){setOver(null);return;}
    const next=[...order];
    const[moved]=next.splice(dragging,1);
    next.splice(i,0,moved);
    setOrder(next);
    setDragging(null);setOver(null);
    setChecked(false);setCorrect(null);
  };
  const onDragEnd=()=>{setDragging(null);setOver(null);};

  // Colour a chip based on check result
  const chipColor=(clause,i)=>{
    if(!checked)return{bg:"rgba(17,24,43,.7)",brd:"rgba(74,95,138,.6)",col:T.t2};
    if(order[i]===correctOrder[i])return{bg:T.ok.bg,brd:T.S,col:T.S};
    return{bg:T.err.bg,brd:T.R,col:T.R};
  };

  return <div style={{marginBottom:20}}>
    {context&&<p style={{color:T.t2,fontSize:13.5,lineHeight:1.65,marginBottom:16}}>{context}</p>}
    <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:14,minHeight:48,
      padding:"12px 16px",background:"rgba(4,6,18,.4)",borderRadius:"var(--r-sm)",
      border:"1px dashed rgba(74,95,138,.4)"}}>
      {order.map((clause,i)=>{
        const{bg,brd,col}=chipColor(clause,i);
        return <div key={clause}
          draggable={!checked}
          className="drag-chip"
          onDragStart={e=>onDragStart(e,i)}
          onDragOver={e=>onDragOver(e,i)}
          onDrop={e=>onDrop(e,i)}
          onDragEnd={onDragEnd}
          style={{padding:"8px 18px",borderRadius:"var(--r-pill)",
            background:over===i?"rgba(109,124,255,.18)":bg,
            border:`1.5px solid ${over===i?"rgba(109,124,255,.7)":brd}`,
            color:over===i?T.A:col,
            fontFamily:"var(--font-code)",fontSize:13,fontWeight:600,
            boxShadow:dragging===i?"0 4px 16px rgba(4,6,18,.6)":undefined,
            opacity:dragging===i?.4:1,
            transition:"background .12s, border-color .12s, opacity .12s",
            cursor:checked?"default":"grab"}}>
          {clause}
        </div>;
      })}
    </div>
    {/* Reference row */}
    <div style={{display:"flex",gap:4,alignItems:"center",marginBottom:16,flexWrap:"wrap"}}>
      <span style={{fontSize:11,color:T.t3,marginRight:4}}>Goal order:</span>
      {correctOrder.map((c,i)=>(
        <span key={c} style={{display:"inline-flex",alignItems:"center",gap:4}}>
          <span style={{fontSize:11,color:T.t3,fontFamily:"var(--font-code)",
            background:"rgba(36,49,79,.35)",padding:"2px 9px",borderRadius:"var(--r-pill)"}}>
            {c}
          </span>
          {i<correctOrder.length-1&&<span style={{color:T.t3,fontSize:10}}>→</span>}
        </span>
      ))}
    </div>
    {/* Action row */}
    <div style={{display:"flex",gap:10,alignItems:"center"}}>
      {!correct&&<button onClick={check}
        style={{background:T.A,border:"none",borderRadius:"var(--r-sm)",color:"#060816",
          padding:"9px 22px",fontSize:13,fontWeight:700,cursor:"pointer",
          boxShadow:"0 2px 12px rgba(109,124,255,.4)"}}>
        Check Order
      </button>}
      {checked&&!correct&&<button onClick={reset}
        style={{background:"rgba(36,49,79,.5)",border:"1px solid rgba(74,95,138,.5)",
          borderRadius:"var(--r-sm)",color:T.t2,padding:"9px 18px",fontSize:13,cursor:"pointer"}}>
        Try Again
      </button>}
      {correct&&<div className="aUp" style={{display:"flex",alignItems:"center",gap:8,
        color:T.S,fontSize:13.5,fontWeight:600}}>
        ✅ Perfect order!
      </div>}
      {checked&&!correct&&<div className="aUp" style={{color:T.R,fontSize:13,display:"flex",alignItems:"center",gap:6}}>
        ✗ Not quite — drag and try again
      </div>}
    </div>
  </div>;
}

/* ─── CHIP FILL — drag SQL tokens into placeholder slots ─────── */
function ChipFill({chips,slots,onPass,context}){
  // chips: [{id,label,color}] — palette of available tokens
  // slots: [{label,accepts,answer}] — drop targets
  const[placed,setPlaced]=useState({}); // slotIdx → chipId
  const[dragging,setDragging]=useState(null); // chipId
  const[over,setOver]=useState(null);   // slotIdx
  const[checked,setChecked]=useState(false);
  const[result,setResult]=useState(null); // null | { correct:[bool] }

  const usedIds=new Set(Object.values(placed));
  const availableChips=chips.filter(c=>!usedIds.has(c.id));

  const check=()=>{
    const correct=slots.map((s,i)=>placed[i]===s.answer);
    setChecked(true);
    setResult({correct});
    if(correct.every(Boolean)&&onPass)onPass();
  };
  const reset=()=>{setPlaced({});setChecked(false);setResult(null);};

  const onDragStart=(e,chipId)=>{setDragging(chipId);e.dataTransfer.effectAllowed="move";};
  const onSlotDrop=(e,slotIdx)=>{
    e.preventDefault();
    if(!dragging)return;
    // If slot occupied, return old chip to palette
    setPlaced(p=>({...p,[slotIdx]:dragging}));
    setDragging(null);setOver(null);
    setChecked(false);setResult(null);
  };
  const removeFromSlot=(slotIdx)=>{
    if(checked)return;
    setPlaced(p=>{const n={...p};delete n[slotIdx];return n;});
  };

  return <div style={{marginBottom:20}}>
    {context&&<p style={{color:T.t2,fontSize:13.5,lineHeight:1.65,marginBottom:16}}>{context}</p>}

    {/* Drop slots */}
    <div style={{display:"flex",flexWrap:"wrap",gap:10,marginBottom:20}}>
      {slots.map((slot,i)=>{
        const chipId=placed[i];
        const chip=chips.find(c=>c.id===chipId);
        const slotResult=result?.correct[i];
        let brd="rgba(74,95,138,.5)",bg="rgba(11,16,32,.5)",col=T.t3;
        if(chipId){brd=chip?.color||T.B;bg=`${chip?.color||T.B}18`;col=chip?.color||T.B;}
        if(checked&&chipId){brd=slotResult?T.S:T.R;bg=slotResult?T.ok.bg:T.err.bg;col=slotResult?T.S:T.R;}
        return <div key={i}
          className="drop-slot"
          onDragOver={e=>{e.preventDefault();if(!checked)setOver(i);}}
          onDragLeave={()=>setOver(null)}
          onDrop={e=>!checked&&onSlotDrop(e,i)}
          style={{minWidth:120,padding:"8px 16px",borderRadius:"var(--r-pill)",
            border:`1.5px dashed ${over===i?"rgba(109,124,255,.7)":brd}`,
            background:over===i?"rgba(109,124,255,.14)":bg,
            display:"flex",alignItems:"center",gap:6,transition:"all .15s",cursor:chipId?"pointer":"default"}}
          onClick={()=>chipId&&removeFromSlot(i)}>
          <span style={{fontSize:11,color:T.t3,whiteSpace:"nowrap",flexShrink:0}}>{slot.label}</span>
          {chipId
            ?<span style={{fontFamily:"var(--font-code)",fontSize:13,fontWeight:600,color:col}}>
               {checked&&<span style={{fontSize:10,marginRight:4}}>{slotResult?"✓":"✗"}</span>}
               {chip?.label}
             </span>
            :<span style={{fontFamily:"var(--font-code)",fontSize:12,color:T.t3,fontStyle:"italic"}}>
               drop here
             </span>}
        </div>;
      })}
    </div>

    {/* Chip palette */}
    <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:16,padding:"12px 16px",
      background:"rgba(4,6,18,.3)",borderRadius:"var(--r-sm)",
      border:"1px solid rgba(36,49,79,.35)"}}>
      <span style={{width:"100%",fontSize:11,color:T.t3,marginBottom:6}}>
        Drag chips into the slots above:
      </span>
      {chips.map(chip=>{
        const used=usedIds.has(chip.id);
        return <div key={chip.id}
          draggable={!used&&!checked}
          className="drag-chip"
          onDragStart={e=>onDragStart(e,chip.id)}
          onDragEnd={()=>setDragging(null)}
          style={{padding:"6px 16px",borderRadius:"var(--r-pill)",
            background:used?"rgba(11,16,32,.3)":`${chip.color}18`,
            border:`1.5px solid ${used?"rgba(36,49,79,.25)":chip.color+"44"}`,
            color:used?T.t4:chip.color,
            fontFamily:"var(--font-code)",fontSize:13,fontWeight:600,
            opacity:used?.35:dragging===chip.id?.5:1,
            transition:"opacity .15s, background .15s",
            cursor:used||checked?"default":"grab"}}>
          {chip.label}
        </div>;
      })}
    </div>

    {/* Actions */}

}

   Shows on: (a) module completion, (b) full programme completion
   User enters first + last name. Print is optional. PDF via window.print()  */

/* ── CSS for print ── injected into <style> when printing ── */
function CertificateModal({mod, allDone, lc, onClose}){
  const[firstName, setFirst] = useState("");
  const[lastName,  setLast]  = useState("");
  const certRef = useRef();
  const today = new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"});
  const isModule = !!mod && !allDone;
  const name = (firstName.trim()+" "+lastName.trim()).trim() || "Your Name";

  function handlePrint(){
    if(!certRef.current) return;

    // Clone the certificate HTML and attach directly to body
    const clone = certRef.current.cloneNode(true);
    clone.id = "cert-clone";
    clone.style.cssText = [
      "position:fixed","inset:0","z-index:99999",
      "background:#fff","display:flex",
      "align-items:center","justify-content:center",
      "padding:20px",
    ].join(";");
    document.body.appendChild(clone);

    // Inject print style that hides everything except the clone
    const style = document.createElement("style");
    style.id = "cert-print-style";
    style.textContent = [
      "@media print {",
      "  body > *:not(#cert-clone) { display: none !important; }",
      "  #cert-clone { position:fixed!important; inset:0!important; display:flex!important; align-items:center; justify-content:center; padding:20px; }",
      "}",
    ].join("\n");
    document.head.appendChild(style);

    window.print();

    // Clean up
    document.body.removeChild(clone);
    document.head.removeChild(style);
  }

  const moduleTopics = isModule && mod.concepts ? mod.concepts.map(function(c){return c.title;}) : [];

  const fullTopics = [
    "SELECT, FROM & column aliases","WHERE filtering & NULL handling",
    "ORDER BY, LIMIT & DISTINCT","Aggregates & GROUP BY / HAVING",

    "String functions — UPPER, LOWER, LIKE, SUBSTR","Dates & Time — strftime, julianday",

  const topics = isModule ? moduleTopics : fullTopics;

/* ─── LESSON PAGE ────────────────────────────────────── */
function LessonPage({mod,db,lc,onNext,hasNext,meta,earnXP,grantAchievement,lessonStepCtrl}){
  const[step,setStep]=useState({hook:true,concept:false,seeit:false,guided:false,usecase:false,recall:false,challenge:false,done:false});
  const[guidedDone,setGD]=useState({});
  const[recallDone,setRD]=useState(false);
  const[challengeDone,setCD]=useState(false);
  const[guidedFills,setGF]=useState({});

  const unlock=useCallback((k)=>setStep(s=>({...s,[k]:true})),[]);
  const guidedPassed=mod.guided?.filter((_,i)=>guidedDone[i]).length||0;
  const allGuided=mod.guided?.length||0;
  const co=CO[mod.hook.co];

  // ── Expose step state to ActionBar via ref ──────────────────
  // Compute which step is currently "active" (last unlocked, not yet completed)
  const STEP_ORDER=['hook','concept','seeit','guided','usecase','recall','challenge','done'];
  const STEP_NAMES={
    hook:'Mission Brief',concept:'Core Idea',seeit:'Watch It Work',
    guided:'Try With Guidance',usecase:'In the Real World',
    recall:'Quick Check',challenge:'Mission Challenge',done:'Debrief',
  };
  // Current step = first unlocked-but-incomplete, or last if all done
  const currentStepKey=(()=>{
    for(let i=0;i<STEP_ORDER.length-1;i++){
      const k=STEP_ORDER[i],nk=STEP_ORDER[i+1];
      if(step[k]&&!step[nk])return k;
    }
    return step.done?'done':'hook';
  })();
  const stepNum=STEP_ORDER.indexOf(currentStepKey)+1;

  // Hint state for each step (action bar proxy)
  const[barHintIdx,setBarHintIdx]=useState(-1);
  const barHints=(()=>{
    // Surface hints relevant to current step
    if(currentStepKey==='guided'&&mod.guided?.length){
      const firstUnpassed=mod.guided.findIndex((_,i)=>!guidedDone[i]);
      if(firstUnpassed>=0)return mod.guided[firstUnpassed]?.hints||[];
    }
    if(currentStepKey==='challenge'&&mod.challenge?.length){
      return mod.challenge[0]?.hints||[];
    }
    return [];
  })();

  // canAdvance = whether the current step's ContinueBtn should be enabled
  const canAdvance=(()=>{
    if(currentStepKey==='hook')return true;
    if(currentStepKey==='concept')return step.concept;
    if(currentStepKey==='seeit')return step.seeit;
    if(currentStepKey==='guided')return guidedPassed===allGuided&&step.guided;
    if(currentStepKey==='usecase')return step.usecase;
    if(currentStepKey==='recall')return recallDone;
    if(currentStepKey==='challenge')return challengeDone;
    if(currentStepKey==='done')return false;
    return false;
  })();

  // doAdvance = advance the current step
  const doAdvance=(()=>{
    const map={
      hook:()=>unlock('concept'),
      concept:()=>unlock('seeit'),
      seeit:()=>unlock('guided'),
      guided:()=>unlock('usecase'),
      usecase:()=>unlock('recall'),
      recall:()=>{},  // auto-unlocked by Recall component
      challenge:()=>{},
      done:()=>onNext(),
    };
    return map[currentStepKey]||(()=>{});
  })();

  // Populate the ref every render
  useEffect(()=>{
    if(!lessonStepCtrl)return;
    lessonStepCtrl.current={
      stepKey:currentStepKey,
      stepNum,
      stepName:STEP_NAMES[currentStepKey]||'',
      canAdvance,
      doAdvance,
      hints:barHints,
      hintIdx:barHintIdx,
      nextHint:()=>setBarHintIdx(h=>Math.min(h+1,barHints.length-1)),
    };
  }); // intentionally runs every render

  return <div style={{display:"flex",flexDirection:"column",gap:10}}>

    {/* ── STEP 1: MISSION ── */}
    <Step num={1} icon="🎯" label="Mission Brief" color={T.A} complete={step.concept}>
      <MissionTicket hook={mod.hook} co={co}/>
      <ContinueBtn label="Begin Mission →" onClick={()=>unlock("concept")} color={T.A}/>
    </Step>

    {/* ── STEP 2: CONCEPTS ── */}
    <Step num={2} icon="💡" label="Core Idea" color={T.B} locked={!step.concept} complete={step.seeit}>
      {/* Mental model banner — one wide card */}
      {mod.concepts[0]?.analogy&&<div style={{
        padding:"20px 24px",marginBottom:24,borderRadius:"var(--r-sm)",
        background:`linear-gradient(135deg,${T.B}0c,${T.B}06)`,
        borderLeft:`4px solid ${T.B}`,position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",right:20,top:12,fontSize:52,opacity:.05,lineHeight:1}}>💡</div>
        <div style={{fontSize:12,fontWeight:600,color:T.B,letterSpacing:.5,marginBottom:8}}>Mental Model</div>
        <div style={{color:T.t2,fontSize:14,lineHeight:1.8}}>{mod.concepts[0].analogy}</div>
      </div>}
      {/* Concept cards — glass, 16px radius, no inner toolbar borders */}
      <div className="sm-col" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(272px,1fr))",gap:16,marginBottom:28}}>
        {mod.concepts.map((c,i)=>(
          <div key={i} className="glass-card" style={{padding:"24px 22px",display:"flex",flexDirection:"column",gap:0}}>
            {/* Icon + title */}
            <div style={{fontSize:28,marginBottom:14,lineHeight:1}}>{c.icon}</div>
            <div style={{fontFamily:"var(--font-head)",fontWeight:700,fontSize:15,
              color:T.tx,marginBottom:12,lineHeight:1.3}}>{c.title}</div>
            {/* Body */}
            <div style={{color:T.t2,fontSize:13.5,lineHeight:1.8,flex:1}}>{c.body}</div>
            {/* Analogy */}
            {c.analogy&&<div style={{
              marginTop:16,padding:"11px 14px",
              background:`${T.B}08`,borderRadius:"var(--r-sm)",
              borderLeft:`3px solid ${T.B}44`,color:T.t2,fontSize:13,lineHeight:1.65}}>
              <span style={{fontSize:11,fontWeight:700,color:T.B,display:"block",marginBottom:4,letterSpacing:.4}}>ANALOGY</span>
              {c.analogy}
            </div>}
            {/* Tip */}
            {c.tip&&<div style={{
              marginTop:14,padding:"11px 14px",
              background:`${T.S}08`,borderRadius:"var(--r-sm)",
              borderLeft:`3px solid ${T.S}55`,color:T.t2,fontSize:13,lineHeight:1.65}}>
              <span style={{fontSize:11,fontWeight:700,color:T.S,display:"block",marginBottom:4,letterSpacing:.4}}>💡 TIP</span>
              {c.tip}
            </div>}
            {/* Misconception — shown as a clear warning block */}
            {c.misconception&&<div style={{
              marginTop:14,padding:"12px 14px",
              background:"rgba(255,107,138,.07)",borderRadius:"var(--r-sm)",
              borderLeft:`3px solid ${T.R}`,color:T.err.tx,fontSize:13,lineHeight:1.65}}>
              <span style={{fontSize:11,fontWeight:700,color:T.R,display:"block",marginBottom:4,letterSpacing:.4}}>⚠ WATCH OUT</span>
              {c.misconception}
            </div>}
          </div>
        ))}
      </div>
      <ContinueBtn label="Show Me Examples →" onClick={()=>unlock("seeit")} color={T.A}/>
    </Step>

    {/* ── STEP 3: SEE IT ── */}
    <Step num={3} icon="👁️" label="Watch It Work" color={T.B} locked={!step.seeit} complete={step.guided}>
      <p style={{color:T.t2,fontSize:14,marginBottom:24,lineHeight:1.7}}>
        <strong style={{color:T.tx}}>Study these patterns</strong> — each example runs live.
        Understanding worked examples before practising cuts cognitive load significantly.
      </p>
      <div style={{display:"flex",flexDirection:"column",gap:20}}>
        {mod.seeit.map((ex,i)=>(
          <div key={i} style={{borderLeft:`3px solid ${T.B}33`,paddingLeft:14}}>
            <div style={{fontSize:12.5,color:T.B,marginBottom:8,fontFamily:"var(--font-code)",
              fontWeight:600,letterSpacing:.3}}>
              {i+1}. {ex.lbl}
            </div>
            {ex.ann&&<div style={{fontSize:12.5,color:T.t3,marginBottom:8,lineHeight:1.5,
              fontStyle:"italic"}}>{ex.ann}</div>}
            <CB sql={ex.sql}/>
          </div>
        ))}
      </div>
      <div style={{marginTop:20}}>
        <div style={{fontSize:13,color:T.t3,marginBottom:10}}>Try any example live ↓</div>
        <Console initSQL={mod.seeit[0]?.sql||""} db={db} compact/>
      </div>
      <ContinueBtn label="Try It Myself →" onClick={()=>unlock("guided")} color={T.A}/>
    </Step>

    {/* ── STEP 4: GUIDED PRACTICE ── */}
    <Step num={4} icon="✍️" label={`Try With Guidance (${guidedPassed}/${allGuided} done)`} color={lc} locked={!step.guided} complete={step.usecase}>
      <p style={{color:T.t2,fontSize:14,marginBottom:24,lineHeight:1.7}}>
        Scaffolding fades across exercises — fill the{" "}
        <code style={{color:T.A,fontFamily:"var(--font-code)",fontSize:13}}>indigo blanks</code>
        {" "}or choose from{" "}
        <code style={{color:T.B,fontFamily:"var(--font-code)",fontSize:13}}>cyan dropdowns</code>
        , then click Check.
      </p>
      <div style={{display:"flex",flexDirection:"column",gap:16}}>
        {mod.guided.map((g,i)=>(
          <GuidedEx key={i} g={g} i={i} lc={lc} db={db}
            guidedDone={guidedDone} setGD={setGD}
            guidedFills={guidedFills} setGF={setGF}
            earnXP={earnXP} grantAchievement={grantAchievement}/>
        ))}
      </div>
      {guidedPassed===allGuided&&(
        <ContinueBtn label="See It in the Wild →" onClick={()=>{
          unlock("usecase");
          if(grantAchievement) grantAchievement("clean_sweep");
        }} color={T.A}/>
      )}
    </Step>

    {/* ── STEP 5: REAL WORLD ── */}
    <Step num={5} icon="🌍" label="In the Real World" color={T.B} locked={!step.usecase} complete={step.recall}>
      <p style={{color:T.t2,fontSize:14,marginBottom:24,lineHeight:1.7}}>
        <strong style={{color:T.tx}}>Transfer is the goal of learning.</strong>{" "}
        These are real queries used by analysts — same concepts, authentic business context.
      </p>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {mod.usecases.map((uc,i)=><UsecaseCard key={i} uc={uc} i={i} db={db}/>)}
      </div>
      <ContinueBtn label="Check My Knowledge →" onClick={()=>unlock("recall")} color={T.A}/>
    </Step>

    {/* ── STEP 6: RECALL ── */}
    <Step num={6} icon="🧠" label="Quick Check" color={T.M} locked={!step.recall} complete={step.challenge}>
      <p style={{color:T.t2,fontSize:14,marginBottom:24,lineHeight:1.7}}>
        <strong style={{color:T.tx}}>Retrieval practice</strong> strengthens memory far more than re-reading.
        Answer all questions to unlock the Mission Challenge.
      </p>
      <Recall questions={mod.recall} onAllDone={()=>{setRD(true);unlock("challenge");if(earnXP)earnXP("recall");}}/>
      {recallDone&&<div className="aUp" style={{marginTop:16,padding:"14px 20px",
        background:T.ok.bg,borderRadius:"var(--r-sm)",
        color:T.ok.tx,fontSize:14,fontWeight:600,display:"flex",alignItems:"center",gap:10}}>
        ✅ All questions answered — the Mission Challenge is now unlocked!
      </div>}
    </Step>

    {/* ── STEP 7: CHALLENGE ── */}
    <Step num={7} icon="🔓" label="Mission Challenge" color={T.M} locked={!step.challenge} complete={step.done}>
      <p style={{color:T.t2,fontSize:14,marginBottom:24,lineHeight:1.7}}>
        <strong style={{color:T.tx}}>No scaffold provided.</strong>{" "}
        Write the complete query from scratch — no hints shown by default. Struggle productively; hints are one click away.
      </p>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        {mod.challenge.map((c,i)=>(
          <ChallengeEx key={i} ex={c} db={db} lc={lc} earnXP={earnXP} grantAchievement={grantAchievement} onPass={()=>{setCD(true);unlock("done");}}/>
        ))}
      </div>
    </Step>

    {/* ── STEP 8: COMPLETE ── */}
    <Step num={8} icon="✅" label="Debrief" color={T.S} locked={!step.done} complete={false}>
      <CompleteCard mod={mod} lc={lc} onNext={onNext} hasNext={hasNext}/>
    </Step>

  </div>;
}

/* ─── ACHIEVEMENT TOAST — elegant, one-time moment ──────────────
   Appears bottom-right, fades in, auto-dismisses after 5s.       */
function AchievementToast({achievement, onDismiss}){
  const a = ACHIEVEMENTS.find(x=>x.id===achievement);
  useEffect(()=>{
    if(!a) return;
    const t = setTimeout(onDismiss, 5200);
    return ()=>clearTimeout(t);
  },[a]);
  if(!a) return null;
  return (
    <div className="toastIn" style={{
      position:"fixed", bottom:52, right:20, zIndex:500,
      maxWidth:280, padding:"16px 18px",
      background:`linear-gradient(135deg,${T.s2},${T.s3})`,
      border:`1px solid ${a.color||T.A}44`,
      borderRadius:"var(--r-md)",
      boxShadow:`0 8px 40px rgba(4,6,18,.7), 0 0 24px ${a.color||T.A}20`,
    }}>
      <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
        <div style={{
          width:40,height:40,borderRadius:"var(--r-sm)",flexShrink:0,
          background:`${a.color||T.A}18`,border:`1px solid ${a.color||T.A}35`,
          display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:20, boxShadow:`0 0 12px ${a.color||T.A}30`,
        }}>{a.icon}</div>
        <div>
          <div style={{fontSize:10,fontWeight:700,color:a.color||T.A,
            letterSpacing:1.2,textTransform:"uppercase",marginBottom:4}}>
            Achievement Unlocked
          </div>
          <div style={{fontFamily:"var(--font-head)",fontWeight:700,
            fontSize:14.5,color:T.tx,marginBottom:4,lineHeight:1.2}}>{a.title}</div>
          <div style={{fontSize:12,color:T.t2,lineHeight:1.5}}>{a.desc}</div>
          <div style={{fontSize:11,color:a.color||T.A,marginTop:5,fontWeight:600}}>
            +{a.xp} XP
          </div>
        </div>
      </div>
      {/* Auto-dismiss bar */}
      <div style={{
        position:"absolute",bottom:0,left:0,height:2,borderRadius:"0 0 var(--r-md) var(--r-md)",
        background:`linear-gradient(90deg,${a.color||T.A},${a.color||T.A}55)`,
        animation:"shrinkBar 5s linear both",
      }}/>
    </div>
  );
}

  const pctToNext = nextLvl
    ? Math.round((xp - level.min) / (nextLvl.min - level.min) * 100)
    : 100;
  const diff    = MOD_DIFFICULTY[mod?.id] || 2;

    <div style={{
      display:"flex", flexWrap:"wrap", gap:isSm?10:20,

          {nextLvl&&<span style={{fontSize:10,color:T.t4,fontFamily:"var(--font-code)",marginLeft:"auto"}}>
            {nextLvl.min - xp} to next
          </span>}

      {/* Divider */}
      <div style={{width:1,height:32,background:"rgba(36,49,79,.5)"}} className="hide-sm"/>

      <div style={{width:1,height:32,background:"rgba(36,49,79,.5)"}} className="hide-sm"/>

      {/* Difficulty meter */}

          {[1,2,3,4,5].map(n=>(
            <div key={n} style={{
              width:5, height:14,

            }}/>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ─── MAIN APP ───────────────────────────────────────── */
const STORAGE_KEY = "sqlmastery_progress_v1";

/* ─── MASTERY SYSTEM ──────────────────────────────────────────────
   XP per action (designed to feel earned, not cheap):
   • Guided exercise passed  : 20 XP
   • Recall question correct : 15 XP
   • Challenge passed        : 50 XP
   • Module debrief reached  : 30 XP bonus
   Streak: consecutive days with any activity (stored in meta).
   Difficulty meter: derived from DIFF map of current guided ex.
   Confidence meter: self-report 1-5, stored per module.
   Achievements: unlocked by specific milestones, shown once.     */

const XP_TABLE = {
  guided_pass:  20,
  recall_right: 15,
  challenge:    50,
  module_done:  30,
};

// Per-module difficulty weights (1–5)
const MOD_DIFFICULTY = {
  b1:1, b2:2, b3:2, b4:3, i1:4, i2:4, i3:4, i4:4, a1:5, a2:5, a3:5, a4:5,
};

// Achievements catalogue
const ACHIEVEMENTS = [
  {id:"first_query",   icon:"⚡", title:"First Query",       desc:"Ran your very first SQL statement.",          xp:10},
  {id:"clean_sweep",   icon:"🎯", title:"Clean Sweep",        desc:"Passed all guided exercises in one module.",   xp:40},
  {id:"streak_3",      icon:"🔥", title:"3-Day Streak",       desc:"Studied for 3 consecutive days.",              xp:50},
  {id:"streak_7",      icon:"🌟", title:"Weekly Momentum",    desc:"7 consecutive days — genuine commitment.",     xp:100},
  {id:"first_join",    icon:"🔗", title:"JOIN Mastery",       desc:"Completed the JOINs module.",                  xp:60},
  {id:"recall_streak", icon:"🧠", title:"Sharp Memory",       desc:"Answered 5 recall questions without a hint.",  xp:30},
  {id:"challenger",    icon:"🏆", title:"Challenger",         desc:"Completed your first Mission Challenge.",       xp:75},
  {id:"halfway",       icon:"🛸", title:"Halfway There",      desc:"Completed 50 % of the curriculum.",            xp:80},
  {id:"complete",      icon:"🎓", title:"SQL Operator",       desc:"Completed every current module.",              xp:200},
];

// Derive XP total from progress metadata
const calcXP = meta => {
  let xp = 0;
  xp += (meta.guidedPasses||0)  * XP_TABLE.guided_pass;
  xp += (meta.recallRights||0)  * XP_TABLE.recall_right;
  xp += (meta.challengePasses||0)* XP_TABLE.challenge;
  xp += (meta.modulesDone||0)   * XP_TABLE.module_done;
  (meta.achievements||[]).forEach(id=>{
    const a = ACHIEVEMENTS.find(x=>x.id===id);
    if(a) xp += a.xp;
  });
  return xp;
};

// Mastery level thresholds
const MASTERY_LEVELS = [
  {min:0,    label:"Analyst I",    color:"#7F90B5"},
  {min:100,  label:"Analyst II",   color:"#6D7CFF"},
  {min:300,  label:"SQL Engineer", color:"#22D3EE"},
  {min:600,  label:"Data Lead",    color:"#A78BFA"},
  {min:1000, label:"SQL Operator", color:"#29D391"},
];

const getMasteryLevel = xp =>
  [...MASTERY_LEVELS].reverse().find(l=>xp>=l.min) || MASTERY_LEVELS[0];

// Smart recommendation: first incomplete module
const getNextRec = (done, flatMods) => {
  const incomplete = flatMods.filter(f=>!done[`${f.li}-${f.mi}`]);
  if(!incomplete.length) return null;
  // Prefer the one immediately after the last completed
  const lastDone = flatMods.filter(f=>done[`${f.li}-${f.mi}`]);
  if(!lastDone.length) return incomplete[0];
  const lastIdx = flatMods.indexOf(lastDone[lastDone.length-1]);
  return flatMods[lastIdx+1] || incomplete[0];
};



/* ─── ERROR BOUNDARY — catch render crashes gracefully ─────────── */
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { error: null };
  }
  static getDerivedStateFromError(err) {
    return { error: err };
  }
  render() {
    if (this.state.error) {
      return React.createElement('div', {
        style: {
          minHeight: '100vh',
          background: '#060816',
          display: 'flex',
          flexDirection: 'column',
          alignItems: 'center',
          justifyContent: 'center',
          padding: '40px',
          gap: 20,
          fontFamily: 'system-ui, sans-serif',
        }
      },
        React.createElement('div', { style: { fontSize: 48 } }, '⚠️'),
        React.createElement('div', {
          style: { fontSize: 18, fontWeight: 700, color: '#f5f5f5', textAlign: 'center' }
        }, 'Something went wrong'),
        React.createElement('div', {
          style: { fontSize: 13, color: '#8899bb', maxWidth: 480, textAlign: 'center', lineHeight: 1.7 }
        }, 'An unexpected error occurred. Try refreshing the page. If the problem persists, clear your browser storage for this site.'),
        React.createElement('button', {
          onClick: () => { localStorage.clear(); window.location.reload(); },
          style: {
            background: '#6D7CFF',
            border: 'none',
            borderRadius: 8,
            color: '#060816',
            padding: '10px 24px',
            fontSize: 14,
            fontWeight: 700,
            cursor: 'pointer',
            marginTop: 8,
          }
        }, 'Clear data & reload'),
        React.createElement('details', {
          style: { color: '#556', fontSize: 12, maxWidth: 560, marginTop: 8 }
        },
          React.createElement('summary', { style: { cursor: 'pointer', color: '#8899bb' } }, 'Error details'),
          React.createElement('pre', {
            style: { whiteSpace: 'pre-wrap', wordBreak: 'break-all', marginTop: 8 }
          }, String(this.state.error))
        )
      );
    }
    return this.props.children;
  }
}

    try{localStorage.setItem(STORAGE_KEY,JSON.stringify(done));}
    catch{}
  },[done]);

  useEffect(()=>{
    try{localStorage.setItem("sqlmastery_meta_v1",JSON.stringify(meta));}
    catch{}
  },[meta]);

  // ── Update streak on mount ──────────────────────────────────
  useEffect(()=>{
    const today=new Date().toISOString().slice(0,10);
    if(meta.lastActiveDay===today) return;
    const yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
    const newStreak=meta.lastActiveDay===yesterday?meta.streak+1:1;
    setMeta(m=>({...m,streak:newStreak,lastActiveDay:today}));
    // Streak achievements
    if(newStreak===3) grantAchievement("streak_3");
    if(newStreak===7) grantAchievement("streak_7");
  },[]);// eslint-disable-line

  // ── Persist resume position whenever lesson changes ─────────
  useEffect(()=>{
    setMeta(m=>({...m,resumeLi:li,resumeMi:mi}));
  },[li,mi]);

  useEffect(()=>{const h=e=>{if((e.ctrlKey||e.metaKey)&&e.key==="k"){e.preventDefault();setCmd(c=>!c);}};document.addEventListener("keydown",h);return()=>document.removeEventListener("keydown",h);},[]);
  useEffect(()=>{(async()=>{try{await new Promise((res,rej)=>{if(window.initSqlJs){res();return;}const s=document.createElement("script");s.src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js";s.onload=res;s.onerror=rej;document.head.appendChild(s);});const SQL=await window.initSqlJs({locateFile:f=>`https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}`});const database=new SQL.Database();database.run(SCHEMA_SQL);database.run(SEED_SQL);setDb(database);}catch(e){setDbErr("SQL engine failed to load.");}})();},[]);

  const lv=COURSE[li]||COURSE[0];
  const mod=lv.modules[mi]||lv.modules[0];
  const lc=lv.color;
  const flatMods=COURSE.flatMap((l,lvi)=>l.modules.map((m,mii)=>({li:lvi,mi:mii,mod:m})));
  const currIdx=flatMods.findIndex(f=>f.li===li&&f.mi===mi);
  const hasNext=currIdx<flatMods.length-1;
  const nav=(a,b)=>{setLi(a);setMi(b);mainRef.current?.scrollTo(0,0);};
  const goNext=()=>{if(hasNext){const n=flatMods[currIdx+1];nav(n.li,n.mi);}};

  // ── Grant achievement (once per session, once per lifetime) ──
  const grantAchievement = useCallback(id=>{
    setMeta(m=>{
      if((m.achievements||[]).includes(id)) return m;
      setPendingAch(id);
      return {...m,achievements:[...(m.achievements||[]),id]};
    });
  },[]);

  // ── XP events ────────────────────────────────────────────────
  const earnXP = useCallback(type=>{
    setMeta(m=>{
      const key = type==="guided"?"guidedPasses":
                  type==="recall"?"recallRights":
                  type==="challenge"?"challengePasses":
                  type==="module"?"modulesDone":"guidedPasses";
      const updated = {...m,[key]:(m[key]||0)+1};
      // Check first-challenge achievement
      if(type==="challenge" && (updated.challengePasses||0)===1) {
        setTimeout(()=>grantAchievement("challenger"),400);
      }
      // Recall streak
      if(type==="recall" && (updated.recallRights||0)===5) {
        setTimeout(()=>grantAchievement("recall_streak"),400);
      }
      return updated;
    });
  },[grantAchievement]);

  // ── Set confidence for current module ────────────────────────
  const setConfidence = useCallback(val=>{
    const key=`${li}-${mi}`;
    setMeta(m=>({...m,confidence:{...m.confidence,[key]:val}}));
  },[li,mi]);

  // ── Mark module done + grant achievements ─────────────────────
  const markDone=useCallback(()=>{
    setDone(p=>{
      const next={...p,[`${li}-${mi}`]:true};
      const doneCount=Object.values(next).filter(Boolean).length;
      const total=COURSE.reduce((a,l)=>a+l.modules.length,0);
      // Module done XP
      earnXP("module");
      // Achievements
      if(mod?.id==="i1") setTimeout(()=>grantAchievement("first_join"),600);
      if(doneCount===Math.floor(total/2)) setTimeout(()=>grantAchievement("halfway"),600);
      if(doneCount===total){
        setTimeout(()=>grantAchievement("complete"),600);
        setTimeout(()=>setShowFullCert(true),1200);
      }
      return next;
    });
  },[li,mi,mod,earnXP,grantAchievement]);

  const resetProgress=useCallback(()=>{
    setDone({});
    setMeta({guidedPasses:0,recallRights:0,challengePasses:0,modulesDone:0,
      achievements:[],streak:0,lastActiveDay:"",confidence:{},resumeLi:0,resumeMi:0});
    try{
      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem("sqlmastery_meta_v1");
    }catch{}
  },[]);

  // ── Smart recommendation ─────────────────────────────────────
  const nextRec = getNextRec(done, flatMods);
  const confidence = meta.confidence?.[`${li}-${mi}`]||0;

  return <ErrorBoundary><div style={{minHeight:"100vh",background:T.bg,display:"flex",flexDirection:"column"}}>
    <style>{CSS}</style>
    <a href="#main-content" className="skip-link">Skip to lesson content</a>
    {/* ── SQL engine loading overlay ── */}
    {!db&&!dbErr&&<div style={{
      position:"fixed",inset:0,zIndex:1000,
      background:"rgba(6,8,22,.96)",
      display:"flex",flexDirection:"column",
      alignItems:"center",justifyContent:"center",gap:20,
      backdropFilter:"blur(6px)",
    }}>
      <svg width="52" height="52" viewBox="0 0 36 36" fill="none" aria-hidden="true">
        <defs>
          <linearGradient id="sl1" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stopColor={T.B}/>
            <stop offset="50%" stopColor={T.A}/>
            <stop offset="100%" stopColor={T.M}/>
          </linearGradient>
          <linearGradient id="sl2" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stopColor={T.BL} stopOpacity=".9"/>
            <stop offset="100%" stopColor={T.A} stopOpacity=".5"/>
          </linearGradient>
        </defs>
        <circle cx="17" cy="17" r="15.5"
          stroke="url(#sl1)" strokeWidth="2" fill="none"
          style={{animation:"pulse 2s ease infinite"}}/>
        <circle cx="17" cy="17" r="13.5" fill="rgba(11,16,32,.9)"/>
        <circle cx="17" cy="17" r="13.5" fill="url(#sl2)" fillOpacity="0.12"/>
        <text x="15.5" y="24" textAnchor="middle"
          fontFamily="Georgia,serif" fontWeight="800"
          fontSize="22" fill="url(#sl1)">Q</text>
        <line x1="22" y1="21" x2="27" y2="26"
          stroke="url(#sl2)" strokeWidth="2.5" strokeLinecap="round"/>
      </svg>
      <div style={{textAlign:"center"}}>
        <div style={{fontFamily:"var(--font-head)",fontSize:18,fontWeight:700,
          color:T.tx,marginBottom:8}}>Querious</div>
        <div style={{fontSize:13,color:T.t3}}>Loading SQLite engine…</div>
      </div>
      <div style={{width:160,height:3,background:"rgba(36,49,79,.5)",borderRadius:99,overflow:"hidden"}}>
        <div style={{height:"100%",background:T.A,borderRadius:99,
          animation:"indeterminateBar 1.4s ease infinite"}}/>
      </div>
    </div>}
    {dbErr&&<div style={{
      position:"fixed",inset:0,zIndex:1000,
      background:"rgba(6,8,22,.97)",
      display:"flex",flexDirection:"column",alignItems:"center",
      justifyContent:"center",gap:16,
    }}>
      <div style={{fontSize:32}}>⚠️</div>
      <div style={{fontFamily:"var(--font-head)",fontSize:18,fontWeight:700,color:T.R}}>
        SQL engine failed to load
      </div>
      <div style={{fontSize:13,color:T.t2,maxWidth:320,textAlign:"center",lineHeight:1.6}}>
        {dbErr} — try refreshing. The lesson content is still available but interactive queries won't work.
      </div>
      <button onClick={()=>window.location.reload()}
        style={{background:T.A,border:"none",borderRadius:"var(--r-sm)",
          color:"#060816",padding:"10px 24px",fontSize:14,fontWeight:700,cursor:"pointer"}}>
        Reload
      </button>
    </div>}

    {/* HEADER */}
    <header style={{
      background:`linear-gradient(180deg,${T.surf} 0%,${T.bg}00 100%)`,
      borderBottom:`1px solid rgba(109,124,255,.2)`,
      height:58,display:"flex",alignItems:"center",justifyContent:"space-between",
      padding:"0 20px",flexShrink:0,position:"sticky",top:0,zIndex:300,
      backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",
      backgroundColor:T.surf,
      boxShadow:`0 1px 0 rgba(109,124,255,.1), 0 6px 32px rgba(6,8,22,.85)`,
    }}>
      <div style={{display:"flex",alignItems:"center",gap:11,flexShrink:0}}>
        {/* Logo mark — futuristic faceted gem */}
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" aria-label="Querious logo">
          <defs>
            <linearGradient id="lg1" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stopColor={T.B}/>
              <stop offset="50%" stopColor={T.A}/>
              <stop offset="100%" stopColor={T.M}/>
            </linearGradient>
            <linearGradient id="lg4" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stopColor={T.BL} stopOpacity=".9"/>
              <stop offset="100%" stopColor={T.A} stopOpacity=".5"/>
            </linearGradient>
            <filter id="lshadow" x="-40%" y="-40%" width="180%" height="180%">
              <feDropShadow dx="0" dy="0" stdDeviation="5"
                floodColor={T.A} floodOpacity=".65"/>
            </filter>
            <filter id="lglow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="0" dy="0" stdDeviation="2"
                floodColor={T.B} floodOpacity=".4"/>
            </filter>
            <clipPath id="qclip">
              <circle cx="17" cy="17" r="13"/>
            </clipPath>
          </defs>
          {/* Outer ring */}
          <circle cx="17" cy="17" r="15.5"
            fill="none"
            stroke="url(#lg1)" strokeWidth="2"/>
          {/* Background fill */}
          <circle cx="17" cy="17" r="14"
            fill={T.surf} filter="url(#lshadow)"/>
          {/* Inner gradient circle */}
          <circle cx="17" cy="17" r="14"
            fill="url(#lg4)" fillOpacity="0.15"/>
          {/* Bold Q letter */}
          <text x="15.5" y="23" textAnchor="middle"
            fontFamily="Georgia,'Times New Roman',serif" fontWeight="800"
            fontSize="21" fill="url(#lg1)"
            filter="url(#lglow)"
            style={{userSelect:"none"}}>Q</text>
          {/* Q tail — the distinctive slash */}
          <line x1="22" y1="21" x2="27" y2="26"
            stroke="url(#lg4)" strokeWidth="2.5" strokeLinecap="round"/>
          {/* Subtle grid dots — data motif */}
          <circle cx="9"  cy="10" r="0.9" fill={T.B} fillOpacity="0.5"/>
          <circle cx="12" cy="10" r="0.9" fill={T.B} fillOpacity="0.4"/>
          <circle cx="9"  cy="13" r="0.9" fill={T.B} fillOpacity="0.3"/>
          <circle cx="12" cy="13" r="0.9" fill={T.B} fillOpacity="0.2"/>
        </svg>
        {!isSm&&<div>
          <div style={{fontFamily:"var(--font-head)",fontWeight:700,fontSize:15.5,
            color:T.tx,letterSpacing:"-.4px",lineHeight:1.1}}>Querious</div>
          <div style={{fontSize:8,color:T.A,letterSpacing:"1.6px",opacity:.75,
            textTransform:"uppercase",marginTop:2,fontWeight:600}}>SQL · Beginner to Expert</div>
        </div>}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        {/* DB status pill */}
        <div style={{display:"flex",alignItems:"center",gap:6,padding:"5px 11px",
          background:T.s2,borderRadius:99,border:`1px solid ${T.brd}`,
          boxShadow:`inset 0 1px 0 rgba(255,255,255,.04)`}}>
          <div style={{
            width:7,height:7,borderRadius:"50%",flexShrink:0,
            background:db?T.S:dbErr?T.R:T.A,
            boxShadow:db?`0 0 6px ${T.S}`:undefined,
            animation:(!db&&!dbErr)?"pulse 1.5s ease infinite":undefined,
          }}/>
          {!isSm&&<span style={{fontSize:11,color:T.t2,fontFamily:"var(--font-code)"}}>
            {db?"SQLite ✓":dbErr?"Error":"Loading…"}
          </span>}
        </div>
        {/* Full certificate button — only if all done */}
        {Object.values(done).filter(Boolean).length===flatMods.length&&flatMods.length>0&&(
          <button onClick={()=>setShowFullCert(true)}
            title="Get your full programme certificate"
            style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",
              background:`${T.A}18`,border:`1px solid ${T.A}35`,borderRadius:"var(--r-sm)",
              color:T.A,fontSize:12,fontWeight:600,cursor:"pointer",transition:"all .2s"}}
            onMouseEnter={e=>{e.currentTarget.style.background=`${T.A}28`;}}
            onMouseLeave={e=>{e.currentTarget.style.background=`${T.A}18`;}}>
            🎓
          </button>
        )}
        {/* Workspace button */}
        <button onClick={()=>setCmd(true)}
          aria-label="Open workspace (⌘K)"
          style={{display:"flex",alignItems:"center",gap:7,padding:"6px 14px",
            background:T.s2,border:`1px solid ${T.brd}`,borderRadius:"var(--r-sm)",
            color:T.t2,fontSize:12.5,fontWeight:500,transition:"all .2s",
            boxShadow:`inset 0 1px 0 rgba(255,255,255,.04)`}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor=T.A;e.currentTarget.style.color=T.A;e.currentTarget.style.background=T.AS;}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor=T.brd;e.currentTarget.style.color=T.t2;e.currentTarget.style.background=T.s2;}}>
          <span style={{fontSize:13}}>⌘</span>
          {!isSm&&<span>Workspace</span>}
          {!isSm&&<kbd style={{fontSize:9.5,color:T.t3,background:T.s3,
            padding:"1px 5px",borderRadius:3,border:`1px solid ${T.brd}`,
            fontFamily:"var(--font-code)"}}>K</kbd>}
        </button>
      </div>
    </header>

    {/* NAV STRIP */}
    <NavStrip li={li} mi={mi} done={done} nav={nav} winW={winW}/>

    {/* MAIN */}
    <main id="main-content" ref={mainRef} style={{
      flex:1,overflowY:"auto",
      padding:isSm?"24px 16px 96px":winW>1400?"56px 64px 96px":"48px 44px 96px",
      maxWidth:winW>1400?1120:980,width:"100%",margin:"0 auto",alignSelf:"stretch",
      position:"relative"}}>

      {/* Mastery header — streak · XP · level · difficulty */}
      <MasteryHeader meta={meta} mod={mod} lc={lc} isSm={isSm}/>

      {/* Smart recommendation banner — shown if not on the recommended lesson */}
      {nextRec&&nextRec.li!==li||nextRec?.mi!==mi?null:null}
      {nextRec&&(nextRec.li!==li||nextRec.mi!==mi)&&(
        <div style={{
          marginBottom:20,padding:"12px 18px",
          background:"rgba(109,124,255,.06)",
          border:"1px solid rgba(109,124,255,.2)",
          borderRadius:"var(--r-sm)",
          display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",
        }}>
          <span style={{fontSize:13,color:T.t3}}>Next recommended:</span>
          <button onClick={()=>nav(nextRec.li,nextRec.mi)}
            style={{background:"none",border:"none",cursor:"pointer",padding:0,
              color:T.A,fontSize:13.5,fontWeight:600,
              display:"flex",alignItems:"center",gap:6}}>
            {nextRec.mod.title}
            <span style={{fontSize:11,color:T.t3,fontWeight:400}}>
              — {COURSE[nextRec.li]?.level}
            </span>
            <span style={{color:T.A}}>→</span>
          </button>
        </div>
      )}

      {/* Breadcrumb + lesson header */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        <span style={{
          display:"inline-flex",alignItems:"center",gap:5,
          padding:"3px 12px",borderRadius:"var(--r-pill)",
          background:`${lc}14`,border:`1px solid ${lc}35`,
          fontSize:11,fontWeight:700,color:lc,letterSpacing:.4,
        }}>{lv.icon} {lv.level.toUpperCase()}</span>
        <span style={{color:"rgba(36,49,79,.6)",fontSize:16,lineHeight:1}}>›</span>
        <span style={{fontSize:12.5,color:T.t3,fontFamily:"var(--font-code)"}}>
          Lesson {mi+1} / {lv.modules.length}
        </span>
        {done[`${li}-${mi}`]&&<span style={{
          display:"inline-flex",alignItems:"center",gap:4,
          padding:"3px 10px",borderRadius:"var(--r-pill)",
          background:`${T.S}14`,border:`1px solid ${T.S}30`,
          fontSize:11,fontWeight:700,color:T.S,letterSpacing:.3,
        }}>✓ Complete</span>}
      </div>
      <h1 style={{fontFamily:"var(--font-head)",fontSize:isSm?24:winW>1400?44:36,fontWeight:800,
        margin:"0 0 8px",lineHeight:1.1,letterSpacing:"-.03em",
        background:`linear-gradient(135deg,${T.tx} 20%,${T.BL} 100%)`,
        WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}}>{mod.title}</h1>
      <p style={{color:T.t2,fontSize:isSm?14:winW>1400?18:16,margin:`0 0 ${isSm?28:winW>1400?60:48}px`,
        lineHeight:1.7}}>{mod.tagline}</p>

      <LessonPage
        key={`${li}-${mi}`}
        mod={mod}
        db={db}
        lc={lc}
        meta={meta}
        earnXP={earnXP}
        grantAchievement={grantAchievement}
        onNext={()=>{markDone();goNext();}}
        hasNext={hasNext}
        lessonStepCtrl={lessonStepCtrl}
      />

      {/* Confidence meter — after lesson is started */}
      <div style={{marginTop:32,paddingTop:20,
        borderTop:"1px solid rgba(36,49,79,.3)"}}>
        <ConfidenceMeter
          modId={`${li}-${mi}`}
          value={confidence}
          onChange={setConfidence}/>
      </div>
    </main>

    {/* STICKY ACTION BAR ─────────────────────────────────────────
         Previous | Step n of 8 | Hint | (Check / Next)           */}
    <ActionBar
      hasNext={hasNext}
      hasPrev={currIdx>0}
      onPrev={()=>{if(currIdx>0){const p=flatMods[currIdx-1];nav(p.li,p.mi);}}}
      onNext={()=>{markDone();goNext();}}
      db={db} dbErr={dbErr}
      onWorkspace={()=>setCmd(true)}
      isSm={isSm}
      done={done}
      lessonStepCtrl={lessonStepCtrl}
    />

    <CmdPal db={db} open={cmd} onClose={()=>setCmd(false)} onReset={resetProgress}/>
    {pendingAch&&<AchievementToast achievement={pendingAch} onDismiss={()=>setPendingAch(null)}/>}
    {showFullCert&&<CertificateModal allDone lc={T.A} onClose={()=>setShowFullCert(false)}/>}
  </div></ErrorBoundary>;
}

// ── Mount ──────────────────────────────────────────────────────
const domRoot = ReactDOM.createRoot(document.getElementById("root"));
domRoot.render(React.createElement(ErrorBoundary, null, React.createElement(App)));

  </script>
</body>
</html>
