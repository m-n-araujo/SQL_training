/* ─── LESSON PAGE ────────────────────────────────────── */
function LessonPage({mod,db,lc,onNext,hasNext,meta,earnXP,grantAchievement,lessonStepCtrl}){
  const[step,setStep]=useState({hook:true,concept:false,seeit:false,guided:false,usecase:false,recall:false,challenge:false,done:false});
  const[guidedDone,setGD]=useState({});
  const[recallDone,setRD]=useState(false);
  const[challengeDone,setCD]=useState(false);
  const[guidedFills,setGF]=useState({});

  const unlock=useCallback((k)=>setStep(s=>({...s,[k]:true})),[]);
  const guidedPassed=mod.guided?.filter((_,i)=>guidedDone[i]).length||0;
  const allGuided=mod.guided?.length||0;
  const co=CO[mod.hook.co];

  // ── Expose step state to ActionBar via ref ──────────────────
  // Compute which step is currently "active" (last unlocked, not yet completed)
  const STEP_ORDER=['hook','concept','seeit','guided','usecase','recall','challenge','done'];
  const STEP_NAMES={
    hook:'Mission Brief',concept:'Core Idea',seeit:'Watch It Work',
    guided:'Try With Guidance',usecase:'In the Real World',
    recall:'Quick Check',challenge:'Mission Challenge',done:'Debrief',
  };
  // Current step = first unlocked-but-incomplete, or last if all done
  const currentStepKey=(()=>{
    for(let i=0;i<STEP_ORDER.length-1;i++){
      const k=STEP_ORDER[i],nk=STEP_ORDER[i+1];
      if(step[k]&&!step[nk])return k;
    }
    return step.done?'done':'hook';
  })();
  const stepNum=STEP_ORDER.indexOf(currentStepKey)+1;

  // Hint state for each step (action bar proxy)
  const[barHintIdx,setBarHintIdx]=useState(-1);
  const barHints=(()=>{
    // Surface hints relevant to current step
    if(currentStepKey==='guided'&&mod.guided?.length){
      const firstUnpassed=mod.guided.findIndex((_,i)=>!guidedDone[i]);
      if(firstUnpassed>=0)return mod.guided[firstUnpassed]?.hints||[];
    }
    if(currentStepKey==='challenge'&&mod.challenge?.length){
      return mod.challenge[0]?.hints||[];
    }
    return [];
  })();

  // canAdvance = whether the current step's ContinueBtn should be enabled
  const canAdvance=(()=>{
    if(currentStepKey==='hook')return true;
    if(currentStepKey==='concept')return step.concept;
    if(currentStepKey==='seeit')return step.seeit;
    if(currentStepKey==='guided')return guidedPassed===allGuided&&step.guided;
    if(currentStepKey==='usecase')return step.usecase;
    if(currentStepKey==='recall')return recallDone;
    if(currentStepKey==='challenge')return challengeDone;
    if(currentStepKey==='done')return false;
    return false;
  })();

  // doAdvance = advance the current step
  const doAdvance=(()=>{
    const map={
      hook:()=>unlock('concept'),
      concept:()=>unlock('seeit'),
      seeit:()=>unlock('guided'),
      guided:()=>unlock('usecase'),
      usecase:()=>unlock('recall'),
      recall:()=>{},  // auto-unlocked by Recall component
      challenge:()=>{},
      done:()=>onNext(),
    };
    return map[currentStepKey]||(()=>{});
  })();

  // Populate the ref every render
  useEffect(()=>{
    if(!lessonStepCtrl)return;
    lessonStepCtrl.current={
      stepKey:currentStepKey,
      stepNum,
      stepName:STEP_NAMES[currentStepKey]||'',
      canAdvance,
      doAdvance,
      hints:barHints,
      hintIdx:barHintIdx,
      nextHint:()=>setBarHintIdx(h=>Math.min(h+1,barHints.length-1)),
    };
  }); // intentionally runs every render

  return <div style={{display:"flex",flexDirection:"column",gap:10}}>

    {/* ── STEP 1: MISSION ── */}
    <Step num={1} icon="🎯" label="Mission Brief" color={T.A} complete={step.concept}>

        padding:"20px 24px",marginBottom:24,borderRadius:"var(--r-sm)",

        <div style={{fontSize:12,fontWeight:600,color:T.B,letterSpacing:.5,marginBottom:8}}>Mental Model</div>
        <div style={{color:T.t2,fontSize:14,lineHeight:1.8}}>{mod.concepts[0].analogy}</div>

          <div key={i} className="glass-card" style={{padding:"20px 20px"}}>
            <div style={{fontSize:24,marginBottom:12}}>{c.icon}</div>
            <div style={{fontFamily:"var(--font-head)",fontWeight:700,fontSize:14.5,
              color:T.tx,marginBottom:8,lineHeight:1.25}}>{c.title}</div>
            <div style={{color:T.t2,fontSize:13,lineHeight:1.75}}>{c.body}</div>
            {c.tip&&<div style={{marginTop:12,padding:"10px 14px",
              background:`${T.B}0a`,borderRadius:"var(--r-xs)",
              borderLeft:`2px solid ${T.B}55`,color:T.t2,fontSize:12.5,lineHeight:1.6}}>
              💡 {c.tip}
            </div>}
            {c.misconception&&<div style={{marginTop:12,padding:"10px 14px",
              background:T.err.bg,borderRadius:"var(--r-xs)",
              borderLeft:`2px solid ${T.R}`,color:T.err.tx,fontSize:12.5,lineHeight:1.6}}>
              ⚠️ {c.misconception}

      <ContinueBtn label="Show Me Examples →" onClick={()=>unlock("seeit")} color={T.A}/>

      <p style={{color:T.t2,fontSize:14,marginBottom:24,lineHeight:1.7}}>
        <strong style={{color:T.tx}}>Study these patterns</strong> — each example runs live.

      </p>
      <div style={{display:"flex",flexDirection:"column",gap:0}}>
        {mod.seeit.map((ex,i)=>(
          <div key={i}>
            <div style={{fontSize:12,color:T.t3,marginBottom:6,fontFamily:"var(--font-code)",
              letterSpacing:.3}}>
              {i+1}. {ex.lbl}
            </div>
            <CB sql={ex.sql} ann={ex.ann}/>
          </div>
        ))}
      </div>
      <div style={{marginTop:20}}>
        <div style={{fontSize:13,color:T.t3,marginBottom:10}}>Try any example live ↓</div>
        <Console initSQL={mod.seeit[0]?.sql||""} db={db} compact/>
      </div>
      <ContinueBtn label="Try It Myself →" onClick={()=>unlock("guided")} color={T.A}/>
    </Step>

    {/* ── STEP 4: GUIDED PRACTICE ── */}
    <Step num={4} icon="✍️" label={`Try With Guidance (${guidedPassed}/${allGuided} done)`} color={lc} locked={!step.guided} complete={step.usecase}>
      <p style={{color:T.t2,fontSize:14,marginBottom:24,lineHeight:1.7}}>
        Scaffolding fades across exercises — fill the{" "}
        <code style={{color:T.A,fontFamily:"var(--font-code)",fontSize:13}}>indigo blanks</code>
        {" "}or choose from{" "}
        <code style={{color:T.B,fontFamily:"var(--font-code)",fontSize:13}}>cyan dropdowns</code>
        , then click Check.
      </p>
      <div style={{display:"flex",flexDirection:"column",gap:16}}>
        {mod.guided.map((g,i)=>(
          <GuidedEx key={i} g={g} i={i} lc={lc} db={db}
            guidedDone={guidedDone} setGD={setGD}
            guidedFills={guidedFills} setGF={setGF}
            earnXP={earnXP} grantAchievement={grantAchievement}/>
        ))}
      </div>
      {guidedPassed===allGuided&&(
        <ContinueBtn label="See It in the Wild →" onClick={()=>{
          unlock("usecase");
          if(grantAchievement) grantAchievement("clean_sweep");
        }} color={T.A}/>
      )}
    </Step>

    {/* ── STEP 5: REAL WORLD ── */}
    <Step num={5} icon="🌍" label="In the Real World" color={T.B} locked={!step.usecase} complete={step.recall}>
      <p style={{color:T.t2,fontSize:14,marginBottom:24,lineHeight:1.7}}>
        <strong style={{color:T.tx}}>Transfer is the goal of learning.</strong>{" "}
        These are real queries used by analysts — same concepts, authentic business context.
      </p>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {mod.usecases.map((uc,i)=><UsecaseCard key={i} uc={uc} i={i} db={db}/>)}
      </div>
      <ContinueBtn label="Check My Knowledge →" onClick={()=>unlock("recall")} color={T.A}/>
    </Step>

    {/* ── STEP 6: RECALL ── */}
    <Step num={6} icon="🧠" label="Quick Check" color={T.M} locked={!step.recall} complete={step.challenge}>
      <p style={{color:T.t2,fontSize:14,marginBottom:24,lineHeight:1.7}}>
        <strong style={{color:T.tx}}>Retrieval practice</strong> strengthens memory far more than re-reading.
        Answer all questions to unlock the Mission Challenge.
      </p>
      <Recall questions={mod.recall} onAllDone={()=>{setRD(true);unlock("challenge");if(earnXP)earnXP("recall");}}/>
      {recallDone&&<div className="aUp" style={{marginTop:16,padding:"14px 20px",
        background:T.ok.bg,borderRadius:"var(--r-sm)",
        color:T.ok.tx,fontSize:14,fontWeight:600,display:"flex",alignItems:"center",gap:10}}>
        ✅ All questions answered — the Mission Challenge is now unlocked!
      </div>}
    </Step>

    {/* ── STEP 7: CHALLENGE ── */}
    <Step num={7} icon="🔓" label="Mission Challenge" color={T.M} locked={!step.challenge} complete={step.done}>
      <p style={{color:T.t2,fontSize:14,marginBottom:24,lineHeight:1.7}}>
        <strong style={{color:T.tx}}>No scaffold provided.</strong>{" "}
        Write the complete query from scratch — no hints shown by default. Struggle productively; hints are one click away.
      </p>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        {mod.challenge.map((c,i)=>(
          <ChallengeEx key={i} ex={c} db={db} lc={lc} earnXP={earnXP} grantAchievement={grantAchievement} onPass={()=>{setCD(true);unlock("done");}}/>
        ))}
      </div>
    </Step>

    {/* ── STEP 8: COMPLETE ── */}
    <Step num={8} icon="✅" label="Debrief" color={T.S} locked={!step.done} complete={false}>
      <CompleteCard mod={mod} lc={lc} onNext={onNext} hasNext={hasNext}/>
    </Step>

  </div>;
}

/* ─── ACHIEVEMENT TOAST — elegant, one-time moment ──────────────
   Appears bottom-right, fades in, auto-dismisses after 5s.       */
function AchievementToast({achievement, onDismiss}){
  const a = ACHIEVEMENTS.find(x=>x.id===achievement);
  useEffect(()=>{
    if(!a) return;
    const t = setTimeout(onDismiss, 5200);
    return ()=>clearTimeout(t);
  },[a]);
  if(!a) return null;
  return (
    <div className="toastIn" style={{
      position:"fixed", bottom:52, right:20, zIndex:500,
      maxWidth:280, padding:"16px 18px",
      background:`linear-gradient(135deg,${T.s2},${T.s3})`,
      border:`1px solid ${a.color||T.A}44`,
      borderRadius:"var(--r-md)",
      boxShadow:`0 8px 40px rgba(4,6,18,.7), 0 0 24px ${a.color||T.A}20`,
    }}>
      <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
        <div style={{
          width:40,height:40,borderRadius:"var(--r-sm)",flexShrink:0,
          background:`${a.color||T.A}18`,border:`1px solid ${a.color||T.A}35`,
          display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:20, boxShadow:`0 0 12px ${a.color||T.A}30`,
        }}>{a.icon}</div>
        <div>
          <div style={{fontSize:10,fontWeight:700,color:a.color||T.A,
            letterSpacing:1.2,textTransform:"uppercase",marginBottom:4}}>
            Achievement Unlocked
          </div>
          <div style={{fontFamily:"var(--font-head)",fontWeight:700,
            fontSize:14.5,color:T.tx,marginBottom:4,lineHeight:1.2}}>{a.title}</div>
          <div style={{fontSize:12,color:T.t2,lineHeight:1.5}}>{a.desc}</div>
          <div style={{fontSize:11,color:a.color||T.A,marginTop:5,fontWeight:600}}>
            +{a.xp} XP
          </div>
        </div>
      </div>
      {/* Auto-dismiss bar */}
      <div style={{
        position:"absolute",bottom:0,left:0,height:2,borderRadius:"0 0 var(--r-md) var(--r-md)",
        background:`linear-gradient(90deg,${a.color||T.A},${a.color||T.A}55)`,
        animation:"shrinkBar 5s linear both",
      }}/>
    </div>
  );
}

    <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>

/* ─── MASTERY HEADER — streak · XP · level · difficulty ─────────
   Rendered above the lesson content. Stays executive and minimal. */
function MasteryHeader({meta, mod, lc, isSm}){
  const xp      = calcXP(meta);
  const level   = getMasteryLevel(xp);
  const nextLvl = MASTERY_LEVELS.find(l=>l.min>xp);
  const pctToNext = nextLvl
    ? Math.round((xp - level.min) / (nextLvl.min - level.min) * 100)
    : 100;
  const diff    = MOD_DIFFICULTY[mod?.id] || 2;
  const streak  = meta.streak || 0;

  return (
    <div style={{
      display:"flex", flexWrap:"wrap", gap:isSm?10:20,
      marginBottom:isSm?20:36,
      padding:"14px 18px",
      background:"rgba(6,8,22,.55)",
      borderRadius:"var(--r-sm)",
      border:"1px solid rgba(36,49,79,.4)",
      alignItems:"center",
    }}>
      {/* Mastery level + XP bar */}
      <div style={{flex:"1 1 160px",minWidth:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
          <span style={{fontSize:11,fontWeight:700,color:level.color,letterSpacing:.5}}>
            {level.label}
          </span>
          <span style={{fontSize:10.5,color:T.t3,fontFamily:"var(--font-code)"}}>
            {xp.toLocaleString()} XP
          </span>
          {nextLvl&&<span style={{fontSize:10,color:T.t4,fontFamily:"var(--font-code)",marginLeft:"auto"}}>
            {nextLvl.min - xp} to next
          </span>}
        </div>
        <PBar pct={pctToNext} color={level.color} h={3}/>
      </div>

      {/* Divider */}
      <div style={{width:1,height:32,background:"rgba(36,49,79,.5)"}} className="hide-sm"/>

      {/* Streak */}
      <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
        <span style={{fontSize:15}}>{streak>=7?"🌟":streak>=3?"🔥":"◈"}</span>
        <div>
          <div style={{fontSize:13,fontWeight:700,color:streak>0?T.A:T.t3,lineHeight:1}}>
            {streak}
          </div>
          <div style={{fontSize:10,color:T.t3,marginTop:1}}>day streak</div>
        </div>
      </div>

      {/* Divider */}
      <div style={{width:1,height:32,background:"rgba(36,49,79,.5)"}} className="hide-sm"/>

      {/* Difficulty meter */}
      <div style={{display:"flex",alignItems:"center",gap:7,flexShrink:0}}>
        <span style={{fontSize:10,color:T.t3,whiteSpace:"nowrap"}}>Difficulty</span>
        <div style={{display:"flex",gap:3}}>
          {[1,2,3,4,5].map(n=>(
            <div key={n} style={{
              width:5, height:14,
              borderRadius:2,
              background: n<=diff
                ? (diff<=2?T.S:diff<=3?T.A:diff<=4?T.M:T.R)
                : "rgba(36,49,79,.45)",
              transition:"background .2s",
              boxShadow: n<=diff ? `0 0 4px currentColor` : undefined,
            }}/>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ─── ACTION BAR — sticky bottom, Previous / Step / Hint / Next ─
   Reads step state from lessonStepCtrl ref populated by LessonPage. */
function ActionBar({hasNext,hasPrev,onPrev,onNext,db,dbErr,onWorkspace,isSm,lessonStepCtrl}){
  // lessonStepCtrl.current = {stepKey, stepNum, stepName, canAdvance, doAdvance, hints, hintIdx, nextHint}
  const[tick,setTick]=useState(0); // force re-render when step changes
  useEffect(()=>{
    // Re-render whenever the LessonPage updates the ref
    const id=setInterval(()=>setTick(t=>t+1),80);
    return()=>clearInterval(id);
  },[]);

  const ctrl=lessonStepCtrl?.current||{};
  const {stepNum=1,stepName='Mission Brief',canAdvance=false,doAdvance,hints=[],hintIdx=-1,nextHint}=ctrl;
  const isLastStep=stepNum===8;

  const btnBase={
    display:'flex',alignItems:'center',gap:6,
    padding:'0 18px',height:'100%',borderRadius:0,
    border:'none',cursor:'pointer',
    fontSize:13,fontWeight:600,
    transition:'all .18s',
    fontFamily:'var(--font-ui)',
  };

  return(
    <div style={{
      position:'fixed',bottom:0,left:0,right:0,
      height:52,zIndex:200,
      background:`rgba(11,16,32,.96)`,
      borderTop:`1px solid rgba(36,49,79,.55)`,
      backdropFilter:'blur(14px)',WebkitBackdropFilter:'blur(14px)',
      boxShadow:'0 -4px 28px rgba(4,6,18,.55)',
      display:'flex',alignItems:'stretch',
    }}>

      {/* ── LEFT: Previous ── */}
      <button
        onClick={hasPrev?onPrev:undefined}
        disabled={!hasPrev}
        style={{...btnBase,
          color:hasPrev?T.t2:T.t4,
          background:'none',
          paddingLeft:isSm?12:20,
          opacity:hasPrev?1:.35,
          borderRight:`1px solid rgba(36,49,79,.4)`,
        }}
        onMouseEnter={e=>{if(hasPrev)e.currentTarget.style.color=T.tx;}}
        onMouseLeave={e=>{e.currentTarget.style.color=hasPrev?T.t2:T.t4;}}>
        <span style={{fontSize:15,lineHeight:1}}>‹</span>
        {!isSm&&<span>Prev</span>}
      </button>

      {/* ── CENTRE: Step indicator ── */}
      <div style={{flex:1,display:'flex',alignItems:'center',
        justifyContent:'center',gap:10,padding:'0 12px'}}>
        {/* Step dots */}
        <div style={{display:'flex',gap:5,alignItems:'center'}}>
          {[1,2,3,4,5,6,7,8].map(n=>(
            <div key={n} style={{
              width: n===stepNum?20:6,
              height:4,
              borderRadius:99,
              background: n<stepNum
                ? `rgba(41,211,145,.55)`    // past = mint-ish
                : n===stepNum
                  ? T.A                      // current = indigo
                  : 'rgba(36,49,79,.5)',     // future = dim
              transition:'all .25s',
            }}/>
          ))}
        </div>
        {/* Step name (hidden on smallest screens) */}
        {!isSm&&<span aria-live="polite" aria-atomic="true" style={{
          fontSize:11.5,color:T.t2,fontWeight:500,
          whiteSpace:'nowrap',letterSpacing:.1,
        }}>
          Step {stepNum} of 8 — {stepName}
        </span>}
      </div>

      {/* ── RIGHT: Hint + Next/Continue ── */}
      <div style={{display:'flex',alignItems:'stretch',
        borderLeft:`1px solid rgba(36,49,79,.4)`}}>

        {/* Hint button — only if hints exist and step not done */}
        {hints.length>0&&!isLastStep&&(
          <button
            onClick={nextHint}
            title={`Hint ${hintIdx+2} of ${hints.length}`}
            style={{...btnBase,
              color:T.M,background:'none',
              borderRight:`1px solid rgba(36,49,79,.4)`,
              opacity: hintIdx>=hints.length-1 ? .35 : 1,
            }}
            disabled={hintIdx>=hints.length-1}
            onMouseEnter={e=>{e.currentTarget.style.background=`rgba(167,139,250,.08)`;}}
            onMouseLeave={e=>{e.currentTarget.style.background='none';}}>
            <span style={{fontSize:14}}>💡</span>
            {!isSm&&<span>Hint</span>}
          </button>
        )}

        {/* Next / Continue button */}
        <button
          onClick={isLastStep&&hasNext ? onNext : (canAdvance ? doAdvance : undefined)}
          disabled={!canAdvance&&!(isLastStep&&hasNext)}
          style={{...btnBase,
            background: (canAdvance||(isLastStep&&hasNext)) ? T.A : 'rgba(36,49,79,.4)',
            color: (canAdvance||(isLastStep&&hasNext)) ? '#060816' : T.t4,
            paddingRight: isSm?12:24,
            boxShadow: (canAdvance||(isLastStep&&hasNext))
              ? '0 0 16px rgba(109,124,255,.35)' : 'none',
          }}>
          {isLastStep&&hasNext ? (
            <><span>Next Mission</span><span style={{fontSize:15}}>›</span></>
          ) : canAdvance ? (
            <><span>{isSm?'Next':'Continue'}</span><span style={{fontSize:15}}>›</span></>
          ) : (
            <span style={{fontSize:12}}>{isSm?'—':'Complete step'}</span>
          )}
        </button>
      </div>

      {/* DB status dot + workspace — right-most, tiny */}
      <div style={{display:'flex',alignItems:'center',gap:6,
        padding:'0 12px',borderLeft:`1px solid rgba(36,49,79,.4)`}}>
        <div style={{width:6,height:6,borderRadius:'50%',flexShrink:0,
          background:db?T.S:dbErr?T.R:T.A,
          animation:(!db&&!dbErr)?'pulse 1.5s ease infinite':undefined,
          boxShadow:db?`0 0 5px ${T.S}55`:undefined}}/>
        <button onClick={onWorkspace}
          style={{background:'none',border:'none',cursor:'pointer',
            color:T.t3,fontSize:10.5,fontFamily:'var(--font-ui)',
            display:'flex',alignItems:'center',gap:4}}
          onMouseEnter={e=>e.currentTarget.style.color=T.A}
          onMouseLeave={e=>e.currentTarget.style.color=T.t3}>
          ⌘K
        </button>
      </div>
    </div>
  );
}

/* ─── NAV STRIP — module names, section labels, progress bar ─────
   Desktop: full names + progress bar across top
   Mobile:  abbreviated, scrollable                                */
function NavStrip({li,mi,done,nav,winW}){
  const isSm = winW < 600;
  const isMd = winW < 900;
  const totalMods = COURSE.reduce((a,l)=>a+l.modules.length,0);
  const totalDone = Object.values(done).filter(Boolean).length;
  const pct       = Math.round(totalDone/totalMods*100);

  const scrollRef = useRef();
  useEffect(()=>{
    // Scroll active tab into view when lesson changes
    const el = scrollRef.current?.querySelector('[aria-current="page"]');
    el?.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  },[li,mi]);

  return (
    <div style={{flexShrink:0,background:T.surf,
      borderBottom:`1px solid ${T.brd}`,
      boxShadow:`0 2px 12px rgba(4,6,18,.35)`}}>

      {/* ── GLOBAL PROGRESS BAR — 6px, amber, smooth width transition ── */}
      <div style={{height:6,background:"rgba(36,49,79,.45)",width:"100%",position:"relative",overflow:"hidden"}}>
        <div style={{
          height:"100%",width:`${pct}%`,minWidth:pct>0?"4px":0,
          background:"linear-gradient(90deg,#c4851888,#f0a832dd,#f5c247)",
          boxShadow:"0 0 10px rgba(240,168,50,.55), 0 0 2px rgba(240,168,50,.9)",
          transition:"width .7s cubic-bezier(.22,.68,0,1.15)",
          borderRadius:"0 3px 3px 0",
        }}/>
        {/* Subtle shimmer on the fill */}
        {pct>0&&<div style={{
          position:"absolute",top:0,left:0,height:"100%",width:`${pct}%`,
          background:"linear-gradient(90deg,transparent 40%,rgba(255,255,255,.18) 60%,transparent 80%)",
          backgroundSize:"200% 100%",
          animation:"shimmer 2.5s linear infinite",
          borderRadius:"0 3px 3px 0",
          pointerEvents:"none",
        }}/>}
      </div>

      {/* ── MODULE TABS ── */}
      <div ref={scrollRef} style={{
        display:"flex",alignItems:"stretch",
        overflowX:"auto",WebkitOverflowScrolling:"touch",
        scrollbarWidth:"none",
      }}>
        {COURSE.flatMap((lv,lvi)=>
          lv.modules.map((m,mii)=>{
            const k   = `${lvi}-${mii}`;
            const isA = lvi===li && mii===mi;
            const isDone = !!done[k];
            const lc  = LC[lvi];
            const canNav = isDone || isA;   // can always jump back to done

            return (
              <button key={k}
                onClick={()=>canNav&&nav(lvi,mii)}
                aria-current={isA?"page":undefined}
                aria-label={`${m.title}${isDone?" (complete)":isA?" (current)":""}`}

const STORAGE_KEY = "sqlmastery_progress_v1";

/* ─── MASTERY SYSTEM ──────────────────────────────────────────────
   XP per action (designed to feel earned, not cheap):
   • Guided exercise passed  : 20 XP
   • Recall question correct : 15 XP
   • Challenge passed        : 50 XP
   • Module debrief reached  : 30 XP bonus
   Streak: consecutive days with any activity (stored in meta).
   Difficulty meter: derived from DIFF map of current guided ex.
   Confidence meter: self-report 1-5, stored per module.
   Achievements: unlocked by specific milestones, shown once.     */

const XP_TABLE = {
  guided_pass:  20,
  recall_right: 15,
  challenge:    50,
  module_done:  30,
};

// Per-module difficulty weights (1–5)
const MOD_DIFFICULTY = {
  b1:1, b2:2, b3:2, b4:3, i1:4, i2:4, a1:5, a2:5,
};

// Achievements catalogue
const ACHIEVEMENTS = [
  {id:"first_query",   icon:"⚡", title:"First Query",       desc:"Ran your very first SQL statement.",          xp:10},
  {id:"clean_sweep",   icon:"🎯", title:"Clean Sweep",        desc:"Passed all guided exercises in one module.",   xp:40},
  {id:"streak_3",      icon:"🔥", title:"3-Day Streak",       desc:"Studied for 3 consecutive days.",              xp:50},
  {id:"streak_7",      icon:"🌟", title:"Weekly Momentum",    desc:"7 consecutive days — genuine commitment.",     xp:100},
  {id:"first_join",    icon:"🔗", title:"JOIN Mastery",       desc:"Completed the JOINs module.",                  xp:60},
  {id:"recall_streak", icon:"🧠", title:"Sharp Memory",       desc:"Answered 5 recall questions without a hint.",  xp:30},
  {id:"challenger",    icon:"🏆", title:"Challenger",         desc:"Completed your first Mission Challenge.",       xp:75},
  {id:"halfway",       icon:"🛸", title:"Halfway There",      desc:"Completed 50 % of the curriculum.",            xp:80},
  {id:"complete",      icon:"🎓", title:"SQL Operator",       desc:"Completed every current module.",              xp:200},
];

// Derive XP total from progress metadata
const calcXP = meta => {
  let xp = 0;
  xp += (meta.guidedPasses||0)  * XP_TABLE.guided_pass;
  xp += (meta.recallRights||0)  * XP_TABLE.recall_right;
  xp += (meta.challengePasses||0)* XP_TABLE.challenge;
  xp += (meta.modulesDone||0)   * XP_TABLE.module_done;
  (meta.achievements||[]).forEach(id=>{
    const a = ACHIEVEMENTS.find(x=>x.id===id);
    if(a) xp += a.xp;
  });
  return xp;
};

// Mastery level thresholds
const MASTERY_LEVELS = [
  {min:0,    label:"Analyst I",    color:"#7F90B5"},
  {min:100,  label:"Analyst II",   color:"#6D7CFF"},
  {min:300,  label:"SQL Engineer", color:"#22D3EE"},
  {min:600,  label:"Data Lead",    color:"#A78BFA"},
  {min:1000, label:"SQL Operator", color:"#29D391"},
];

const getMasteryLevel = xp =>
  [...MASTERY_LEVELS].reverse().find(l=>xp>=l.min) || MASTERY_LEVELS[0];

// Smart recommendation: first incomplete module
const getNextRec = (done, flatMods) => {
  const incomplete = flatMods.filter(f=>!done[`${f.li}-${f.mi}`]);
  if(!incomplete.length) return null;
  // Prefer the one immediately after the last completed
  const lastDone = flatMods.filter(f=>done[`${f.li}-${f.mi}`]);
  if(!lastDone.length) return incomplete[0];
  const lastIdx = flatMods.indexOf(lastDone[lastDone.length-1]);
  return flatMods[lastIdx+1] || incomplete[0];
};

          </span>}
        </div>
        {/* Workspace button */}
        <button onClick={()=>setCmd(true)}
          aria-label="Open workspace (⌘K)"
          style={{display:"flex",alignItems:"center",gap:7,padding:"6px 14px",
            background:T.s2,border:`1px solid ${T.brd}`,borderRadius:"var(--r-sm)",
            color:T.t2,fontSize:12.5,fontWeight:500,transition:"all .2s",
            boxShadow:`inset 0 1px 0 rgba(255,255,255,.04)`}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor=T.A;e.currentTarget.style.color=T.A;e.currentTarget.style.background=T.AS;}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor=T.brd;e.currentTarget.style.color=T.t2;e.currentTarget.style.background=T.s2;}}>
          <span style={{fontSize:13}}>⌘</span>
          {!isSm&&<span>Workspace</span>}
          {!isSm&&<kbd style={{fontSize:9.5,color:T.t3,background:T.s3,
            padding:"1px 5px",borderRadius:3,border:`1px solid ${T.brd}`,
            fontFamily:"var(--font-code)"}}>K</kbd>}
        </button>
      </div>
    </header>

    {/* NAV STRIP */}
    <NavStrip li={li} mi={mi} done={done} nav={nav} winW={winW}/>

    {/* MAIN */}
    <main id="main-content" ref={mainRef} style={{
      flex:1,overflowY:"auto",
      padding:isSm?"24px 16px 96px":winW>1400?"56px 64px 96px":"48px 44px 96px",
      maxWidth:winW>1400?1120:980,width:"100%",margin:"0 auto",alignSelf:"stretch"}}>

      {/* Mastery header — streak · XP · level · difficulty */}
      <MasteryHeader meta={meta} mod={mod} lc={lc} isSm={isSm}/>

      {/* Smart recommendation banner — shown if not on the recommended lesson */}
      {nextRec&&nextRec.li!==li||nextRec?.mi!==mi?null:null}
      {nextRec&&(nextRec.li!==li||nextRec.mi!==mi)&&(
        <div style={{
          marginBottom:20,padding:"12px 18px",
          background:"rgba(109,124,255,.06)",
          border:"1px solid rgba(109,124,255,.2)",
          borderRadius:"var(--r-sm)",
          display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",
        }}>
          <span style={{fontSize:13,color:T.t3}}>Next recommended:</span>
          <button onClick={()=>nav(nextRec.li,nextRec.mi)}
            style={{background:"none",border:"none",cursor:"pointer",padding:0,
              color:T.A,fontSize:13.5,fontWeight:600,
              display:"flex",alignItems:"center",gap:6}}>
            {nextRec.mod.title}
            <span style={{fontSize:11,color:T.t3,fontWeight:400}}>
              — {COURSE[nextRec.li]?.level}
            </span>
            <span style={{color:T.A}}>→</span>
          </button>
        </div>
      )}

      {/* Breadcrumb + lesson header */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,flexWrap:"wrap"}}>
        <Tag label={`${lv.icon} ${lv.level}`} color={lc}/>
        <span style={{color:"rgba(36,49,79,.7)",fontSize:18,lineHeight:1}}>›</span>
        <span style={{fontSize:13,color:T.t3}}>Lesson {mi+1} of {lv.modules.length}</span>
        {done[`${li}-${mi}`]&&<Tag label="✓ Complete" color={T.S} sm/>}
      </div>
      <h1 style={{fontFamily:"var(--font-head)",fontSize:isSm?24:winW>1400?44:36,fontWeight:800,
        margin:"0 0 8px",color:T.tx,lineHeight:1.1,letterSpacing:"-.03em"}}>{mod.title}</h1>
      <p style={{color:T.t2,fontSize:isSm?14:winW>1400?18:16,margin:`0 0 ${isSm?28:winW>1400?60:48}px`,
        lineHeight:1.7}}>{mod.tagline}</p>

      <LessonPage
        key={`${li}-${mi}`}
        mod={mod}
        db={db}
        lc={lc}
        meta={meta}
        earnXP={earnXP}
        grantAchievement={grantAchievement}
        onNext={()=>{markDone();goNext();}}
        hasNext={hasNext}
        lessonStepCtrl={lessonStepCtrl}
      />

      {/* Confidence meter — after lesson is started */}
      <div style={{marginTop:32,paddingTop:20,
        borderTop:"1px solid rgba(36,49,79,.3)"}}>
        <ConfidenceMeter
          modId={`${li}-${mi}`}
          value={confidence}
          onChange={setConfidence}/>
      </div>
    </main>

    {/* STICKY ACTION BAR ─────────────────────────────────────────
         Previous | Step n of 8 | Hint | (Check / Next)           */}
    <ActionBar
      hasNext={hasNext}
      hasPrev={currIdx>0}
      onPrev={()=>{if(currIdx>0){const p=flatMods[currIdx-1];nav(p.li,p.mi);}}}
      onNext={()=>{markDone();goNext();}}
      db={db} dbErr={dbErr}
      onWorkspace={()=>setCmd(true)}
      isSm={isSm}
      done={done}
      lessonStepCtrl={lessonStepCtrl}
    />

    <CmdPal db={db} open={cmd} onClose={()=>setCmd(false)} onReset={resetProgress}/>
    {pendingAch&&<AchievementToast achievement={pendingAch} onDismiss={()=>setPendingAch(null)}/>}
  </div>;
}

// ── Mount ──────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));

  </script>
</body>
</html>
