  {id:"b3", title:"ORDER BY, LIMIT & DISTINCT", tagline:"Sort results, cap their size, and eliminate duplicate rows.",
   hook:{
     co:"nexus", day:"Thursday, 11:22 am",
     msg:"Can you send me the top 5 most expensive products? Also the unique cities our customers are in — no duplicates please.",
     from:"Zara Oduya · Head of Growth",
     insight:"Unsorted data is hard to read. Unlimited results waste bandwidth. Duplicate rows mislead decisions. These three clauses clean up every query you write.",
   },
   concepts:[
     {icon:"↕️", title:"ORDER BY — sort your results",
      body:"ORDER BY col ASC sorts smallest-to-largest (default). ORDER BY col DESC sorts largest-to-smallest. You can sort on multiple columns: the second breaks ties in the first.",
      analogy:"Imagine printing out all 12 salary records, then shuffling them. ORDER BY is stapling them back together in salary order — highest to lowest, or A to Z, or oldest to newest.",
      misconception:null},
     {icon:"✂️", title:"LIMIT — cap the number of rows",
      body:"LIMIT n returns at most n rows. Always pair it with ORDER BY — without a sort, LIMIT returns an arbitrary subset. OFFSET k skips the first k rows (useful for pagination).",
      analogy:null, tip:"LIMIT 5 OFFSET 10 means: skip 10, show the next 5. That's page 3 of a 5-per-page list."},
     {icon:"🔁", title:"DISTINCT — remove duplicate rows",
      body:"SELECT DISTINCT col1, col2 removes rows where every selected column is identical to another row. It operates on the combination of all selected columns.",
      analogy:null, tip:"DISTINCT applies to the combination of all selected columns, not just the first. SELECT DISTINCT dept_id, name will not deduplicate if names differ."},
   ],
   seeit:[
     {lbl:"Sort salaries descending",      ann:"DESC = largest first. ASC (default) = smallest first.",
      sql:"SELECT name, salary\nFROM employees\nORDER BY salary DESC;"},
     {lbl:"Top 5 highest-paid",            ann:"Always pair ORDER BY with LIMIT — otherwise LIMIT is random",
      sql:"SELECT name, salary\nFROM employees\nORDER BY salary DESC\nLIMIT 5;"},
     {lbl:"Sort on multiple columns",      ann:"dept_id groups, then salary sorts within each group",
      sql:"SELECT dept_id, name, salary\nFROM employees\nORDER BY dept_id ASC, salary DESC;"},
     {lbl:"Unique cities (DISTINCT)",      ann:"DISTINCT collapses duplicate city values into one row each",
      sql:"SELECT DISTINCT city\nFROM departments\nORDER BY city;"},
     {lbl:"Pagination with OFFSET",        ann:"Page 2 of 4-per-page: skip the first 4, show the next 4",
      sql:"SELECT name, salary\nFROM employees\nORDER BY salary DESC\nLIMIT 4 OFFSET 4;"},
   ],
   guided:[
     {id:"g1", diff:"Easy", scaffold:0.85,
      title:"Top 3 products by price",
      context:"Priya needs the 3 most expensive products. Show name and price, most expensive first.",
      template:"SELECT name, price\nFROM products\nORDER BY price %%D:DESC|ASC%%\nLIMIT %%B:row cap%%;",
      checks:[{t:"rows",n:3},{t:"col",c:"price"}],
      hints:["Most expensive first = DESC","Row cap = 3"],
      solution:"SELECT name, price\nFROM products\nORDER BY price DESC\nLIMIT 3;",
      whyItWorks:"ORDER BY price DESC puts $1,299.99 (Laptop Pro) first. LIMIT 3 cuts the result at the third row. Without ORDER BY, LIMIT would return 3 arbitrary rows."},
     {id:"g2", diff:"Easy", scaffold:0.7,
      title:"Unique customer cities",

      template:"SELECT %%D:DISTINCT|ALL|TOP%% city\nFROM customers\nORDER BY city;",
      checks:[{t:"col",c:"city"}],
      hints:["DISTINCT removes duplicate values from the result"],
      solution:"SELECT DISTINCT city\nFROM customers\nORDER BY city;",
      whyItWorks:"Without DISTINCT, if 3 customers share a city you'd see that city 3 times. DISTINCT collapses them into one row."},
     {id:"g3", diff:"Medium", scaffold:0.5,
      title:"Sort employees by department then salary",
      context:"HR wants employees grouped by department, with highest-paid listed first within each department.",
      template:"SELECT name, dept_id, salary\nFROM employees\nORDER BY %%B:primary sort column%% ASC,\n         %%B:secondary sort column%% %%B:direction%%;",
      checks:[{t:"rows",n:12},{t:"col",c:"dept_id"}],
      hints:["Primary: dept_id (to group departments together)","Secondary: salary","Direction: DESC (highest first within each dept)"],
      solution:"SELECT name, dept_id, salary\nFROM employees\nORDER BY dept_id ASC, salary DESC;",
      whyItWorks:"The first ORDER BY key groups employees by team. The second sorts within each team. Multi-column sorts are common in any report that has categories and values."},
     {id:"g4", diff:"Easy", type:"clauseorder",
      title:"Put these clauses in the right order",
      context:"A query that filters AND sorts must put its clauses in a specific sequence. Drag them into the correct top-to-bottom order.",
      clauses:["ORDER BY","SELECT","WHERE","FROM"],
      correctOrder:["SELECT","FROM","WHERE","ORDER BY"],
      hints:["SQL reads FROM first, then filters with WHERE, then picks columns with SELECT, then sorts with ORDER BY"],
      whyItWorks:"Logical order: FROM → WHERE → SELECT → ORDER BY. Even though you write SELECT first, it is evaluated last (after all rows are filtered). ORDER BY always sits at the very end."},
   ],
   usecases:[
     {co:"nexus", icon:"🏆", title:"Top Products for a Marketing Email",
      situation:"Marketing wants to promote the 5 most expensive items in a 'premium picks' email. Highest price first.",
      sql:"SELECT name, category, price\nFROM products\nORDER BY price DESC\nLIMIT 5;",
      result:"Laptop Pro ($1,299.99) tops the list. The email template fills automatically from this query.",
      transferPoint:"ORDER BY + LIMIT is one of the most common patterns in product and analytics work. Always define your sort before limiting."},
     {co:"forge", icon:"📍", title:"Unique Supplier Cities",

      sql:"SELECT DISTINCT city\nFROM departments\nORDER BY city;",
      result:"3 unique cities: Chicago, New York, San Francisco. No city appears twice despite multiple departments per city.",
      transferPoint:"DISTINCT is often faster and cleaner than GROUP BY col when you only need unique values and no aggregation."},
     {co:"meridian", icon:"📋", title:"Paginated Employee Directory",

      sql:"SELECT name, dept_id, hire_date\nFROM employees\nORDER BY name ASC\nLIMIT 4 OFFSET 4;",
      result:"Employees 5–8 alphabetically. OFFSET 4 skips the first page; LIMIT 4 defines the page size.",
      transferPoint:"LIMIT + OFFSET is the standard SQL pagination pattern. Used in every web app that shows data in pages."},
   ],
   recall:[
     {q:"You write SELECT name FROM employees LIMIT 3 — but forget ORDER BY. What rows are returned?",
      opts:["The 3 rows with the lowest salary","The 3 rows with the highest salary","3 arbitrary rows — order is undefined without ORDER BY","An error — LIMIT requires ORDER BY"],

     {q:"SELECT DISTINCT dept_id FROM employees — how many rows if there are 5 departments and 12 employees?",

     {q:"ORDER BY dept_id ASC, salary DESC — how are ties in dept_id broken?",
      opts:["Alphabetically by name","By salary, highest first","By salary, lowest first","Randomly"],
      ans:1, exp:"When multiple rows share the same dept_id (the first sort key), the second sort key (salary DESC) breaks the tie — highest salary within each department appears first."},
   ],
   challenge:[
     {id:"c1", diff:"Hard",
      title:"Department Leaderboard",
      context:"Nexus wants a leaderboard: show each employee's name, dept_id, and salary — but only the top 2 earners per salary tier. Define tiers as: salary >= 90000 is 'Senior', 70000–89999 is 'Mid', below 70000 is 'Junior'. Sort by salary descending. Limit the entire result to 6 rows.",
      tables:["employees"],
      starter:"-- employees: id, name, dept_id, salary, hire_date, manager_id\nSELECT name, dept_id, salary,\n       CASE\n         WHEN salary >= 90000 THEN 'Senior'\n         WHEN salary >= 70000 THEN 'Mid'\n         ELSE 'Junior'\n       END AS tier\nFROM employees\nORDER BY ",
      checks:[{t:"rows",n:6},{t:"col",c:"tier"}],
      hints:["ORDER BY salary DESC","LIMIT 6 at the end","The CASE WHEN is already written — just add ORDER BY and LIMIT"],
      solution:"SELECT name, dept_id, salary,\n  CASE\n    WHEN salary >= 90000 THEN 'Senior'\n    WHEN salary >= 70000 THEN 'Mid'\n    ELSE 'Junior'\n  END AS tier\nFROM employees\nORDER BY salary DESC\nLIMIT 6;",
      celebration:"CASE WHEN creates a conditional column — a preview of the next advanced technique. ORDER BY + LIMIT caps and shapes the final output."},

  {id:"b4", title:"Aggregates & GROUP BY", tagline:"Turn thousands of rows into executive-ready summaries.",
   hook:{
     co:"atlas", day:"Monday, 8:52 am",
     msg:"Board deck goes out at noon. I need: headcount per department, average salary per dept, and flag any dept where the average is above $75k. Can you have those ready by 9:30?",
     from:"Solange Ibarra · Head of Finance",
     insight:"GROUP BY is the engine behind every dashboard, every report, every 'summary by category' you'll ever build. This skill pays for itself on day one.",
   },
   concepts:[
     {icon:"∑", title:"Aggregate functions collapse rows",
      body:"COUNT(*) counts rows. SUM totals a column. AVG computes the mean. MIN and MAX find the smallest and largest values. All aggregate functions collapse many rows into a single summary value per group.",
      analogy:"Imagine tipping all employee salary slips onto a desk. SUM() adds them all up into one number. GROUP BY sorts them into piles by department first, then SUM() totals each pile — giving one total per department instead of a single grand total.",
      misconception:"All aggregates except COUNT(*) skip NULL values silently. COUNT(manager_id) with 5 NULLs returns 7, not 12."},
     {icon:"📦", title:"GROUP BY — one row per group",
      body:"GROUP BY splits rows into groups that share the same value in the grouping column. Each aggregate function runs independently on each group, producing one output row per unique group.",
      analogy:null,
      misconception:"Every column in SELECT must either appear in GROUP BY or be inside an aggregate. SELECT name, AVG(salary) FROM employees GROUP BY dept_id is an ERROR — which 'name'? There are multiple per dept."},
     {icon:"🔬", title:"HAVING — filter groups (not rows)",
      body:"WHERE filters individual rows BEFORE grouping. HAVING filters groups AFTER aggregation. Both can exist in the same query. Use HAVING when your condition references an aggregate.",
      analogy:"WHERE is the bouncer who stops people before they form groups. HAVING is the judge who reviews each completed group and decides which groups make it into the final report.",
      misconception:"AVG(salary) in a WHERE clause throws an error — aggregation hasn't happened yet at WHERE time. Always use HAVING for aggregate conditions."},
   ],
   seeit:[
     {lbl:"Company-wide stats",   ann:"No GROUP BY = one row summarising all 12 employees",
      sql:"SELECT COUNT(*)             AS total_employees,\n       MIN(salary)          AS lowest_salary,\n       MAX(salary)          AS highest_salary,\n       ROUND(AVG(salary),0) AS avg_salary,\n       SUM(salary)          AS total_payroll\nFROM employees;"},
     {lbl:"Count per department",  ann:"One output row per dept_id — 5 depts = 5 rows",
      sql:"SELECT dept_id,\n       COUNT(*) AS headcount\nFROM employees\nGROUP BY dept_id\nORDER BY headcount DESC;"},
     {lbl:"Multiple aggregates",   ann:"Each aggregate runs independently per group",
      sql:"SELECT dept_id,\n       COUNT(*) AS headcount,\n       ROUND(AVG(salary),0) AS avg_salary,\n       SUM(salary) AS total_payroll\nFROM employees\nGROUP BY dept_id;"},
     {lbl:"HAVING — filter groups",ann:"HAVING filters AFTER aggregation — WHERE would error here",
      sql:"SELECT dept_id,\n       ROUND(AVG(salary),0) AS avg_salary\nFROM employees\nGROUP BY dept_id\nHAVING AVG(salary) > 75000\nORDER BY avg_salary DESC;"},
     {lbl:"WHERE + GROUP BY + HAVING",ann:"Three-stage pipeline: filter rows → group → filter groups",
      sql:"SELECT dept_id, ROUND(AVG(salary),0) AS avg_sal\nFROM employees\nWHERE hire_date >= '2019-01-01'  -- filter rows first\nGROUP BY dept_id\nHAVING AVG(salary) > 70000;     -- filter groups"},
   ],
   guided:[
     {id:"g1", diff:"Easy", scaffold:0.8,
      title:"Headcount per department",
      context:"Priya needs headcount per department for the board deck. Show dept_id and headcount, sorted largest first.",
      template:"SELECT dept_id,\n       %%B:aggregate%%(*) AS headcount\nFROM employees\n%%B:grouping clause%% dept_id\nORDER BY headcount DESC;",
      checks:[{t:"rows",n:5},{t:"col",c:"headcount"}],
      hints:["Aggregate that counts rows: COUNT","Clause that groups: GROUP BY"],
      solution:"SELECT dept_id, COUNT(*) AS headcount\nFROM employees\nGROUP BY dept_id\nORDER BY headcount DESC;",
      whyItWorks:"GROUP BY collapsed 12 rows into 5 groups. Engineering leads with 4 people. The ORDER BY runs on the 5 result rows."},
     {id:"g2", diff:"Medium", scaffold:0.55,
      title:"Average salary — only high earners",
      context:"Priya wants departments where the average salary exceeds $75,000. Which clause filters groups after aggregation?",
      template:"SELECT dept_id,\n       ROUND(AVG(salary),0) AS avg_salary\nFROM employees\nGROUP BY dept_id\n%%D:HAVING|WHERE|AND|GROUP BY%% AVG(salary) > 75000\nORDER BY avg_salary DESC;",
      checks:[{t:"col",c:"avg_salary"}],
      hints:["HAVING filters GROUPS after aggregation","WHERE filters ROWS before GROUP BY — it can't see AVG(salary)"],
      solution:"SELECT dept_id, ROUND(AVG(salary),0) AS avg_salary\nFROM employees\nGROUP BY dept_id\nHAVING AVG(salary) > 75000\nORDER BY avg_salary DESC;",
      whyItWorks:"HAVING is the only clause that can reference aggregate results. WHERE runs before aggregation — AVG(salary) doesn't exist yet at WHERE time."},
     {id:"g3", diff:"Medium", scaffold:0.45,
      title:"Product category summary",
      context:"Nexus Commerce's ops review needs inventory data per category: count of products, and total inventory value (price × stock summed).",
      template:"SELECT category,\n       COUNT(*) AS product_count,\n       %%B:aggregate%%(price * %%B:column%%) AS stock_value\nFROM products\nGROUP BY %%B:group by column%%;",
      checks:[{t:"rows",n:3},{t:"col",c:"stock_value"}],
      hints:["Aggregate that totals: SUM","Multiply price × stock per row before summing: stock","Group on: category"],
      solution:"SELECT category,\n       COUNT(*) AS product_count,\n       SUM(price * stock) AS stock_value\nFROM products\nGROUP BY category;",
      whyItWorks:"SUM(price * stock) multiplies per row first, then sums within each category. You can use expressions inside aggregate functions."},
     {id:"g4", diff:"Medium", type:"clauseorder",
      title:"Full query clause order — including HAVING",
      context:"When a query uses GROUP BY and HAVING, clause order is critical. Arrange all six major clauses correctly.",
      clauses:["HAVING","FROM","GROUP BY","SELECT","ORDER BY","WHERE"],
      correctOrder:["SELECT","FROM","WHERE","GROUP BY","HAVING","ORDER BY"],
      hints:["WHERE filters rows BEFORE grouping","HAVING filters groups AFTER aggregation","ORDER BY always last"],
      whyItWorks:"The full logical order: FROM → WHERE → GROUP BY → HAVING → SELECT → ORDER BY. WHERE can't see aggregates because they don't exist yet. HAVING runs after aggregation so it can. ORDER BY sorts the final result set."},
     {id:"g5", diff:"Medium", type:"chipfill",
      title:"Build a GROUP BY query by dragging chips",

        {label:"SELECT dept_id,",accepts:"aggregate",answer:"cnt"},

      ],
      hints:["First slot: COUNT(*) counts rows per group","Second slot: GROUP BY groups by dept_id","Third slot: HAVING filters groups (not rows)","Fourth slot: COUNT(*) again — HAVING can reuse aggregates"],
      whyItWorks:"You need COUNT(*) in SELECT to see it, GROUP BY to create groups, HAVING to filter them. The HAVING clause re-evaluates COUNT(*) on each group independently."},
   ],
   usecases:[
     {co:"atlas", icon:"📋", title:"Board Deck in 4 Lines",
      situation:"CFO's quarterly board presentation needs headcount and average salary per department — formatted and sorted.",
      sql:"SELECT dept_id,\n       COUNT(*) AS headcount,\n       ROUND(AVG(salary), 0) AS avg_salary,\n       SUM(salary) AS total_payroll\nFROM employees\nGROUP BY dept_id\nORDER BY headcount DESC;",
      result:"5 rows, 4 metrics. This replaces 30 minutes of manual COUNTIF and AVERAGEIF in Excel.",
      transferPoint:"GROUP BY is the workhorse of executive reporting. Every dashboard you'll ever build uses this pattern."},
     {co:"nexus", icon:"💰", title:"Category Revenue Prioritisation",
      situation:"Ops team needs to decide which product category gets the next warehouse allocation. Total inventory value per category tells the story.",
      sql:"SELECT category,\n       COUNT(*) AS products,\n       SUM(price * stock) AS inventory_value\nFROM products\nGROUP BY category\nORDER BY inventory_value DESC;",
      result:"Electronics dominates at ~$200k+ inventory value. That's where the warehouse space goes.",
      transferPoint:"SUM(price * stock) uses math inside the aggregate — common pattern in revenue and inventory reporting."},
   ],
   recall:[
     {q:"12 rows, 5 have manager_id = NULL. What does COUNT(manager_id) return?",
      opts:["12","5","7","Depends on GROUP BY"],
      ans:2, exp:"COUNT(column) skips NULLs. 12 total rows − 5 NULL manager_ids = 7. COUNT(*) counts all rows including NULLs and would return 12."},
     {q:"Which clause filters AFTER aggregation?",
      opts:["WHERE","HAVING","GROUP BY","ORDER BY"],
      ans:1, exp:"HAVING runs after GROUP BY. WHERE runs before — it filters individual rows before any grouping. You can use both in the same query."},
     {q:"SELECT name, AVG(salary) FROM employees GROUP BY dept_id — what's wrong?",
      opts:["Nothing — this is valid SQL","'name' is not in GROUP BY and not in an aggregate — SQL rejects it","AVG() can't be used without a WHERE clause","ORDER BY is required with GROUP BY"],
      ans:1, exp:"Every column in SELECT must be either in GROUP BY or wrapped in an aggregate. 'name' is neither. SQL can't decide which name to show when multiple names exist per dept_id."},
     {q:"Correct clause order for a full query?",
      opts:["SELECT → WHERE → FROM → GROUP BY → HAVING → ORDER BY","SELECT → FROM → WHERE → GROUP BY → HAVING → ORDER BY","FROM → GROUP BY → SELECT → HAVING → WHERE → ORDER BY","SELECT → FROM → GROUP BY → WHERE → HAVING → ORDER BY"],
      ans:1, exp:"The logical order: FROM → WHERE → GROUP BY → HAVING → SELECT → ORDER BY. WHERE always runs before GROUP BY; HAVING always runs after. Writing them in this order produces valid SQL."},

   challenge:[

 {level:"Intermediate", icon:"◈", color:"#22D3EE", modules:[

  {id:"i2", title:"CASE WHEN & COALESCE", tagline:"Write conditional logic and handle NULLs gracefully.",
   hook:{
     co:"atlas", day:"Tuesday, 4:05 pm",
     msg:"Quick request: can you add a 'seniority' label (Junior / Mid / Senior) next to each employee's salary in the report? And replace any NULL manager with the text 'Unassigned' — the CFO hates seeing blank cells.",
     from:"Solange Ibarra · Head of Finance",
     insight:"Real data is messy. CASE WHEN lets you apply if/else logic inside SQL. COALESCE silences NULLs with a fallback value. Together they make your outputs clean and self-explanatory.",
   },
   concepts:[
     {icon:"🔀", title:"CASE WHEN — SQL's if/else",
      body:"CASE WHEN condition THEN value WHEN condition2 THEN value2 ELSE default END. SQL evaluates conditions top-to-bottom and returns the first matching THEN value. ELSE catches everything that didn't match.",
      analogy:"Think of CASE like a series of toll booths on a highway. Each car (row) passes through in order. The first booth whose condition matches collects the toll (returns its value). If no booth matches, the ELSE booth handles it.",
      misconception:"SQL stops at the first TRUE condition. If salary >= 70000 appears before salary >= 90000, a $95k employee gets labelled 'Mid', not 'Senior'. Put the most restrictive condition first."},
     {icon:"⬜", title:"COALESCE — first non-NULL value",
      body:"COALESCE(a, b, c) returns the first argument that is not NULL. If a is NULL, try b; if b is also NULL, try c. It's the standard way to provide a fallback for missing values.",
      analogy:null, tip:"COALESCE(manager_id, 0) replaces NULL with 0. COALESCE(notes, description, 'No info') tries three columns in order."},
     {icon:"÷", title:"NULLIF — make a value NULL on demand",
      body:"NULLIF(a, b) returns NULL if a equals b; otherwise it returns a. Most useful to prevent division-by-zero: salary / NULLIF(hours, 0) returns NULL instead of crashing when hours is 0.",
      analogy:null, tip:"NULLIF is the inverse of COALESCE. COALESCE provides a fallback when a value is NULL; NULLIF intentionally produces NULL when two values match."},
   ],
   seeit:[
     {lbl:"Salary tier labels",         ann:"CASE evaluates top-to-bottom — most restrictive condition first",
      sql:"SELECT name, salary,\n  CASE\n    WHEN salary >= 90000 THEN 'Senior'\n    WHEN salary >= 70000 THEN 'Mid'\n    ELSE                      'Junior'\n  END AS tier\nFROM employees\nORDER BY salary DESC;"},
     {lbl:"COALESCE — replace NULLs",   ann:"COALESCE returns the first non-NULL value in its argument list",
      sql:"SELECT name,\n  COALESCE(CAST(manager_id AS TEXT), 'Unassigned') AS reports_to\nFROM employees;"},
     {lbl:"Conditional aggregation",    ann:"SUM(CASE WHEN ...) counts or totals only rows that match a condition",
      sql:"SELECT\n  COUNT(*) AS total,\n  SUM(CASE WHEN salary >= 90000 THEN 1 ELSE 0 END) AS senior_count,\n  SUM(CASE WHEN salary < 70000  THEN 1 ELSE 0 END) AS junior_count\nFROM employees;"},
     {lbl:"NULLIF — safe division",     ann:"NULLIF prevents division-by-zero; NULL propagates safely",
      sql:"-- budget_per_head = NULL when headcount is 0 (no crash)\nSELECT d.name,\n       d.budget / NULLIF(COUNT(e.id), 0) AS budget_per_head\nFROM departments d\nLEFT JOIN employees e ON e.dept_id = d.id\nGROUP BY d.id, d.name, d.budget;"},
   ],
   guided:[
     {id:"g1", diff:"Easy", scaffold:0.8,

      checks:[{t:"rows",n:12},{t:"col",c:"tier"}],
      hints:["The first keyword in a CASE branch is: WHEN","CASE evaluates top-to-bottom — most restrictive (>=90000) must come first"],
      solution:"SELECT name, salary,\n  CASE\n    WHEN salary >= 90000 THEN 'Senior'\n    WHEN salary >= 70000 THEN 'Mid'\n    ELSE 'Junior'\n  END AS tier\nFROM employees ORDER BY salary DESC;",
      whyItWorks:"CASE stops at the first TRUE branch. If >= 90000 came after >= 70000, all Seniors would be labelled Mid. Order matters."},
     {id:"g2", diff:"Easy", scaffold:0.7,

      checks:[{t:"rows",n:12},{t:"col",c:"reports_to"}],
      hints:["COALESCE returns the first non-NULL argument","CAST(manager_id AS TEXT) converts the integer to text so COALESCE can compare with 'Unassigned'"],
      solution:"SELECT name,\n  COALESCE(CAST(manager_id AS TEXT), 'Unassigned') AS reports_to\nFROM employees;",

     {id:"g3", diff:"Medium", scaffold:0.5,
      title:"Count employees per salary tier",
      context:"Solange wants a summary: how many employees are in each tier? Use conditional aggregation (SUM + CASE).",
      template:"SELECT\n  SUM(CASE WHEN salary >= 90000 THEN 1 ELSE 0 END) AS %%B:senior alias%%,\n  SUM(CASE WHEN salary >= 70000 AND salary < 90000 THEN 1 ELSE 0 END) AS %%B:mid alias%%,\n  SUM(CASE WHEN salary < 70000  THEN 1 ELSE 0 END) AS %%B:junior alias%%\nFROM employees;",
      checks:[{t:"rows",n:1},{t:"col",c:"senior_count"}],
      hints:["Senior alias: senior_count","Mid alias: mid_count","Junior alias: junior_count"],
      solution:"SELECT\n  SUM(CASE WHEN salary >= 90000 THEN 1 ELSE 0 END) AS senior_count,\n  SUM(CASE WHEN salary >= 70000 AND salary < 90000 THEN 1 ELSE 0 END) AS mid_count,\n  SUM(CASE WHEN salary < 70000  THEN 1 ELSE 0 END) AS junior_count\nFROM employees;",
      whyItWorks:"SUM(CASE WHEN ... THEN 1 ELSE 0 END) counts rows matching a condition. It's a pivot technique — turning row data into columns."},
   ],
   usecases:[
     {co:"atlas", icon:"📊", title:"Salary Band Dashboard",
      situation:"The finance team wants every employee's tier label shown alongside their salary in the quarterly compensation report.",
      sql:"SELECT dept_id,\n  COUNT(*) AS total,\n  SUM(CASE WHEN salary >= 90000 THEN 1 ELSE 0 END) AS senior,\n  SUM(CASE WHEN salary >= 70000 AND salary < 90000 THEN 1 ELSE 0 END) AS mid,\n  SUM(CASE WHEN salary < 70000 THEN 1 ELSE 0 END) AS junior\nFROM employees\nGROUP BY dept_id\nORDER BY dept_id;",
      result:"One row per department showing the tier breakdown. Engineering has 4 employees — 3 Senior, 1 Mid.",
      transferPoint:"Conditional aggregation (SUM + CASE WHEN) is the SQL equivalent of COUNTIF in Excel. It's used in virtually every BI dashboard."},
     {co:"forge", icon:"🔧", title:"Safe Budget-per-Head Calculation",
      situation:"Ops wants budget per head per department, but two departments have zero employees — a direct division would crash.",
      sql:"SELECT d.name,\n  d.budget,\n  COUNT(e.id) AS headcount,\n  CASE\n    WHEN COUNT(e.id) = 0 THEN 'No staff'\n    ELSE CAST(ROUND(d.budget / COUNT(e.id), 0) AS TEXT)\n  END AS budget_per_head\nFROM departments d\nLEFT JOIN employees e ON e.dept_id = d.id\nGROUP BY d.id, d.name, d.budget\nORDER BY d.budget DESC;",
      result:"Departments with staff show the per-head budget. Those with zero staff show 'No staff' instead of crashing.",
      transferPoint:"Always guard against division-by-zero in SQL. CASE WHEN ... = 0 THEN fallback is the clearest approach; NULLIF is the compact one."},
   ],

      opts:["'Senior' — SQL checks >= 90000 first","'Mid' — >= 70000 matched first and evaluation stopped","An error — overlapping conditions","Both labels — SQL returns all matches"],
      ans:1, exp:"CASE stops at the FIRST true condition. salary >= 70000 is true for $95k, so it returns 'Mid' and never reaches >= 90000. Always put the most restrictive condition first."},

   challenge:[
     {id:"c1", diff:"Hard",
      title:"Full Compensation Report",
      context:"Solange's quarterly board report: show each department's name, headcount, average salary (0dp), salary tier breakdown (senior/mid/junior counts), and a 'health' label: '🟢 Balanced' if no tier exceeds 60% of headcount, '🟡 Skewed' otherwise. Sort by avg_salary descending.",
      tables:["employees","departments"],
      starter:"-- Hint: join employees to departments, GROUP BY dept, use CASE + SUM\nSELECT d.name AS department,\n       COUNT(e.id) AS headcount,\n       ROUND(AVG(e.salary), 0) AS avg_salary,\n       SUM(CASE WHEN e.salary >= 90000 THEN 1 ELSE 0 END) AS senior,\n       SUM(CASE WHEN e.salary >= 70000 AND e.salary < 90000 THEN 1 ELSE 0 END) AS mid,\n       SUM(CASE WHEN e.salary < 70000 THEN 1 ELSE 0 END) AS junior,\n       ",
      checks:[{t:"rows",n:5},{t:"col",c:"health"}],

      solution:"SELECT d.name AS department, COUNT(e.id) AS headcount,\n  ROUND(AVG(e.salary), 0) AS avg_salary,\n  SUM(CASE WHEN e.salary >= 90000 THEN 1 ELSE 0 END) AS senior,\n  SUM(CASE WHEN e.salary >= 70000 AND e.salary < 90000 THEN 1 ELSE 0 END) AS mid,\n  SUM(CASE WHEN e.salary < 70000 THEN 1 ELSE 0 END) AS junior,\n  CASE\n    WHEN SUM(CASE WHEN e.salary >= 90000 THEN 1 ELSE 0 END) > COUNT(e.id)*0.6\n      OR SUM(CASE WHEN e.salary >= 70000 AND e.salary < 90000 THEN 1 ELSE 0 END) > COUNT(e.id)*0.6\n      OR SUM(CASE WHEN e.salary < 70000 THEN 1 ELSE 0 END) > COUNT(e.id)*0.6\n    THEN '🟡 Skewed'\n    ELSE '🟢 Balanced'\n  END AS health\nFROM departments d\nLEFT JOIN employees e ON e.dept_id = d.id\nGROUP BY d.id, d.name\nORDER BY avg_salary DESC;",

   concepts:[
    {icon:"🔠",title:"UPPER(), LOWER(), LENGTH()",
     body:"UPPER(col) converts every character to uppercase. LOWER(col) converts every character to lowercase. LENGTH(col) returns the character count. All three functions are non-destructive — the stored data is never modified.",
     tip:"LOWER(email) is essential for case-insensitive comparisons. Two emails that look different may be the same person.",
     misconception:"These functions do not change the stored data. They only affect the result set of your query."},
    {icon:"🔍",title:"LIKE — pattern matching",
     body:"LIKE matches strings against a pattern. % matches any sequence of characters (zero or more). _ matches exactly one character. LIKE is case-insensitive in SQLite. Use NOT LIKE to exclude patterns.",
     analogy:"Think of % as a wildcard in a card game — it stands in for anything. name LIKE 'A%' means: starts with A, followed by anything at all.",
     tip:"LIKE '%@gmail.com' finds all Gmail addresses. LIKE '2024-%' finds all 2024 dates."},
    {icon:"✂️",title:"SUBSTR() and INSTR()",
     body:"SUBSTR(col, start, length) extracts a substring. Start is 1-based. INSTR(col, substring) returns the position of the first occurrence of a substring, or 0 if not found. Combine them to extract parts of structured strings.",
     tip:"SUBSTR(hire_date, 1, 4) extracts the year from a date string like '2019-03-15'. INSTR(name, ' ') finds the space between first and last name."},
    {icon:"🔧",title:"REPLACE() and TRIM()",
     body:"REPLACE(col, old, new) substitutes all occurrences of old with new. TRIM(col) removes leading and trailing whitespace. LTRIM and RTRIM target only the left or right side.",
     tip:"REPLACE(email, '@', ' [at] ') creates display-safe email addresses. TRIM() is essential after importing CSV data.",

   },
   concepts:[
    {icon:"📅",title:"Date storage and strftime()",
     body:"SQLite stores dates as text in YYYY-MM-DD format (ISO 8601). The strftime(format, col) function extracts parts: '%Y' for year, '%m' for month, '%d' for day, '%Y-%m' for year-month. It can also format dates for display.",
     tip:"strftime('%Y', hire_date) is the most common date operation in SQLite. Always use ISO format strings for comparisons — '2024-01' sorts correctly as text.",
     misconception:"SQLite has no native DATE type. Dates are stored as text. This means you can use text comparisons like hire_date >= '2020-01-01' — they work because ISO format sorts lexicographically."},
    {icon:"⏱️",title:"Date comparisons and filtering",
     body:"Because ISO dates sort correctly as text, you can use =, <, >, BETWEEN on date columns directly. hire_date >= '2020-01-01' returns everyone hired from 2020 onwards. BETWEEN '2019-01-01' AND '2021-12-31' is inclusive on both ends.",

     body:"julianday(date) converts a date to a Julian Day Number — a continuous count of days since noon on 1 January 4713 BC. Subtracting two Julian Day values gives the exact number of days between them. Divide by 365.0 for years.",

    {icon:"📊",title:"Grouping by time period",

 {level:"Advanced", icon:"⚡", color:"#FF6B8A", modules:[

  {id:"a1", title:"Window Functions", tagline:"Rank, compare, and aggregate across rows — without losing any of them.",
   hook:{co:"atlas",from:"Solange Ibarra",day:"Mon 09:14",
    msg:"Can you add a salary rank column for each employee within their department? And their department average alongside? Without collapsing the rows into groups?",
    insight:"Window functions compute over a related set of rows while preserving every individual row in the output — unlike GROUP BY which collapses.",
   },
   concepts:[
    {icon:"🪟",title:"OVER() — the window clause",
     body:"A window function computes across a set of rows related to the current row — called the 'window'. OVER() defines that window. With no arguments, the window is the entire result set. PARTITION BY divides rows into independent groups. ORDER BY inside OVER() controls the processing order within each partition.",
     analogy:"Think of a spreadsheet: =RANK(B2, B$2:B$100) computes per cell but sees the whole column. Window functions do the same — per row, but window-aware.",
     tip:"Window functions never reduce row count. That's the critical difference from GROUP BY."},
    {icon:"🏆",title:"RANK(), ROW_NUMBER(), DENSE_RANK()",
     body:"ROW_NUMBER() assigns unique sequential integers regardless of ties. RANK() assigns the same rank to ties and skips the next number (1,2,2,4). DENSE_RANK() ties share a rank with no gap (1,2,2,3).",
     tip:"Use ROW_NUMBER() to pick exactly one row per group. Use RANK() when ties should share a position."},
    {icon:"📊",title:"PARTITION BY and ORDER BY inside OVER()",
     body:"PARTITION BY divides rows into independent groups before the function runs — like GROUP BY but without collapsing. ORDER BY inside OVER() controls computation order within each partition for ranking and offset functions.",
     misconception:"ORDER BY inside OVER() is separate from the query's final ORDER BY. One controls computation; the other controls output row order."},
    {icon:"↔️",title:"LAG() and LEAD()",
     body:"LAG(col, n) returns the value n rows before the current row within the partition. LEAD(col, n) returns the value n rows ahead. Both accept an optional default when no prior/next row exists.",
     tip:"LAG(salary, 1, 0) returns the salary from the previous row in the ordered set, or 0 when no prior row exists — i.e. the very first row."},
   ],
   seeit:[
    {lbl:"Rank employees by salary within department",
     ann:"RANK() with PARTITION BY resets the counter for each department group",
     sql:"SELECT name, dept_id, salary,\n  RANK() OVER (PARTITION BY dept_id ORDER BY salary DESC) AS dept_rank\nFROM employees\nORDER BY dept_id, dept_rank;"},
    {lbl:"Department average alongside each employee row",
     ann:"AVG() as a window function keeps all 12 rows — unlike GROUP BY which collapses to 5",
     sql:"SELECT name, dept_id, salary,\n  ROUND(AVG(salary) OVER (PARTITION BY dept_id), 0) AS dept_avg,\n  salary - ROUND(AVG(salary) OVER (PARTITION BY dept_id), 0) AS vs_avg\nFROM employees\nORDER BY dept_id, salary DESC;"},
    {lbl:"ROW_NUMBER — pick top earner per department",
     ann:"Subquery assigns rn=1 to the top earner; outer WHERE filters to just those rows",
     sql:"SELECT * FROM (\n  SELECT name, dept_id, salary,\n    ROW_NUMBER() OVER (PARTITION BY dept_id ORDER BY salary DESC) AS rn\n  FROM employees\n) t\nWHERE rn = 1;"},
    {lbl:"LAG — compare each employee to the previous hire",
     ann:"LAG() looks back one row in hire_date order; default 0 means the first row shows no prior salary",
     sql:"SELECT name, hire_date, salary,\n  LAG(salary, 1, 0) OVER (ORDER BY hire_date) AS prev_salary,\n  salary - LAG(salary, 1, 0) OVER (ORDER BY hire_date) AS diff\nFROM employees\nORDER BY hire_date;"},

   guided:[
    {id:"g1",diff:"Easy",

  {id:"a2", title:"Subqueries & CTEs", tagline:"Break complex problems into readable, composable query blocks.",
   hook:{co:"nexus",from:"Zara Oduya",day:"Wed 14:32",
    msg:"I need customers who placed more than the average number of orders. The average comes from the orders table too. Can SQL compute and filter in the same query?",

   },
   concepts:[
    {icon:"📦",title:"Scalar subquery in WHERE",
     body:"A subquery in WHERE that returns exactly one value can be used like a literal: WHERE salary > (SELECT AVG(salary) FROM employees). SQL runs the inner query first, substitutes the result, then evaluates the outer condition.",
     tip:"If the subquery could return multiple rows, use IN or EXISTS instead of >, <, =."},
    {icon:"🔗",title:"Correlated subquery",
     body:"A correlated subquery references a column from the outer query, which means it executes once for every row the outer query processes. Example: WHERE salary > (SELECT AVG(salary) FROM employees e2 WHERE e2.dept_id = e.dept_id) recalculates the average for each employee's department.",
     misconception:"Correlated subqueries can be slow on large tables — window functions usually replace them more efficiently."},
    {icon:"🏗️",title:"CTE — Common Table Expression",
     body:"WITH name AS (SELECT ...) names a subquery for the duration of the statement. The outer query can join against it or reference it multiple times. Chained CTEs (WITH a AS (...), b AS (...)) let you build up complexity step by step.",
     tip:"Think of a CTE as a named temporary view — it exists only for this query."},
    {icon:"🔍",title:"EXISTS and NOT EXISTS",
     body:"EXISTS(subquery) returns TRUE if the subquery returns any rows. NOT EXISTS returns TRUE when no rows match. Both are typically faster than IN on large sets because they short-circuit at the first match.",
     tip:"SELECT 1 inside EXISTS is a convention — EXISTS only cares that rows exist, not what they contain."},

  {id:"a3", title:"UNION, INTERSECT & EXCEPT", tagline:"Combine, compare, and contrast result sets — one of SQL's most underused powers.",
   hook:{
     co:"meridian", day:"Wed 11:20",
     msg:"Can you compare our office cities with our customer cities — which cities appear in both? And which cities have offices but no customers? I want to spot coverage gaps.",
     from:"Priya Rajan · People Analytics Lead",
     insight:"Set operations treat entire query results like mathematical sets — letting you combine, intersect, or subtract them without complex JOINs.",
   },
   concepts:[
    {icon:"∪",title:"UNION — combine without duplicates",
     body:"UNION combines the results of two SELECT statements, removing duplicate rows. Both queries must return the same number of columns with compatible types. The column names come from the first query.",
     tip:"UNION is equivalent to a mathematical set union. Use it when you need all unique values from two sources.",
     misconception:"UNION removes duplicates automatically. If you want all rows including duplicates, use UNION ALL — it is also faster because it skips the deduplication step."},
    {icon:"⊔",title:"UNION ALL — fast combine with duplicates",
     body:"UNION ALL combines results without removing duplicates. It is significantly faster than UNION on large tables because no sorting or hashing is needed. Use it whenever duplicates are acceptable or when the two sources cannot possibly share data.",
     tip:"If combining two tables with no overlapping data (like sales from two separate stores), UNION ALL is always the right choice — UNION would waste time looking for duplicates that cannot exist."},
    {icon:"∩",title:"INTERSECT — rows present in both",
     body:"INTERSECT returns only rows that appear in both result sets. It answers: what is common between these two queries? Like UNION, it removes duplicates from the result.",
     tip:"INTERSECT is useful for finding shared values: customers who also appear as suppliers, cities that have both offices and customers, products ordered by multiple customers."},
    {icon:"−",title:"EXCEPT — rows in first but not second",
     body:"EXCEPT returns rows from the first query that do not appear in the second query. It is the SQL set difference: A minus B. Use it to find things that exist in one context but not another.",
     tip:"EXCEPT is ideal for gap analysis: products never ordered, employees with no manager, departments with no staff.",
     misconception:"EXCEPT is directional — A EXCEPT B gives different results from B EXCEPT A. The order of the two queries determines which set is subtracted from which."},
   ],
   seeit:[

/* ─── GLOBAL CSS ─────────────────────────────────────── */
const CSS=`
:root {
  --font-head: Georgia, "Times New Roman", serif;
  --font-ui:   system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
  --font-code: ui-monospace, "Cascadia Code", "Fira Code", "Menlo", "Consolas", monospace;

  /* Radius scale — 16px cards, 12px inputs/buttons */
  --r-xs:  8px;  --r-sm: 12px;  --r-md: 16px;  --r-lg: 20px;  --r-pill: 99px;

  /* Shadow / glow system — shadow-first, border-secondary */
  --shadow-card:  0 4px 32px rgba(4,6,18,.55), 0 1px 0 rgba(255,255,255,.04) inset;
  --shadow-hover: 0 8px 48px rgba(4,6,18,.7),  0 0 24px rgba(109,124,255,.08), 0 1px 0 rgba(255,255,255,.05) inset;
  --shadow-glow:  0 4px 24px rgba(109,124,255,.25);
  --shadow-sm:    0 2px 16px rgba(4,6,18,.4);

  --glass:      rgba(11,16,32,.85);
  --glass2:     rgba(17,24,43,.80);
  --glass-brd:  rgba(36,49,79,.55);

  --ease: cubic-bezier(.22,.68,0,1.15);
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

/* ── Base ── */
body {
  font-family: var(--font-ui);
  background: ${T.bg};
  color: ${T.tx};
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  font-feature-settings: "kern" 1;
  background-image:
    radial-gradient(rgba(109,124,255,.09) 1px, transparent 1px);
  background-size: 28px 28px;
}

/* ── Glass card system ── */
.glass-card {
  background: var(--glass);
  border: 1px solid var(--glass-brd);
  border-radius: var(--r-md);
  box-shadow: var(--shadow-card), inset 0 1px 0 rgba(255,255,255,.04);
  transition: transform .2s var(--ease), box-shadow .2s var(--ease), border-color .2s;
}
.glass-card:hover {
  transform: translateY(-1px);
  border-color: rgba(74,95,138,.7);
  box-shadow: var(--shadow-hover);
}
.glass-card-sm {
  background: var(--glass2);
  border: 1px solid var(--glass-brd);
  border-radius: var(--r-sm);
  box-shadow: var(--shadow-sm);
  transition: transform .2s var(--ease), box-shadow .2s, border-color .2s;
}
.glass-card-sm:hover {
  transform: translateY(-1px);
  border-color: rgba(74,95,138,.7);
  box-shadow: var(--shadow-hover);
}
.glass-flat {
  background: var(--glass2);
  border: 1px solid var(--glass-brd);
  border-radius: var(--r-sm);
  box-shadow: var(--shadow-sm);
}

/* ── Typography ── */
:where(h1,h2,h3,h4) {
  font-family: var(--font-head);
  text-wrap: balance;
  letter-spacing: -.025em;
}
:where(pre,code,kbd,samp,textarea,input,select) {
  font-family: var(--font-code);
  font-feature-settings: "liga" 0;   /* no ligatures in code */
  font-variant-numeric: tabular-nums;
  letter-spacing: 0;
}

/* ── Scrollbars ── */
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: ${T.brd}; border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: ${T.brdBright}; }

/* ── Forms ── */
textarea:focus, input:focus, select:focus {
  outline: 2px solid ${T.A};
  outline-offset: 2px;
}
button { cursor: pointer; font-family: var(--font-ui); }
select { font-family: var(--font-code); }

/* ── Focus management ── */
/* Mouse users: no visible ring. Keyboard users: high-contrast ring. */
:focus:not(:focus-visible) { outline: none; }
:focus-visible {
  outline: 2px solid ${T.AL};
  outline-offset: 3px;
  border-radius: 3px;
}

/* ── Syntax highlight tokens ── */
.hkw { color: #7dd3fc; font-weight: 600; }  /* keywords — electric cyan  */
.hst { color: #6ee7b7; }                     /* strings  — mint green     */
.hnu { color: #fda4af; }                     /* numbers  — soft rose      */
.hcm { color: ${T.t3}; font-style: italic; } /* comments                  */

/* ── Animations ── */
@keyframes slideUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0);    }
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-10px); }
  to   { opacity: 1; transform: translateY(0);     }
}
@keyframes glow {
  0%, 100% { box-shadow: 0 0 10px rgba(109,124,255,.3); }
  50%       { box-shadow: 0 0 28px rgba(109,124,255,.65); }
}
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.35;} }
@keyframes toastIn {
  from { opacity: 0; transform: translateY(20px) scale(.95); }
  to   { opacity: 1; transform: translateY(0)    scale(1);   }
}
@keyframes spin { to { transform: rotate(360deg); } }

.aUp    { animation: slideUp .32s var(--ease) both; }
.toastIn{ animation: toastIn .4s var(--ease) both; }
/* ── Answer card: mint glow pulse on correct, rose shake on wrong ── */
@keyframes flashGreen {
  0%   { box-shadow: var(--shadow-sm); border-color: rgba(36,49,79,.5); }
  30%  { box-shadow: 0 0 0 5px rgba(41,211,145,.28), 0 0 26px rgba(41,211,145,.22); border-color: #29D391; }
  65%  { box-shadow: 0 0 0 2px rgba(41,211,145,.14), 0 0 14px rgba(41,211,145,.14); border-color: #29D391; }
  100% { box-shadow: 0 0 12px rgba(41,211,145,.1); border-color: #29D391; }
}
@keyframes flashRed {
  0%,100% { transform: translateX(0); border-color: rgba(255,107,138,.45); }
  18%  { transform: translateX(-6px); }
  36%  { transform: translateX( 6px); }
  54%  { transform: translateX(-4px); }
  72%  { transform: translateX( 4px); }
  88%  { transform: translateX(-2px); }
}
.ans-correct { animation: flashGreen .52s cubic-bezier(.22,.68,0,1.2) both; }
.ans-wrong   { animation: flashRed   .40s cubic-bezier(.22,.68,0,1.2) both; }

/* ── Drag-and-drop ── */
.drag-chip        { cursor: grab; user-select: none; touch-action: none;
                    transition: transform .12s ease, opacity .12s, box-shadow .12s; }
.drag-chip:hover  { transform: translateY(-2px);
                    box-shadow: 0 6px 18px rgba(4,6,18,.5); }
.drag-chip:active { cursor: grabbing; opacity: .68; transform: scale(1.05) translateY(-3px);
                    box-shadow: 0 8px 24px rgba(4,6,18,.6); }
.drop-slot        { transition: background .15s, border-color .15s, transform .12s; }
.drop-slot.over   { background: rgba(109,124,255,.18) !important;
                    border-color: rgba(109,124,255,.7) !important; }

/* ── Pill select ── */
.pill-select { transition: background .15s, border-color .15s, color .15s; }
.pill-select:focus-within { outline: 2px solid rgba(34,211,238,.5); outline-offset: 2px; }

/* ── Step unlock: brief slide-up ── */
@keyframes stepUnlock {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.step-unlock { animation: stepUnlock .26s cubic-bezier(.22,.68,0,1.15) both; }

/* ── Lesson completion badge pop ── */
@keyframes badgePop {
  0%   { transform: scale(.6) rotate(-6deg); opacity: 0; }
  55%  { transform: scale(1.12) rotate(3deg); opacity: 1; }
  80%  { transform: scale(.96) rotate(-1deg); }
  100% { transform: scale(1) rotate(0deg); }
}
@keyframes completionRise {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Workspace panel: smooth slide up, not pop ── */
@keyframes backdropFadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes panelSlideIn {
  from { opacity: 0; transform: translate(-50%, calc(-50% + 24px)) scale(.97); }
  to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}

/* ── Responsive helpers ── */
@media (min-width: 1400px) {
  .glass-card    { border-radius: 20px; }
  .glass-card-sm { border-radius: 16px; }
}
/* ── Concept card label chips ── */
.concept-label {
  display: inline-block;
  font-size: 10px; font-weight: 700;
  letter-spacing: .6px; text-transform: uppercase;
  padding: 2px 7px; border-radius: 4px;
  margin-bottom: 5px;
}
/* ── Consistent section dividers inside cards ── */
.card-section + .card-section {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid rgba(36,49,79,.3);
}
@media (max-width: 640px)  {
  .hide-sm  { display: none !important; }
  .sm-col   { flex-direction: column !important; }
  .sm-full  { width: 100% !important; }
  .sm-grid1 { grid-template-columns: 1fr !important; }
}
@media (max-width: 900px) {
  .hide-md { display: none !important; }
}

/* ── Accessibility ── */
.skip-link {
  position: absolute; top: -48px; left: 0;
  background: ${T.A}; color: ${T.bg};
  padding: 10px 18px; font-weight: 700; font-size: 14px;
  z-index: 9999; border-radius: 0 0 8px 0;
  transition: top .2s;
}
.skip-link:focus { top: 0; }

/* ── Achievement toast dismiss bar ── */
@keyframes shrinkBar {
  from { width: 100%; }
  to   { width: 0%;   }
}
@keyframes indeterminateBar {
  0%   { transform: translateX(-100%) scaleX(.3); }
  50%  { transform: translateX(30%)   scaleX(.7); }
  100% { transform: translateX(100%)  scaleX(.3); }
}

/* ── SQL Playground IDE ── */
textarea.sql-editor::selection { background: rgba(109,124,255,.22); }
@keyframes rowFadeIn { from{opacity:0;transform:translateX(-6px);} to{opacity:1;transform:translateX(0);} }
@keyframes shimmer { from { background-position: -200% 0; } to { background-position: 200% 0; } }

/* ── Ticket / scenario cards ── */
.ticket-card { position: relative; overflow: hidden; }
.ticket-card::before {
  content: "";
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--ticket-accent, rgba(109,124,255,.6));
}
@keyframes urgentPulse { 0%,100%{opacity:1;} 50%{opacity:.5;} }
.badge-urgent { animation: urgentPulse 2s ease infinite; }
`;

/* ─── UTILS ──────────────────────────────────────────── */
const formatSQL = sql => {
  const KWS = ['SELECT','FROM','WHERE','JOIN','LEFT JOIN','RIGHT JOIN',
    'INNER JOIN','ON','GROUP BY','ORDER BY','HAVING','LIMIT','OFFSET',
    'UNION','WITH','INSERT INTO','VALUES','UPDATE','SET','DELETE FROM'];
  let s = sql.trim();
  // Upper-case keywords
  KWS.forEach(k=>{ s = s.replace(new RegExp('\\b'+k+'\\b','gi'), k); });
  // Newline before top-level clauses
  ['FROM','WHERE','JOIN','LEFT JOIN','INNER JOIN','ON',
   'GROUP BY','ORDER BY','HAVING','LIMIT','UNION'].forEach(k=>{
    s = s.replace(new RegExp('\\s*\\b'+k+'\\b','g'), '\n'+k);
  });
  // Indent comma-separated columns on SELECT / GROUP BY / ORDER BY
  s = s.replace(/(SELECT|GROUP BY|ORDER BY)(.*?)(?=\nFROM|\nWHERE|\nGROUP|\nORDER|\nHAVING|\nLIMIT|$)/gs,
    (_,kw,rest)=>kw+rest.replace(/,\s*/g,',\n  '));
  return s.trim();
};
const KW=/\b(SELECT|FROM|WHERE|JOIN|INNER|LEFT|RIGHT|ON|GROUP\s+BY|ORDER\s+BY|HAVING|LIMIT|OFFSET|INSERT|INTO|VALUES|UPDATE|SET|DELETE|CREATE|DROP|TABLE|WITH|RECURSIVE|UNION|ALL|AS|AND|OR|NOT|NULL|BETWEEN|IN|LIKE|DISTINCT|COUNT|SUM|AVG|MIN|MAX|OVER|PARTITION\s+BY|RANK|ROW_NUMBER|DENSE_RANK|LAG|LEAD|CASE|WHEN|THEN|ELSE|END|COALESCE|CAST|ROUND|IS|EXISTS|NULLIF|EXPLAIN|INDEX|STRFTIME)\b/gi;
const hlSQL=l=>!l?"":(l.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/(--[^\n]*)/g,'<span class="hcm">$1</span>').replace(/('[^']*')/g,'<span class="hst">$1</span>').replace(KW,m=>`<span class="hkw">${m.toUpperCase()}</span>`).replace(/\b(\d+(?:\.\d+)?)\b/g,'<span class="hnu">$1</span>'));
function parseTpl(t){const re=/%%([BD]):([^%]*)%%/g,p=[];let l=0,m;while((m=re.exec(t))){if(m.index>l)p.push({k:"text",v:t.slice(l,m.index)});p.push(m[1]==="B"?{k:"blank",hint:m[2]}:{k:"drop",opts:m[2].split("|")});l=m.index+m[0].length;}if(l<t.length)p.push({k:"text",v:t.slice(l)});return p;}
const asmSql=(t,f)=>{let i=0;return t.replace(/%%[BD]:[^%]*%%/g,()=>f[i++]??"___");};
function validate(res,checks){if(!checks?.length)return null;if(!res?.columns?.length)return{ok:false,msg:"No results returned. Make sure your query is a SELECT."};const cols=res.columns.map(c=>c.toLowerCase());for(const ck of checks){if(ck.t==="rows"&&res.values.length!==ck.n)return{ok:false,msg:`Expected ${ck.n} row${ck.n!==1?"s":""},  got ${res.values.length}.`};if(ck.t==="col"&&!cols.includes(ck.c.toLowerCase()))return{ok:false,msg:`Column "${ck.c}" not found — check your aliases.`};}return{ok:true,msg:"Correct!"};}
const runDB=(db,sql)=>{const ss=sql.split(";").map(s=>s.trim()).filter(Boolean);let last=null;for(const s of ss){const r=db.exec(s+";");if(r.length)last=r[r.length-1];}return last;};
const rich=t=>t.replace(/\*\*([^*]+)\*\*/g,`<strong style="color:${T.tx}">$1</strong>`).replace(/`([^`]+)`/g,`<code style="color:${T.A};background:${T.AD}44;padding:1px 6px;border-radius:4px;font-family:var(--font-code);font-size:12px;border:1px solid ${T.AD}">$1</code>`);
function useWinSize(){const[w,s]=useState(typeof window!=="undefined"?window.innerWidth:1200);useEffect(()=>{const h=()=>s(window.innerWidth);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);return w;}

function PBar({pct,color,h=4}){
  return <div style={{background:"rgba(36,49,79,.35)",borderRadius:99,height:h,overflow:"hidden"}}>
    <div style={{width:`${Math.max(0,Math.min(100,pct))}%`,height:"100%",borderRadius:99,
      transition:"width .55s var(--ease,ease)",
      background:`linear-gradient(90deg,${color}99,${color})`,
      boxShadow:`0 0 10px ${color}66`}}/>
  </div>;
}
function Ring({pct,color,size=36,sw=3}){
  const r=(size-sw*2)/2,c=2*Math.PI*r,d=(pct/100)*c;
  return <svg width={size} height={size} style={{transform:"rotate(-90deg)",flexShrink:0}} aria-hidden="true">
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(36,49,79,.45)" strokeWidth={sw}/>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw}
      strokeDasharray={`${d} ${c}`} strokeLinecap="round"
      style={{transition:"stroke-dasharray .5s ease",filter:`drop-shadow(0 0 4px ${color}aa)`}}/>
  </svg>;
}
function Tag({label,color,sm}){
  return <span style={{display:"inline-flex",alignItems:"center",
    padding:sm?"2px 10px":"4px 13px",borderRadius:"var(--r-pill)",
    fontSize:sm?10.5:12,fontWeight:600,color,
    background:`${color}14`,border:`1px solid ${color}28`,
    whiteSpace:"nowrap"}}>
    {label}

}
function Btn({children,onClick,primary,color,disabled,style={},ariaLabel}){
  const c=color||T.A;
  const base={padding:"12px 28px",borderRadius:"var(--r-sm)",fontWeight:700,fontSize:14.5,
    letterSpacing:.15,transition:"all .22s var(--ease)",cursor:disabled?"not-allowed":"pointer",
    border:primary?"none":`1.5px solid ${disabled?"rgba(36,49,79,.35)":c+"3a"}`,
    background:primary?`linear-gradient(135deg,${c}f0,${c}b0)`:`rgba(${c},0)`,
    color:disabled?T.t4:primary?"#060816":c,
    boxShadow:primary&&!disabled?`0 4px 22px ${c}44,inset 0 1px 0 rgba(255,255,255,.18)`:"none",
    ...style};
  return <button aria-label={ariaLabel} onClick={onClick} disabled={disabled} style={base}
    onMouseEnter={e=>{if(disabled)return;e.currentTarget.style.transform="translateY(-1px)";
      if(primary)e.currentTarget.style.boxShadow=`0 7px 30px ${c}55,0 0 18px ${c}22,inset 0 1px 0 rgba(255,255,255,.22)`;
      else{e.currentTarget.style.background=`${c}18`;e.currentTarget.style.borderColor=`${c}66`;e.currentTarget.style.boxShadow=`0 0 14px ${c}18`;}}}
    onMouseLeave={e=>{if(disabled)return;e.currentTarget.style.transform="translateY(0)";
      if(primary)e.currentTarget.style.boxShadow=`0 4px 22px ${c}44,inset 0 1px 0 rgba(255,255,255,.18)`;
      else{e.currentTarget.style.background="transparent";e.currentTarget.style.borderColor=`${c}3a`;e.currentTarget.style.boxShadow="none";}}}>
    {children}
  </button>;
}

/* ─── RESULT TABLE ───────────────────────────────────── */
function RT({res,err,ran}){

  if(err)return(
    <div style={{padding:"14px 18px",background:T.err.bg,display:"flex",gap:10,alignItems:"flex-start"}}>
      <span style={{color:T.R,fontSize:16,flexShrink:0,marginTop:1}}>⚠</span>
      <span style={{color:T.err.tx,fontSize:13,fontFamily:"var(--font-code)",lineHeight:1.6}}>{err}</span>
    </div>
  );
  if(!res?.columns?.length)return(
    <div style={{padding:"12px 18px",color:T.S,fontSize:13,fontFamily:"var(--font-code)"}}>
      ✓ Executed — 0 rows
    </div>
  );
  return <div style={{overflowX:"auto",maxHeight:200,overflowY:"auto"}}>
    <table style={{borderCollapse:"collapse",fontSize:12.5,fontFamily:"var(--font-code)",
      width:"100%",minWidth:"max-content"}}>
      <thead><tr>{res.columns.map(c=>(
        <th key={c} style={{padding:"8px 16px",background:"rgba(4,6,18,.55)",color:T.B,
          borderBottom:"1px solid rgba(34,211,238,.18)",textAlign:"left",whiteSpace:"nowrap",
          position:"sticky",top:0,fontWeight:600,fontSize:11,letterSpacing:.5}}>{c}</th>
      ))}</tr></thead>
      <tbody>{res.values.map((row,i)=>(
        <tr key={i} style={{background:i%2===0?"rgba(6,8,22,.3)":"rgba(17,24,43,.25)",transition:"background .1s"}}
          onMouseEnter={e=>e.currentTarget.style.background="rgba(36,49,79,.3)"}
          onMouseLeave={e=>e.currentTarget.style.background=i%2===0?"rgba(6,8,22,.3)":"rgba(17,24,43,.25)"}>
          {row.map((cell,j)=>(
            <td key={j} style={{padding:"7px 16px",color:cell===null?T.t3:T.t2,whiteSpace:"nowrap"}}>
              {cell===null?<em style={{color:T.t3,fontStyle:"italic"}}>NULL</em>:String(cell)}
            </td>
          ))}
        </tr>
      ))}</tbody>
    </table>
    <div style={{padding:"5px 16px",color:T.t3,fontSize:11,fontFamily:"var(--font-code)",
      background:"rgba(4,6,18,.4)"}}>
      {res.values.length} row{res.values.length!==1?"s":""}
    </div>

}

/* ─── SQL CONSOLE ────────────────────────────────────── */
/* ─── SQL PLAYGROUND — full mini-IDE ────────────────────
   Features: split pane · schema mini-map · toolbar (Run /
   Format / Hint / Explain / Reset) · inline error line ·
   expected-output preview · diff view · quick-insert chips ·
   one-click "show data" per table                           */
function SQLPlayground({
  db, initSQL="", solution="", checks=[], hints=[], label="playground", onPass, onFirstRun,
}){
  const[sql,setSql]       = useState(initSQL);
  const[res,setRes]       = useState(null);
  const[err,setErr]       = useState(null);
  const[ran,setRan]       = useState(false);
  const[val,setVal]       = useState(null);
  const[explainRows,setEx]= useState(null);
  const[hasRun,setHasRun]  = useState(false); // for first_query achievement
  const[solRes,setSolRes] = useState(null);         // ideal query result
  const[activeTab,setTab] = useState("results");    // results|explain|diff
  const[hintIdx,setHintI] = useState(-1);
  const[tableData,setTD]  = useState({});           // table -> first-rows
  const[openTable,setOT]  = useState(null);         // expanded table
  const[errLine,setEL]    = useState(null);         // 1-based line with error
  const ta = useRef();
  const winW = useWinSize();
  const isSm = winW < 720;

  /* ─ parse error line from SQLite message ─ */
  const parseErrLine = msg => {
    // SQLite sometimes says "(line N)" or we can find the token
    const m = msg.match(/\(line (\d+)\)/i);
    if(m) return parseInt(m[1]);
    return null;
  };

  /* ─ run query ─ */
  const run = useCallback(()=>{
    if(!db) return;
    setErr(null); setRes(null); setRan(true); setVal(null); setEL(null);
    setTab("results");
    try{
      const r = runDB(db, sql);
      setRes(r);
      // First-ever query achievement (fires once per component mount)
      setHasRun(prev=>{ if(!prev&&onFirstRun)onFirstRun(); return true; });
      if(checks?.length){
        const v = validate(r, checks);
        setVal(v);
        if(v?.ok && onPass) onPass();
      }
    } catch(e){
      setErr(e.message);
      setEL(parseErrLine(e.message));
    }
  },[db,sql,checks]);

  /* ─ keyboard shortcuts ─ */
  const onKey = e => {
    if((e.ctrlKey||e.metaKey) && e.key==="Enter"){ e.preventDefault(); run(); }
    if(e.key==="Tab"){
      e.preventDefault();
      const el=ta.current, p=el.selectionStart;
      setSql(v=>v.slice(0,p)+"  "+v.slice(el.selectionEnd));
      requestAnimationFrame(()=>{ el.selectionStart=el.selectionEnd=p+2; });
    }
  };

  /* ─ format ─ */
  const doFormat = () => setSql(formatSQL(sql));

  /* ─ explain ─ */
  const doExplain = () => {
    if(!db||!sql.trim()) return;
    try{
      const r = db.exec("EXPLAIN QUERY PLAN "+sql.replace(/;+\s*$/,""));
      setEx(r[0]||null);
      setTab("explain");
    } catch(e){ setErr(e.message); }
  };

  /* ─ diff: run ideal solution ─ */
  const doDiff = () => {
    if(!db||!solution) return;
    try{
      const r = runDB(db, solution);
      setSolRes(r);
      setTab("diff");
    } catch(e){ console.warn("diff failed",e); }
  };

  /* ─ reset ─ */
  const doReset = () => {
    setSql(initSQL);
    setRes(null); setErr(null); setRan(false); setVal(null);
    setEL(null); setEx(null); setSolRes(null); setTab("results");
    setHintI(-1);
  };

  /* ─ load table preview ─ */
  const loadTable = tname => {
    if(openTable===tname){ setOT(null); return; }
    setOT(tname);
    if(tableData[tname]) return;
    try{
      const r = db.exec(`SELECT * FROM ${tname} LIMIT 5`);
      if(r.length) setTD(d=>({...d,[tname]:r[0]}));
    } catch{}
  };

  /* ─ quick-insert chip at cursor ─ */
  const insertChip = text => {
    const el=ta.current;
    if(!el){ setSql(s=>s+" "+text+" "); return; }
    const p=el.selectionStart, q=el.selectionEnd;
    const ins = (p>0 && sql[p-1]!==' ' && sql[p-1]!=='\n' ? " " : "") + text + " ";
    const next = sql.slice(0,p)+ins+sql.slice(q);
    setSql(next);
    requestAnimationFrame(()=>{ el.selectionStart=el.selectionEnd=p+ins.length; el.focus(); });
  };

  /* ─ annotate textarea lines with error ─ */
  const sqlLines = sql.split("\n");

  /* ─ colours ─ */
  const TAB = t => ({
    padding:"6px 14px", fontSize:11.5, fontWeight:600, cursor:"pointer",
    borderRadius:"var(--r-xs)", border:"none",
    background:activeTab===t?"rgba(109,124,255,.2)":"transparent",
    color:activeTab===t?T.A:T.t3, transition:"all .15s",
  });

  const btnStyle = (accent,disabled)=>({
    display:"flex",alignItems:"center",gap:5,padding:"6px 13px",
    borderRadius:"var(--r-xs)",border:`1px solid ${disabled?"rgba(36,49,79,.3)":accent+"44"}`,
    background:disabled?"transparent":`${accent}10`,
    color:disabled?T.t4:accent,fontSize:12,fontWeight:600,
    cursor:disabled?"not-allowed":"pointer",transition:"all .2s",
    opacity:disabled?.5:1,
  });

  return (
    <div style={{display:"flex",flexDirection:"column",gap:0,
      background:"rgba(4,6,22,.7)",borderRadius:"var(--r-md)",overflow:"hidden",
      border:"1px solid rgba(36,49,79,.6)",
      boxShadow:"0 8px 48px rgba(4,6,18,.7), 0 0 1px rgba(109,124,255,.2)"}}>

      {/* ── SCHEMA MINI-MAP ────────────────────────────────── */}
      <div style={{padding:"10px 14px",background:"rgba(6,8,22,.8)",
        borderBottom:"1px solid rgba(36,49,79,.4)",overflowX:"auto"}}>
        {/* Table chips with one-click show-data */}
        <div style={{display:"flex",gap:6,flexWrap:"nowrap",marginBottom:openTable?8:0}}>
          {Object.entries(SCHEMA_MAP).map(([t,cols])=>{
            const tc=TC[t]||T.B;
            const isOpen=openTable===t;
            return (
              <div key={t} style={{flexShrink:0}}>
                {/* Table chip */}
                <button onClick={()=>loadTable(t)}
                  style={{display:"flex",alignItems:"center",gap:5,
                    padding:"4px 11px",borderRadius:"var(--r-pill)",
                    border:`1px solid ${isOpen?tc:tc+"44"}`,
                    background:isOpen?`${tc}20`:`${tc}0c`,
                    color:isOpen?tc:`${tc}bb`,cursor:"pointer",
                    fontSize:11.5,fontWeight:600,fontFamily:"var(--font-code)",
                    transition:"all .15s",whiteSpace:"nowrap"}}>
                  <span style={{width:6,height:6,borderRadius:"50%",background:tc,
                    boxShadow:isOpen?`0 0 6px ${tc}`:undefined}}/>
                  {t}
                  <span style={{fontSize:9,opacity:.6}}>{isOpen?"▲":"▼"}</span>
                </button>
              </div>
            );
          })}
          <div style={{marginLeft:"auto",flexShrink:0,display:"flex",gap:4}}>
            {Object.entries(SCHEMA_MAP).flatMap(([t,cols])=>
              cols.map(c=>(
                <button key={`${t}.${c}`} onClick={()=>insertChip(c)}
                  title={`Insert "${c}" (from ${t})`}
                  style={{padding:"4px 10px",borderRadius:"var(--r-pill)",
                    border:"1px solid rgba(36,49,79,.45)",background:"rgba(17,24,43,.6)",
                    color:T.t3,fontSize:10,fontFamily:"var(--font-code)",
                    cursor:"pointer",whiteSpace:"nowrap",transition:"color .15s"}}
                  onMouseEnter={e=>e.currentTarget.style.color=TC[t]||T.B}
                  onMouseLeave={e=>e.currentTarget.style.color=T.t3}>
                  {c}
                </button>
              ))
            ).slice(0,14) /* show first ~14 column chips to avoid overflow */}
          </div>
        </div>

        {/* Expanded table preview */}
        {openTable&&tableData[openTable]&&(
          <div className="aUp" style={{overflowX:"auto",borderRadius:"var(--r-xs)",
            border:`1px solid ${TC[openTable]||T.B}30`}}>
            <table style={{borderCollapse:"collapse",fontSize:11,
              fontFamily:"var(--font-code)",fontSize:winW>1400?13.5:12,width:"100%",minWidth:"max-content"}}>
              <thead><tr>{tableData[openTable].columns.map(c=>(
                <th key={c} style={{padding:"4px 12px",background:"rgba(6,8,22,.7)",
                  color:TC[openTable]||T.B,borderBottom:`1px solid rgba(36,49,79,.4)`,
                  textAlign:"left",whiteSpace:"nowrap",fontWeight:600,fontSize:10.5,
                  cursor:"pointer"}}
                  onClick={()=>insertChip(c)} title={`Click to insert "${c}"`}>
                  {c}
                </th>
              ))}</tr></thead>
              <tbody>{tableData[openTable].values.map((row,i)=>(
                <tr key={i} style={{background:i%2?"rgba(17,24,43,.3)":"rgba(6,8,22,.2)"}}>
                  {row.map((cell,j)=>(
                    <td key={j} style={{padding:"4px 12px",color:cell===null?T.t3:T.t2,
                      whiteSpace:"nowrap",fontSize:11}}>
                      {cell===null?<em style={{color:T.t3}}>NULL</em>:String(cell)}
                    </td>
                  ))}
                </tr>
              ))}</tbody>
            </table>
            <div style={{padding:"2px 12px",fontSize:10,color:T.t3,
              background:"rgba(4,6,18,.5)",fontFamily:"var(--font-code)"}}>
              first 5 rows · click any column header to insert name · {SCHEMA_MAP[openTable]?.length} columns
            </div>
          </div>
        )}
      </div>

      {/* ── TOOLBAR ─────────────────────────────────────────── */}
      <div style={{display:"flex",alignItems:"center",gap:6,padding:"8px 14px",
        background:"rgba(4,6,18,.5)",borderBottom:"1px solid rgba(36,49,79,.35)",
        flexWrap:"wrap"}}>
        {/* Primary action */}
        <button onClick={run} disabled={!db}
          style={{display:"flex",alignItems:"center",gap:6,padding:"7px 18px",
            borderRadius:"var(--r-sm)",border:"none",
            background:db?T.A:"rgba(36,49,79,.5)",
            color:db?"#060816":T.t4,fontSize:13,fontWeight:700,
            cursor:db?"pointer":"not-allowed",
            boxShadow:db?"0 2px 14px rgba(109,124,255,.45)":"none",
            transition:"all .2s"}}>
          ▶ Run
        </button>
        <button onClick={doFormat} style={btnStyle(T.B,false)} title="Auto-format SQL">
          ⌥ Format
        </button>
        {hints?.length>0&&(
          <button onClick={()=>setHintI(h=>Math.min(h+1,hints.length-1))}
            disabled={hintIdx>=hints.length-1}
            style={btnStyle(T.M,hintIdx>=hints.length-1)} title="Show next hint">
            💡 Hint {hintIdx+1<hints.length?`${hintIdx+2}/${hints.length}`:""}
          </button>
        )}
        <button onClick={doExplain} disabled={!db||!sql.trim()}
          style={btnStyle(T.B,!db||!sql.trim())} title="EXPLAIN QUERY PLAN">
          🔍 Explain
        </button>
        {solution&&(
          <button onClick={doDiff} disabled={!ran}
            style={btnStyle(T.M,!ran)} title="Compare your result vs ideal">
            ⟺ Diff
          </button>
        )}
        <button onClick={doReset}
          style={{...btnStyle(T.t3,false),marginLeft:"auto"}} title="Reset to starter SQL">
          ↺ Reset
        </button>
        <span style={{fontSize:10.5,color:T.t3,fontFamily:"var(--font-code)"}}>
          Ctrl+↵
        </span>
      </div>

      {/* ── HINT STRIP ──────────────────────────────────────── */}
      {hintIdx>=0&&hints[hintIdx]&&(
        <div className="aUp" style={{padding:"9px 16px",
          background:"rgba(167,139,250,.08)",borderBottom:"1px solid rgba(167,139,250,.2)",
          display:"flex",gap:8,alignItems:"flex-start"}}>
          <span style={{color:T.M,flexShrink:0,fontSize:14}}>💡</span>
          <span style={{color:T.ML,fontSize:13,lineHeight:1.6}}>{hints[hintIdx]}</span>
        </div>
      )}

      {/* ── SPLIT PANE ──────────────────────────────────────── */}
      <div style={{display:"flex",flexDirection:isSm?"column":"row",minHeight:isSm?320:300}}>

        {/* LEFT: Editor */}
        <div style={{flex:1,position:"relative",borderRight:isSm?"none":"1px solid rgba(36,49,79,.35)",
          borderBottom:isSm?"1px solid rgba(36,49,79,.35)":"none"}}>
          {/* Line-number gutter overlay for error line */}
          {errLine&&(
            <div aria-hidden="true" style={{position:"absolute",left:0,top:0,width:"100%",
              pointerEvents:"none",fontFamily:"var(--font-code)",fontSize:13,
              lineHeight:1.9,padding:"14px 0",zIndex:2}}>
              {sqlLines.map((_,li)=>(
                <div key={li} style={{height:"1.9em",
                  background:li===errLine-1?"rgba(255,107,138,.12)":"transparent",
                  borderLeft:li===errLine-1?`3px solid ${T.R}`:"3px solid transparent",
                  transition:"background .2s"}}/>
              ))}
            </div>
          )}
          <textarea ref={ta} value={sql}
            onChange={e=>{setSql(e.target.value);setEL(null);}}
            onKeyDown={onKey} spellCheck={false}
            style={{width:"100%",height:"100%",minHeight:isSm?180:winW>1400?420:300,
              padding:"14px 18px",
              background:"rgba(4,6,18,.5)",color:T.tx,border:"none",
              fontFamily:"var(--font-code)",fontSize:13,lineHeight:1.9,
              resize:"none",outline:"none",position:"relative",zIndex:1}}/>
        </div>

        {/* RIGHT: Results pane */}
        <div style={{flex:1,display:"flex",flexDirection:"column",
          background:"rgba(4,6,18,.3)",minHeight:isSm?200:300}}>

              {err?"✗ error":val?.ok?"✓ correct":res?`${res.values?.length||0} rows`:""}
            </span>}
          </div>

          {/* Results tab */}
          {activeTab==="results"&&(
            <div style={{flex:1,overflowY:"auto"}}>
              {!ran&&<div style={{padding:"28px 18px",color:T.t3,fontSize:13,
                textAlign:"center",lineHeight:2}}>

                  padding:"2px 7px",borderRadius:4,fontSize:11,
                  fontFamily:"var(--font-code)"}}>Ctrl+Enter</kbd> to run

                fontFamily:"var(--font-code)",lineHeight:1.7,
                background:"rgba(255,107,138,.06)"}}>
                <div style={{fontWeight:700,marginBottom:4}}>⚠ Error{errLine?` on line ${errLine}`:""}</div>

              {checks?.length>0&&!val?.ok&&ran&&!err&&(
                <div style={{padding:"10px 16px",borderTop:"1px solid rgba(36,49,79,.3)",
                  fontSize:11.5,color:T.t3,fontFamily:"var(--font-code)"}}>

                  {checks.map((c,i)=>(
                    <span key={i} style={{marginRight:8}}>
                      {c.t==="rows"?<span>
                        <span style={{color:T.B}}>{c.n}</span> row{c.n!==1?"s":""}
                      </span>:c.t==="col"?<span>
                        column <span style={{color:T.B}}>"{c.c}"</span>
                      </span>:null}
                    </span>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* Explain tab */}
          {activeTab==="explain"&&explainRows&&(
            <div style={{flex:1,overflowY:"auto",padding:"14px 16px"}}>
              <div style={{fontSize:11,color:T.t3,marginBottom:10,fontWeight:600,
                letterSpacing:.5}}>EXPLAIN QUERY PLAN</div>
              {explainRows.values.map((row,i)=>(
                <div key={i} style={{
                  display:"flex",gap:10,padding:"8px 12px",marginBottom:6,
                  background:"rgba(34,211,238,.06)",borderRadius:"var(--r-xs)",
                  borderLeft:`2px solid ${T.B}`,
